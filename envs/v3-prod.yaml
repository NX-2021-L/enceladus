# ENC-FTR-090 / ENC-TSK-F65 Phase 7
# v3 production environment manifest (x86_64 / python3.11).
# Schema validated by tools/cfn-guard/manifest-shape.guard.
#
# Gen2 is now the SOLE deploy path for v3-prod. All 31 legacy deploy.sh scripts
# are tombstoned (F59 AC-3). All per-Lambda deploy workflows are deleted (F60 AC-3).
# This manifest is the canonical state declaration for v3-prod post-cutover.

env_name: v3-prod
architecture: x86_64
runtime: python3.11

stack_name: enceladus-compute
deploy_role_arn: arn:aws:iam::356364570033:role/GitHubActions-V3Prod-DeployRole
artifact_bucket: jreese-net
artifact_prefix: gen2-artifacts/v3-prod/

required_reviewers:
  - io

# SAM CodeDeploy DeploymentPreference. Canary10Percent10Minutes: 10% canary
# for 10 minutes, then 90% all-at-once — total deploy time ~10 min. Matches
# F63 AC-3 intent (Canary10Percent5Minutes spec) while giving a short
# observation window before the CloudWatch alarm_arn auto-rollback lands (F63 Phase 5).
canary_preference: Canary10Percent5Minutes

# GitHub Actions runner label. ubuntu-latest is the x86_64 row in the _build.yml
# matrix (F59 Phase 1).
runner_label: ubuntu-latest

# GitHub Environment name. The environment's required-reviewer rule is the
# human approval gate; OIDC trust policy
# (infrastructure/iam/github-actions-v3-prod-deploy-role-trust-policy.json,
# landed in PR #407) scopes sub=environment:v3-prod.
environment: v3-prod

# ENC-TSK-F63 AC-1: AppConfig IDs for runtime feature flag control.
# Populated after the 06-feature-flags stack is deployed to prod.
# Deploy workflow passes these to --parameter-overrides for AppConfigApplicationId
# and AppConfigEnvironmentId in the 02-compute stack update.
appconfig_application_id: ""
appconfig_environment_id: ""

# ENC-TSK-F63 AC-2/AC-3: SnapStart and CodeDeploy settings.
# v3-prod uses x86_64/py3.11 -- SnapStart NOT supported. Canary via CodeDeploy.
enable_snapstart: "false"
environment_suffix: ""
codedeploy_app_name: "enceladus-lambda"

# ENC-TSK-F65 Phase 7 -- artifact promotion fields.
# artifact_commit_sha + artifact_version_ids are populated by _deploy.yml on each
# workflow_dispatch promotion. Empty map = no Gen2 build promoted yet.
artifact_commit_sha: ""
artifact_version_ids: {}

# ENC-TSK-F65 Phase 7 -- directory-name to deployed Lambda function name mapping.
# _deploy.yml resolve step outputs this as function_name_map_json; deploy step uses
# the mapped name in `aws lambda update-function-code --function-name`.
# v3-prod uses no EnvironmentSuffix (prod stack suffix = "").
# Excluded: auth_edge (Lambda@Edge -- CloudFront deployment, separate path),
#           deploy_capability_auditor (retired; replaced by deploy_parity_validator),
#           shared_layer (Lambda Layer -- not a function).
# deploy_parity_validator: provisioned by CFN stack update; included here so
# Gen2 covers it immediately post-provision without a manifest update.
function_name_map:
  auth_refresh: auth-refresh
  bedrock_agent_actions: enceladus-bedrock-agent-actions
  changelog_api: devops-changelog-api
  checkout_service: enceladus-checkout-service-auto
  coordination_api: devops-coordination-api
  coordination_monitor_api: devops-coordination-monitor-api
  deploy_decide: devops-deploy-decide
  deploy_finalize: devops-deploy-finalize
  deploy_intake: devops-deploy-intake
  deploy_orchestrator: devops-deploy-orchestrator
  deploy_parity_validator: devops-deploy-parity-validator
  doc_prep: devops-doc-prep
  document_api: devops-document-api
  env_drift_auditor: devops-env-drift-auditor
  feed_publisher: devops-feed-publisher
  feed_query: devops-feed-query-api
  github_integration: devops-github-integration
  glue_crawler_launcher: devops-glue-crawler-launcher
  governance_audit: enceladus-governance-audit
  graph_health_metrics: enceladus-graph-health-metrics
  graph_query_api: devops-graph-query-api
  graph_sync: devops-graph-sync
  json_to_parquet_transformer: devops-json-to-parquet-transformer
  mcp_code: enceladus-mcp-code
  mcp_streamable: enceladus-mcp-streamable
  neo4j_backup: enceladus-neo4j-backup
  prod_health_monitor: enceladus-prod-health-monitor
  project_service: devops-project-service
  reference_search: devops-reference-search
  titan_embedding_backfill: devops-titan-embedding-backfill
  tracker_mutation: devops-tracker-mutation-api
