AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Enceladus API Layer — API Gateway HTTP API, routes, integrations.
  Part of ENC-TSK-532: IaC templates for Enceladus AWS resources.

  NOTE: API Gateway already exists. Use resource import to adopt it.

Parameters:
  EnvironmentSuffix:
    Type: String
    Default: ""
    AllowedValues: ["", "-gamma"]
    Description: >
      Appended to Lambda function name references in integration URIs.
      Production uses "" (zero drift), gamma uses "-gamma".
  CorsOrigin:
    Type: String
    Default: "https://jreese.net"
    Description: >
      CORS AllowOrigins value. Override for gamma environment.
  ComputeStackName:
    Type: String
    Default: enceladus-compute
  ApiName:
    Type: String
    Default: devops-tracker-api

Conditions:
  IsGamma: !Not [!Equals [!Ref EnvironmentSuffix, ""]]
  IsProduction: !Equals [!Ref EnvironmentSuffix, ""]

Resources:
  # ---------------------------------------------------------------------------
  # HTTP API
  # ---------------------------------------------------------------------------

  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    DeletionPolicy: Retain
    Properties:
      Name: !Ref ApiName
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsOrigin
        AllowMethods:
          - GET
          - POST
          - PUT
          - PATCH
          - DELETE
          - OPTIONS
        AllowHeaders:
          - Content-Type
          - Authorization
          - Cookie
          - X-Coordination-Internal-Key
          - X-Checkout-Assistant-Key
        AllowCredentials: true

  # NOTE: Production $default stage was created manually and cannot be imported
  # into CloudFormation. For non-production environments (gamma), the stage is
  # created by CFn directly. AutoDeploy eliminates the need for a separate
  # AWS::ApiGatewayV2::Deployment resource.
  ApiDefaultStage:
    Type: AWS::ApiGatewayV2::Stage
    Condition: IsGamma
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true
      Description: !Sub "Default stage for ${EnvironmentSuffix} environment"

  # ---------------------------------------------------------------------------
  # Integrations (Lambda proxy)
  # ---------------------------------------------------------------------------

  CoordinationApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-coordination-api${EnvironmentSuffix}"
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  TrackerMutationIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-tracker-mutation-api${EnvironmentSuffix}"
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  DocumentApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-document-api${EnvironmentSuffix}"
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  ProjectServiceIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-project-service${EnvironmentSuffix}"
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  FeedQueryIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-feed-query-api${EnvironmentSuffix}"
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  CoordinationMonitorIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-coordination-monitor-api${EnvironmentSuffix}"
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  DeployIntakeIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-deploy-intake${EnvironmentSuffix}"
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  # GMF: Deploy Decide Integration (DOC-63420302EF65)
  DeployDecideIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-deploy-decide${EnvironmentSuffix}"
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  ReferenceSearchIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-reference-search${EnvironmentSuffix}"
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  # NOTE: ChangelogApiIntegration and routes are provisioned by
  # backend/lambda/changelog_api/deploy.sh to avoid route-key ownership conflicts.

  DocPrepIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-doc-prep${EnvironmentSuffix}"
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  AuthRefreshIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:auth-refresh${EnvironmentSuffix}"
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  GitHubIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-github-integration${EnvironmentSuffix}"
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  # ---------------------------------------------------------------------------
  # Routes — Coordination API
  # ---------------------------------------------------------------------------

  RouteCoordinationCreate:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/coordination/requests
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteCoordinationGet:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/coordination/requests/{requestId}
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteCoordinationDispatch:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/coordination/requests/{requestId}/dispatch
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteCoordinationCallback:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/coordination/requests/{requestId}/callback
      Target: !Sub integrations/${CoordinationApiIntegration}

  # ADE Component C: Cursor Cloud Agents completion webhook. Authenticated via
  # Cursor HMAC-SHA256 signature (X-Webhook-Signature), verified inside the
  # coordination API Lambda. Integrated to the same CoordinationApiIntegration.
  RouteCursorWebhook:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/cursor/webhook
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteCoordinationCapabilities:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/coordination/capabilities
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteCoordinationMcpGet:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/coordination/mcp
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteCoordinationMcpPost:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/coordination/mcp
      Target: !Sub integrations/${CoordinationApiIntegration}

  # Component Registry routes (ENC-FTR-041)
  RouteComponentsList:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/coordination/components
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteComponentsCreate:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/coordination/components
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteComponentsGet:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/coordination/components/{componentId}
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteComponentsUpdate:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: PATCH /api/v1/coordination/components/{componentId}
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteComponentsDelete:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: DELETE /api/v1/coordination/components/{componentId}
      Target: !Sub integrations/${CoordinationApiIntegration}

  # ENC-FTR-076 v2 / ENC-TSK-F40 — state machine + edge + lifecycle routes.
  # advance/add_edge/remove_edge are agent+io (handler checks Cognito only for
  # io-required paths); deprecate/restore/revert are io-only per DOC-546B896390EA §3.3.
  # revert's prior sibling _handle_components_propose + _handle_components_approve
  # registered under existing CFN routes; these six are additive.

  # ENC-TSK-F75 / ENC-ISS-278 Mitigation A: RouteComponentsAdvance was provisioned
  # out-of-band on API 8nkzqkmxqc (pre-F40 H-PREREQ) and exists as an orphan not
  # managed by this stack. Leaving it unmanaged was chosen over deleting it (the
  # route actively serves prod traffic).
  # ENC-TSK-F85 / ENC-ISS-294: The five sibling routes below were also provisioned
  # out-of-band. DeletionPolicy: Retain required for IMPORT change set adoption and
  # retained permanently to protect live traffic routes from accidental deletion.

  RouteComponentsAddEdge:
    Type: AWS::ApiGatewayV2::Route
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/coordination/components/{componentId}/add_edge
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteComponentsRemoveEdge:
    Type: AWS::ApiGatewayV2::Route
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/coordination/components/{componentId}/remove_edge
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteComponentsDeprecate:
    Type: AWS::ApiGatewayV2::Route
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/coordination/components/{componentId}/deprecate
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteComponentsRestore:
    Type: AWS::ApiGatewayV2::Route
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/coordination/components/{componentId}/restore
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteComponentsRevert:
    Type: AWS::ApiGatewayV2::Route
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/coordination/components/{componentId}/revert
      Target: !Sub integrations/${CoordinationApiIntegration}

  # ---------------------------------------------------------------------------
  # Routes — Tracker Mutation
  # ---------------------------------------------------------------------------

  RouteTrackerMutationLegacy:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: PATCH /{projectId}/{recordType}/{recordId}
      Target: !Sub integrations/${TrackerMutationIntegration}

  RouteTrackerMutationV1:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: PATCH /api/v1/tracker/{projectId}/{recordType}/{recordId}
      Target: !Sub integrations/${TrackerMutationIntegration}

  # ---------------------------------------------------------------------------
  # Gamma tracker plane — full mutation + read route set (ENC-ISS-410 / ENC-TSK-I14)
  #
  # The 'enceladus gamma' MCP front-end (enceladus-mcp-streamable-gamma) proxies
  # every tracker read+write to ENCELADUS_TRACKER_API_BASE =
  # https://enceladus-gamma.jreese.net/api/v1/tracker. ENC-ISS-410 round-1 (write)
  # and round-2 (read) added the full tracker mutation+read route set on
  # devops-tracker-api-gamma (hi0dzmvqrc), wired to the devops-tracker-mutation-api
  # **:live** alias (so the gamma supersession / I07 generalized domain is reachable
  # instead of the prod pre-I07 backend). Those were live console edits and drift on
  # the next gamma stack deploy — codified here so they survive.
  #
  # Condition: IsGamma keeps prod (EnvironmentSuffix="") untouched: prod's equivalent
  # tracker-mutation routes are provisioned out-of-band by the per-Lambda deploy
  # scripts (same pattern as the Changelog / GitHub / Checkout-task notes below), so
  # adding them unconditionally would collide on a prod deploy. DeletionPolicy: Retain
  # protects the live routes during IMPORT adoption into enceladus-api-gamma.
  # The two PATCH routes above already target devops-tracker-mutation-api-gamma (bare,
  # bssof7u) via TrackerMutationIntegration and match the live gamma gateway — left
  # unchanged.
  # ---------------------------------------------------------------------------

  TrackerMutationGammaLiveIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-tracker-mutation-api${EnvironmentSuffix}:live"
      IntegrationMethod: POST
      PayloadFormatVersion: '2.0'

  # Typed relationship edges (incl. ENC-TSK-I07 superseded-by) — POST / GET / DELETE
  RouteTrackerRelationshipCreateGamma:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/tracker/{projectId}/relationship
      Target: !Sub integrations/${TrackerMutationGammaLiveIntegration}

  RouteTrackerRelationshipGetGamma:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/tracker/{projectId}/relationship
      Target: !Sub integrations/${TrackerMutationGammaLiveIntegration}

  RouteTrackerRelationshipDeleteGamma:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: DELETE /api/v1/tracker/{projectId}/relationship
      Target: !Sub integrations/${TrackerMutationGammaLiveIntegration}

  # Dedup tier-review surface (ENC-TSK-I08 / FTR-115 P4) — POST op=propose|approve.
  # Makes the deploy-success dedup-review Lambda HTTP-reachable on v4-gamma.
  RouteTrackerDedupReviewGamma:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/tracker/{projectId}/dedup-review
      Target: !Sub integrations/${TrackerMutationGammaLiveIntegration}

  # Create record (POST {recordType})
  RouteTrackerCreateRecordGamma:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/tracker/{projectId}/{recordType}
      Target: !Sub integrations/${TrackerMutationGammaLiveIntegration}

  # Worklog append
  RouteTrackerLogGamma:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/tracker/{projectId}/{recordType}/{recordId}/log
      Target: !Sub integrations/${TrackerMutationGammaLiveIntegration}

  # Acceptance evidence
  RouteTrackerAcceptanceEvidenceGamma:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/tracker/{projectId}/{recordType}/{recordId}/acceptance-evidence
      Target: !Sub integrations/${TrackerMutationGammaLiveIntegration}

  # Checkout — POST (acquire) / DELETE (release)
  RouteTrackerCheckoutGamma:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/tracker/{projectId}/{recordType}/{recordId}/checkout
      Target: !Sub integrations/${TrackerMutationGammaLiveIntegration}

  RouteTrackerCheckoutReleaseGamma:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: DELETE /api/v1/tracker/{projectId}/{recordType}/{recordId}/checkout
      Target: !Sub integrations/${TrackerMutationGammaLiveIntegration}

  # Checkout extend
  RouteTrackerExtendGamma:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/tracker/{projectId}/{recordType}/{recordId}/extend
      Target: !Sub integrations/${TrackerMutationGammaLiveIntegration}

  # GET single record (also serves validation_rules + plan-get on the same Lambda)
  RouteTrackerGetRecordGamma:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/tracker/{projectId}/{recordType}/{recordId}
      Target: !Sub integrations/${TrackerMutationGammaLiveIntegration}

  # GET list by project
  RouteTrackerListGamma:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/tracker/{projectId}
      Target: !Sub integrations/${TrackerMutationGammaLiveIntegration}

  # GET pending PWA updates
  RouteTrackerPendingUpdatesGamma:
    Type: AWS::ApiGatewayV2::Route
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/tracker/pending-updates
      Target: !Sub integrations/${TrackerMutationGammaLiveIntegration}

  # ---------------------------------------------------------------------------
  # Routes — Document API
  # ---------------------------------------------------------------------------

  RouteDocumentsList:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/documents
      Target: !Sub integrations/${DocumentApiIntegration}

  RouteDocumentsGet:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/documents/{documentId}
      Target: !Sub integrations/${DocumentApiIntegration}

  RouteDocumentsSearch:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/documents/search
      Target: !Sub integrations/${DocumentApiIntegration}

  RouteDocumentsCreate:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: PUT /api/v1/documents
      Target: !Sub integrations/${DocumentApiIntegration}

  RouteDocumentsPatch:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: PATCH /api/v1/documents/{documentId}
      Target: !Sub integrations/${DocumentApiIntegration}

  # ---------------------------------------------------------------------------
  # Routes — Project Service
  # ---------------------------------------------------------------------------

  RouteProjectsList:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/projects
      Target: !Sub integrations/${ProjectServiceIntegration}

  RouteProjectsGet:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/projects/{projectName}
      Target: !Sub integrations/${ProjectServiceIntegration}

  RouteProjectsCreate:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/projects
      Target: !Sub integrations/${ProjectServiceIntegration}

  # ---------------------------------------------------------------------------
  # Routes — Feed, Monitor, Deploy, Reference, DocPrep, Auth
  # ---------------------------------------------------------------------------

  RouteFeedQuery:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/feed
      Target: !Sub integrations/${FeedQueryIntegration}

  RouteFeedRefresh:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/feed/refresh
      Target: !Sub integrations/${FeedQueryIntegration}

  RouteMonitorList:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/coordination/monitor
      Target: !Sub integrations/${CoordinationMonitorIntegration}

  RouteMonitorGet:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/coordination/monitor/{requestId}
      Target: !Sub integrations/${CoordinationMonitorIntegration}

  RouteSessionsList:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/coordination/sessions
      Target: !Sub integrations/${CoordinationMonitorIntegration}

  RouteSessionTurns:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/coordination/sessions/{sessionId}/turns
      Target: !Sub integrations/${CoordinationMonitorIntegration}

  RouteSessionMessage:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/coordination/sessions/{sessionId}/message
      Target: !Sub integrations/${CoordinationApiIntegration}

  RouteDeploySubmit:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/deploy/submit
      Target: !Sub integrations/${DeployIntakeIntegration}

  RouteDeployStatus:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/deploy/status/{specId}
      Target: !Sub integrations/${DeployIntakeIntegration}

  RouteDeployHistory:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/deploy/history/{projectId}
      Target: !Sub integrations/${DeployIntakeIntegration}

  RouteDeployStateGet:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/deploy/state/{projectId}
      Target: !Sub integrations/${DeployIntakeIntegration}

  RouteDeployStatePatch:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: PATCH /api/v1/deploy/state/{projectId}
      Target: !Sub integrations/${DeployIntakeIntegration}

  RouteDeployPending:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/deploy/pending/{projectId}
      Target: !Sub integrations/${DeployIntakeIntegration}

  RouteDeployTrigger:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/deploy/trigger/{projectId}
      Target: !Sub integrations/${DeployIntakeIntegration}

  # ENC-TSK-E57/E62: Deploy approval validation route for enceladus-approval-gate
  # Supersedes CLI-created route zmra44n; makes the route IaC-managed.
  RouteDeployValidateApproval:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/deploy/validate/approval/{prNumber}
      Target: !Sub integrations/${DeployIntakeIntegration}

  # GMF routes (DOC-63420302EF65)
  RouteDeployQueue:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/deploy/queue
      Target: !Sub integrations/${DeployIntakeIntegration}

  RouteDeployDecide:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/deploy/decide
      Target: !Sub integrations/${DeployDecideIntegration}

  RouteReferenceSearch:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: GET /api/v1/reference/search
      Target: !Sub integrations/${ReferenceSearchIntegration}

  RouteDocPrep:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: POST /api/v1/doc-prep/{projectName}
      AuthorizationType: AWS_IAM
