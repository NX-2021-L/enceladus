AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Enceladus Data Layer — DynamoDB tables, SQS queues, SNS topics.
  Part of ENC-TSK-532: IaC templates for Enceladus AWS resources.

  NOTE: These resources already exist. Use `aws cloudformation create-stack
  --import-resources` with resource-import.json to adopt them.

Parameters:
  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging, gamma]
  EnvironmentSuffix:
    Type: String
    Default: ""
    AllowedValues: ["", "-gamma"]
    Description: >
      Appended to every resource name. Production uses "" (zero drift),
      gamma uses "-gamma" for parallel deployment.
  DynamoDBRegion:
    Type: String
    Default: us-west-2

Conditions:
  IsProduction: !Equals [!Ref Environment, "production"]
  # ENC-TSK-I88 / ENC-FTR-085: gamma-only resources (deploy target v4/gamma).
  IsGamma: !Not [!Equals [!Ref EnvironmentSuffix, ""]]

Resources:
  # ---------------------------------------------------------------------------
  # DynamoDB Tables
  # ---------------------------------------------------------------------------

  CoordinationRequestsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "coordination-requests${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: request_id
          AttributeType: S
        - AttributeName: project_id
          AttributeType: S
        - AttributeName: updated_epoch
          AttributeType: N
        - AttributeName: idempotency_key
          AttributeType: S
        - AttributeName: created_epoch
          AttributeType: N
      KeySchema:
        - AttributeName: request_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: project-updated-index
          KeySchema:
            - AttributeName: project_id
              KeyType: HASH
            - AttributeName: updated_epoch
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: idempotency-index
          KeySchema:
            - AttributeName: idempotency_key
              KeyType: HASH
            - AttributeName: created_epoch
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: coordination

  TrackerTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "devops-project-tracker${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: project_id
          AttributeType: S
        - AttributeName: record_id
          AttributeType: S
        - AttributeName: record_type
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
        - AttributeName: feed_scope
          AttributeType: S
        - AttributeName: version_seq
          AttributeType: N
      KeySchema:
        - AttributeName: project_id
          KeyType: HASH
        - AttributeName: record_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: version-seq-index
          KeySchema:
            - AttributeName: feed_scope
              KeyType: HASH
            - AttributeName: version_seq
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - project_id
              - record_id
              - record_type
              - item_id
              - updated_at
              - target_project_id
              - target_record_id
              - target_record_type
        - IndexName: type-updated-index
          KeySchema:
            - AttributeName: record_type
              KeyType: HASH
            - AttributeName: updated_at
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - project_id
              - update
              - item_id
              - title
              - status
        - IndexName: project-type-index
          KeySchema:
            - AttributeName: project_id
              KeyType: HASH
            - AttributeName: record_type
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: tracker

  ProjectsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "projects${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: !If [IsProduction, true, false]
      AttributeDefinitions:
        - AttributeName: project_id
          AttributeType: S
        - AttributeName: prefix
          AttributeType: S
      KeySchema:
        - AttributeName: project_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: prefix-index
          KeySchema:
            - AttributeName: prefix
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: projects

  DocumentsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "documents${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      DeletionProtectionEnabled: !If [IsProduction, true, false]
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
        - AttributeName: project_id
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: project-updated-index
          KeySchema:
            - AttributeName: project_id
              KeyType: HASH
            - AttributeName: updated_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: documents

  # ---------------------------------------------------------------------------
  # ENC-FTR-087 Phase 1 (ENC-TSK-I85) — Wave-Close Drift Telemetry time series.
  # One item per wave-close event keyed on wave_id (distinct per wave); the
  # project-timestamp-index GSI serves the per-project time series consumed by
  # the BHC drift-monitor. Carries d_centroid_L2 + d_spectral plus the
  # ENC-FTR-105 null-stub slots (spurious_attractor_rate, re_traversal_rate).
  # ---------------------------------------------------------------------------
  DriftTelemetryTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "enceladus-drift-telemetry${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: wave_id
          AttributeType: S
        - AttributeName: project_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: wave_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: project-timestamp-index
          KeySchema:
            - AttributeName: project_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: drift-telemetry

  # ENC-FTR-109 / ENC-TSK-K05: Stigmergic exploration trace telemetry.
  # Per-event retrieval/traversal traces with 90-day TTL on expires_at.
  StigmergicTraceTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "enceladus-stigmergic-trace${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: trace_id
          AttributeType: S
        - AttributeName: project_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
      KeySchema:
        - AttributeName: trace_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: project-timestamp-index
          KeySchema:
            - AttributeName: project_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: graph-query-api
        - Key: Feature
          Value: ENC-FTR-109

  DeploymentManagerTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "devops-deployment-manager${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: project_id
          AttributeType: S
        - AttributeName: record_id
          AttributeType: S
        - AttributeName: record_type
          AttributeType: S
      KeySchema:
        - AttributeName: project_id
          KeyType: HASH
        - AttributeName: record_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: record-type-index
          KeySchema:
            - AttributeName: project_id
              KeyType: HASH
            - AttributeName: record_type
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # NOTE: status-created-index, generation-created-index, target-created-index
        # (DOC-63420302EF65 §4.2) were added manually via ddb-add-deployment-manager-gsis
        # workflow (ENC-TSK-I27) because CloudFormation cannot add multiple GSIs in one
        # UpdateTable call. They exist in DDB but are intentionally omitted here to avoid
        # CFN drift-update failures. Re-add one-by-one in future template updates if CFN
        # tracking is needed.
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: deployment

  GovernancePoliciesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "governance-policies${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: policy_id
          AttributeType: S
      KeySchema:
        - AttributeName: policy_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: governance

  ComponentRegistryTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "component-registry${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions:
        - AttributeName: component_id
          AttributeType: S
        - AttributeName: project_id
          AttributeType: S
        - AttributeName: component_name
          AttributeType: S
        - AttributeName: category
          AttributeType: S
        - AttributeName: updated_at
          AttributeType: S
      KeySchema:
        - AttributeName: component_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: project-name-index
          KeySchema:
            - AttributeName: project_id
              KeyType: HASH
            - AttributeName: component_name
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: category-updated-index
          KeySchema:
            - AttributeName: category
              KeyType: HASH
            - AttributeName: updated_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: coordination
        - Key: Feature
          Value: ENC-FTR-041

  AgentComplianceViolationsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "agent-compliance-violations${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: violation_id
          AttributeType: S
        - AttributeName: provider
          AttributeType: S
        - AttributeName: event_epoch
          AttributeType: N
        - AttributeName: policy_id
          AttributeType: S
      KeySchema:
        - AttributeName: violation_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: provider-timestamp-index
          KeySchema:
            - AttributeName: provider
              KeyType: HASH
            - AttributeName: event_epoch
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: policy-timestamp-index
          KeySchema:
            - AttributeName: policy_id
              KeyType: HASH
            - AttributeName: event_epoch
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: governance

  # ---------------------------------------------------------------------------
  # SQS Queues
  # ---------------------------------------------------------------------------

  DeployQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    Properties:
      QueueName: !Sub "devops-deploy-queue${EnvironmentSuffix}.fifo"
      FifoQueue: true
      ContentBasedDeduplication: true
      VisibilityTimeout: 180
      MessageRetentionPeriod: 86400
      ReceiveMessageWaitTimeSeconds: 20
      SqsManagedSseEnabled: true
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: deployment

  FeedPublishQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    Properties:
      QueueName: !Sub "devops-feed-publish-queue${EnvironmentSuffix}.fifo"
      FifoQueue: true
      ContentBasedDeduplication: true
      # Must be >= devops-feed-publisher Timeout (600) or Lambda rejects the
      # event source mapping update during compute-stack deploys.
      VisibilityTimeout: 600
      MessageRetentionPeriod: 86400
      ReceiveMessageWaitTimeSeconds: 20
      SqsManagedSseEnabled: true
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: feed

  GraphSyncQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    Properties:
      QueueName: !Sub "devops-graph-sync-queue${EnvironmentSuffix}.fifo"
      FifoQueue: true
      ContentBasedDeduplication: true
      VisibilityTimeout: 120
      MessageRetentionPeriod: 86400
      ReceiveMessageWaitTimeSeconds: 20
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt GraphSyncDLQ.Arn
        maxReceiveCount: 3
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: graph

  GraphSyncDLQ:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    Properties:
      QueueName: !Sub "devops-graph-sync-dlq${EnvironmentSuffix}.fifo"
      FifoQueue: true
      ContentBasedDeduplication: true
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: graph

  # ENC-FTR-086 Ph1 / ENC-TSK-I82: write buffer between the convergence fan-out
  # (DynamoDB-stream-triggered) and the idempotent counter increment. FIFO with
  # per-attribute MessageGroupId so increments to one attribute are ordered while
  # distinct attributes process concurrently. ContentBasedDeduplication is OFF —
  # the fan-out supplies an explicit, deterministic MessageDeduplicationId.
  ConvergenceTelemetryQueue:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    Properties:
      QueueName: !Sub "enceladus-convergence-telemetry-queue${EnvironmentSuffix}.fifo"
      FifoQueue: true
      ContentBasedDeduplication: false
      # Must be >= the convergence Lambda Timeout (60) so a redelivery is not
      # made visible mid-processing.
      VisibilityTimeout: 120
      MessageRetentionPeriod: 86400
      ReceiveMessageWaitTimeSeconds: 20
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ConvergenceTelemetryDLQ.Arn
        maxReceiveCount: 5
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: convergence
        - Key: Feature
          Value: ENC-FTR-086

  ConvergenceTelemetryDLQ:
    Type: AWS::SQS::Queue
    DeletionPolicy: Retain
    Properties:
      QueueName: !Sub "enceladus-convergence-telemetry-dlq${EnvironmentSuffix}.fifo"
      FifoQueue: true
      ContentBasedDeduplication: false
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: convergence
        - Key: Feature
          Value: ENC-FTR-086

  # ---------------------------------------------------------------------------
  # SNS Topics
  # ---------------------------------------------------------------------------

  CoordinationDeadLetterTopic:
    Type: AWS::SNS::Topic
    DeletionPolicy: Retain
    Properties:
      TopicName: !Sub "coordination-dead-letter${EnvironmentSuffix}"
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: coordination

  FeedAlertsTopic:
    Type: AWS::SNS::Topic
    DeletionPolicy: Retain
    Properties:
      TopicName: !Sub "devops-feed-alerts${EnvironmentSuffix}"
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: feed

  ParquetReadyTopic:
    Type: AWS::SNS::Topic
    DeletionPolicy: Retain
    Properties:
      TopicName: !Sub "devops-json-parquet-ready${EnvironmentSuffix}"
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: analytics

  ProjectJsonSyncTopic:
    Type: AWS::SNS::Topic
    DeletionPolicy: Retain
    Properties:
      TopicName: !Sub "devops-project-json-sync${EnvironmentSuffix}"
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: feed

  # ENC-FTR-076 / ENC-TSK-E11: Notification topic fired by coordination_api
  # _handle_components_propose after a component is written with
  # lifecycle_status=proposed. Coord-lead approval workflow subscribes here.
  ComponentRegistryEventsTopic:
    Type: AWS::SNS::Topic
    DeletionPolicy: Retain
    Properties:
      TopicName: !Sub "enceladus-component-registry-events${EnvironmentSuffix}"
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: coordination

  # ENC-TSK-H47 / B63 Phase 2B: lesson constitutional-scoring work queue. tracker_mutation
  # publishes a {lesson.scoring.requested} message here after writing a lesson with
  # scoring_status='pending' (when enable_scoring_service_extraction is ON); the Scoring Service
  # Lambda (02-compute.yaml) subscribes and flips scoring_status -> 'scored' asynchronously.
  LessonScoringTopic:
    Type: AWS::SNS::Topic
    DeletionPolicy: Retain
    Properties:
      TopicName: !Sub "enceladus-lesson-scoring${EnvironmentSuffix}"
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: scoring

  # Agent ID v3 identity stores (ENC-TSK-I37 / ENC-FTR-117)
  AgentSessionsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "agent-sessions${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: !If [IsProduction, true, false]
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH
      # ENC-TSK-J04 / ENC-FTR-074 Ph3: stream feeds the AgentSessionsToGraphPipe ->
      # GraphSyncQueue -> graph_sync path so :AgentSession nodes + AUTHENTICATED_AS /
      # TRIGGERED_BY / MUTATED edges project asynchronously (no synchronous Neo4j write).
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: coordination
        - Key: Feature
          Value: ENC-FTR-117

  # Agent-type directory, keyed ENC-AGT-NNN.
  # Node properties: surface, model, cost_tier, status, usage_count.
  # Counter row: agent_type_id = "counter#ENC-AGT".
  AgentTypesTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "agent-types${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: !If [IsProduction, true, false]
      AttributeDefinitions:
        - AttributeName: agent_type_id
          AttributeType: S
      KeySchema:
        - AttributeName: agent_type_id
          KeyType: HASH
      # ENC-TSK-J04 / ENC-FTR-074 Ph3: stream feeds AgentTypesToGraphPipe so
      # :AgentIdentity nodes project asynchronously into Neo4j.
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: coordination
        - Key: Feature
          Value: ENC-FTR-117

  # ENC-TSK-J04 / ENC-FTR-074 Ph3: agent-credential lifecycle store, keyed CRED-<uuid4hex>.
  # Node properties: agent_identity_id, issued_at, status, revoked_at, revoked_reason,
  # rotated_from. Streamed to graph_sync (AgentCredentialsToGraphPipe) for :AgentCredential
  # nodes + OWNED_BY / DERIVED_FROM edges. Append-only lifecycle (issue -> rotate -> revoke)
  # via conditional writes in coordination_api/agent_id_alloc.py.
  AgentCredentialsTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "agent-credentials${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      DeletionProtectionEnabled: !If [IsProduction, true, false]
      AttributeDefinitions:
        - AttributeName: credential_id
          AttributeType: S
      KeySchema:
        - AttributeName: credential_id
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: coordination
        - Key: Feature
          Value: ENC-FTR-074

  # ENC-TSK-L25 / ENC-FTR-127 AC-10/16/17: per-user preferences (saved searches,
  # recently-viewed, prefs). PK = Cognito sub. Locked payload schema DOC-77D6C714867E
  # §15h; read/written exclusively by user_preferences_api. Gamma-only
  # (Condition: IsGamma): B67 Search2.0 wave work under the v4 gamma freeze
  # (DOC-499FA089EC30) — matches the UserPreferencesApiFunction/Role condition.
  UserPreferencesTable:
    Type: AWS::DynamoDB::Table
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "user-preferences${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sub
          AttributeType: S
      KeySchema:
        - AttributeName: sub
          KeyType: HASH
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: user-preferences-api
        - Key: Feature
          Value: ENC-FTR-127

  # ENC-TSK-I27 / ENC-FTR-116 Wave 2: canonical governance-version record.
  # Single-item table (version_id = "governance-version-current") written exclusively
  # by the recompute-governance Lambda (IAM sole-writer enforced by I28).
  # Single-region only — Global Tables degrade optimistic locking (CAS on cas_version).
  GovernanceVersionTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "governance-version${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: version_id
          AttributeType: S
      KeySchema:
        - AttributeName: version_id
          KeyType: HASH
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: governance

  # ENC-TSK-I88 / ENC-FTR-085 (ENC-PLN-006 v4/gamma): comp-percolation-monitor
  # nightly telemetry. One row per nightly run, keyed pk="date#YYYY-MM-DD".
  # Gamma-only (Condition: IsGamma) — v3-prod is frozen (DOC-499FA089EC30) and
  # this resource must never be created on the prod stack.
  PercolationTelemetryTable:
    Type: AWS::DynamoDB::Table
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "enceladus-percolation-telemetry${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: percolation-monitor
        - Key: Feature
          Value: ENC-FTR-085
  # ENC-FTR-086 Ph1 / ENC-TSK-I82: Convergence Surface attribute-value counter.
  # Frequency-ranked telemetry over canonical open-taxonomy values. One partition
  # per attribute (attribute_name = "{project_id}#{record_type}#{field}"); the
  # attribute_name-index GSI is count-ordered so it serves both ranked reads and
  # lowest-count eviction at the 10k cap. TTL on expires_at ages out stale rows.
  ConvergenceTelemetryTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: Retain
    Properties:
      TableName: !Sub "enceladus-convergence-telemetry${EnvironmentSuffix}"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: attribute_name
          AttributeType: S
        - AttributeName: canonical_value
          AttributeType: S
        - AttributeName: count
          AttributeType: N
      KeySchema:
        - AttributeName: attribute_name
          KeyType: HASH
        - AttributeName: canonical_value
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: attribute_name-index
          KeySchema:
            - AttributeName: attribute_name
              KeyType: HASH
            - AttributeName: count
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: expires_at
        Enabled: true
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: convergence
        - Key: Feature
          Value: ENC-FTR-086

Outputs:
  CoordinationTableName:
    Value: !Ref CoordinationRequestsTable
    Export:
      Name: !Sub ${AWS::StackName}-CoordinationTable
  CoordinationTableArn:
