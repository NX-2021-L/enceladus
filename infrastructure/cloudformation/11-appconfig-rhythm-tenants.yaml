AWSTemplateFormatVersion: '2010-09-09'
# ENC-TSK-N24: the original ENC-TSK-N18 top-level Description was 1181 chars,
# over CloudFormation's 1024-char Description limit — CreateChangeSet rejected
# the template with "Template format error: 'Description' length is greater
# than 1024", which is why the enceladus-rhythm-tenants stack was never
# created (N18's own deploy run failed earlier on missing params, masking
# this). Long-form documentation lives in this comment block instead.
#
# Each key under `tenants` is one tenant record consumed by
# backend/lambda/rhythm_cycle/tenant_invoker.py::get_manifest():
#
#   {
#     "tenants": {
#       "<name>": {
#         "beat": "heavy_integrate" | "light_integrate",
#         "enabled": false,               # kill switch; false = not invoked
#         "function_name": "<lambda name>",
#         "order": 10,                    # manifest ordering (ties -> name)
#         "expected_output_contract": {}   # tenant-defined, opaque here
#       }
#     }
#   }
#
# The `enabled` flag IS the addressable "rhythm.tenant.<name>.enabled" switch
# from the BRD — AppConfig hosted config is a single JSON document rather
# than flat key/value flags, so the flag is physically this nested boolean.
Description: >
  Enceladus Rhythm tenant manifest (ENC-TSK-N18/N23/N24, DOC-44230223DD1C
  4.1). Adds a rhythm-tenants configuration profile under the EXISTING
  AppConfig Application/Environment provisioned by 06-feature-flags.yaml,
  following the 09-appconfig-governance.yaml precedent (additive, no other
  profile touched). Tenant record shape, flag semantics, and per-tenant
  rationale are documented in comments in this template and in
  backend/lambda/rhythm_cycle/tenant_invoker.py.

Parameters:
  EnvironmentSuffix:
    Type: String
    Default: ""
    AllowedValues: ["", "-gamma"]
  AppConfigApplicationId:
    Type: String
    Description: >-
      AppConfig Application ID from the 06-feature-flags stack Outputs
      (ApplicationId). Pass via --parameter-overrides.
  AppConfigEnvironmentId:
    Type: String
    Description: >-
      AppConfig Environment ID from the 06-feature-flags stack Outputs
      (EnvironmentId). Pass via --parameter-overrides.

Resources:
  RhythmTenantsProfile:
    Type: AWS::AppConfig::ConfigurationProfile
    Properties:
      ApplicationId: !Ref AppConfigApplicationId
      Name: rhythm-tenants
      LocationUri: hosted
      Description: >-
        Ordered tenant manifest for the rhythm_cycle Heavy/Light Integrate
        beats (ENC-TSK-N18). One record per tenant; `enabled` is the kill
        switch. Wiring real tenants is ENC-TSK-N23/N24.
      Validators:
        - Type: JSON_SCHEMA
          Content: |
            {
              "$schema": "https://json-schema.org/draft/2019-09/schema",
              "type": "object",
              "properties": {
                "tenants": {
                  "type": "object",
                  "additionalProperties": {
                    "type": "object",
                    "properties": {
                      "beat": { "type": "string", "enum": ["heavy_integrate", "light_integrate"] },
                      "enabled": { "type": "boolean" },
                      "function_name": { "type": "string" },
                      "order": { "type": "number" },
                      "expected_output_contract": { "type": "object" }
                    },
                    "required": ["beat", "enabled", "function_name"],
                    "additionalProperties": false
                  }
                }
              },
              "additionalProperties": false
            }
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: rhythm-tenants

  # ENC-TSK-N23 (PLN-078 W2a): consolidation-arc tenants wired under the heavy
  # beat. Function names are the REAL deployed Lambdas (suffix-substituted per
  # environment), verified against `aws lambda list-functions` on gamma:
  #   enceladus-memory-consolidation-gamma, enceladus-handoff-consolidation-
  #   engine-gamma, devops-recompute-governance-gamma,
  #   enceladus-graph-health-metrics-gamma.
  #
  # recompute_governance is registered ENABLED=FALSE by design, not omission:
  # ENC-TSK-N18 deliberately kept the governance recompute as the in-beat,
  # contention-deferred hook (heavy_integrate._run_governance_recompute_hook,
  # skipped while a governance_hash_recompute checkout is active). Flipping
  # this flag true while that hook exists would double-run recompute every
  # heavy window and bypass the contention deferral — remove the hook in the
  # same change that enables the tenant. The manifest entry reserves the
  # tenant slot and pins its expected-output contract now (ENC-TSK-N23 AC-1).
  # ENC-TSK-N24 (PLN-078 W2b): entropy/telemetry tenants complete the heavy
  # manifest. Real deployed Lambdas verified via `aws lambda list-functions`:
  #   enceladus-corpus-entropy-engine-gamma, enceladus-percolation-monitor-
  #   gamma, enceladus-corpus-entropy-gdmp-remediation-gamma.
  #
  # SAFETY — gdmp_remediation is enabled=FALSE and MUST STAY FALSE until the
  # GDMP silent-data-loss defect (missing optimistic-concurrency on PATCH)
  # clears: the mutation ramp is armed and CEE_GDMP_HARD_DISABLED is the
  # sibling interlock. Do not flip this flag as part of routine onboarding.
  #
  # ENC-TSK-N32 (PLN-078 W4a, N09 activation): embedding_refresh is now wired
  # and enabled. devops-titan-embedding-backfill already does bounded
  # incremental refresh — skip_existing hash-gates the Titan call per record
  # (backend/lambda/titan_embedding_backfill/lambda_function.py), so a
  # per-heavy-window invocation re-embeds ONLY changed records and is
  # budget-safe. The Lambda also now honors the rhythm tenant-invoke
  # contract (completion stanza + EMBEDDING_REFRESH_MAX_PER_RUN cap) in
  # tenant-mode, mirroring the ENC-TSK-N23/N24 pattern.
  #
  # library_health_skillbuilder is REMOVED (ENC-TSK-N33): it was never a
  # lambda tenant (no dedicated function, no funded plan) and does not
  # belong in this single-writer manifest.
  RhythmTenantsInitialVersion:
    Type: AWS::AppConfig::HostedConfigurationVersion
    Properties:
      ApplicationId: !Ref AppConfigApplicationId
      ConfigurationProfileId: !Ref RhythmTenantsProfile
      ContentType: application/json
      Description: "ENC-TSK-N32: 6 enabled (adds embedding_refresh; GDMP off per safety gate; library_health_skillbuilder removed)"
      Content: !Sub |
        {
          "tenants": {
            "memory_consolidation": {
              "beat": "heavy_integrate",
              "enabled": true,
              "function_name": "enceladus-memory-consolidation${EnvironmentSuffix}",
              "order": 10,
              "expected_output_contract": {
                "artifact": "lesson-candidate draft documents in docstore per window",
                "min_per_window": 0,
                "window_hours": 12,
                "first_output_criterion": "FTR-096 Wave 2: >=1 organic lesson-candidate doc not named DOC-J46E2E*, or a documented threshold-tuning finding explaining why zero is correct"
              }
            },
            "handoff_consolidation_engine": {
              "beat": "heavy_integrate",
              "enabled": true,
              "function_name": "enceladus-handoff-consolidation-engine${EnvironmentSuffix}",
              "order": 20,
              "expected_output_contract": {
                "artifact": "HCE lesson-candidate documents proposed via Document API per adaptive-trigger cycle",
                "min_per_window": 0,
                "window_hours": 12,
                "adaptive_trigger": "trigger-skipped cycles report a status=skipped stanza, never silence"
              }
            },
            "recompute_governance": {
              "beat": "heavy_integrate",
              "enabled": false,
              "function_name": "devops-recompute-governance${EnvironmentSuffix}",
              "order": 30,
              "expected_output_contract": {
                "artifact": "governance version recompute rows per night",
                "window_hours": 12,
                "execution_path": "in-beat hook heavy_integrate._run_governance_recompute_hook (contention-deferred) remains authoritative per ENC-TSK-N18 design; this entry reserves the tenant slot + contract",
                "enable_precondition": "remove the in-beat hook in the same change that flips this flag, or recompute double-runs every heavy window"
              }
            },
            "graph_health_metrics": {
              "beat": "heavy_integrate",
              "enabled": true,
              "function_name": "enceladus-graph-health-metrics${EnvironmentSuffix}",
              "order": 40,
              "expected_output_contract": {
                "artifact": "Enceladus/GraphHealth CloudWatch metrics (GraphEdgeDensity, IsolatedNodeRatio, GraphNodeCount, FiedlerAlgebraicConnectivity) per window",
                "min_metrics_per_window": 4,
                "window_hours": 12
              }
            },
            "corpus_entropy_engine": {
              "beat": "heavy_integrate",
              "enabled": true,
              "function_name": "enceladus-corpus-entropy-engine${EnvironmentSuffix}",
              "order": 50,
              "expected_output_contract": {
                "artifact": "Enceladus/CEE entropy-category CloudWatch metrics + scan summary per window (orphan, stagnation, relational, retention, compliance_semantic)",
                "categories_per_window": 5,
                "window_hours": 12,
                "mutation": "none - telemetry-only detector (ENC-TSK-K41); GDMP remediation is a separate gated tenant"
              }
            },
            "percolation_monitor": {
              "beat": "heavy_integrate",
              "enabled": true,
              "function_name": "enceladus-percolation-monitor${EnvironmentSuffix}",
              "order": 60,
              "expected_output_contract": {
                "artifact": "percolation telemetry row (analytical_pc Molloy-Reed + empirical_pc Monte Carlo) in enceladus-percolation-telemetry + Enceladus/Percolation metrics",
                "rows_per_window": 1,
                "window_hours": 12
              }
            },
            "gdmp_remediation": {
              "beat": "heavy_integrate",
              "enabled": false,
              "function_name": "enceladus-corpus-entropy-gdmp-remediation${EnvironmentSuffix}",
              "order": 70,
              "expected_output_contract": {
                "artifact": "GDMP Stage-1 remediation report per window when enabled",
                "window_hours": 12,
                "safety_gate": "DO NOT ENABLE: GDMP mutation ramp armed with missing optimistic-concurrency on PATCH (silent-data-loss defect); CEE_GDMP_HARD_DISABLED interlock in force; flag clears only with that defect fix"
              }
            },
            "embedding_refresh": {
              "beat": "heavy_integrate",
              "enabled": true,
              "function_name": "devops-titan-embedding-backfill${EnvironmentSuffix}",
              "order": 80,
              "expected_output_contract": {
                "note": "per-heavy-window incremental refresh: re-embeds only records whose embedding_text_hash changed; hard-capped by EMBEDDING_REFRESH_MAX_PER_RUN",
                "window_hours": 12
              }
            }
          }
        }

  # ENC-TSK-N30: the custom RhythmTenantsDeploymentStrategy resource is
  # replaced by AWS's predefined "AppConfig.AllAtOnce" strategy (immediate
  # activation, no bake — identical semantics to the removed resource:
  # duration 0, bake 0, growth 100). Creating a custom strategy required the
  # account-scoped appconfig:CreateDeploymentStrategy grant the CFN deploy
  # role lacks (N24 bootstrap run 29195465126 403'd on it); referencing the
  # predefined strategy removes that grant class permanently. Predefined
  # strategy IDs are valid values for AWS::AppConfig::Deployment
  # DeploymentStrategyId, mirroring StartDeployment semantics.
  RhythmTenantsInitialDeployment:
    Type: AWS::AppConfig::Deployment
    Properties:
      ApplicationId: !Ref AppConfigApplicationId
      EnvironmentId: !Ref AppConfigEnvironmentId
      ConfigurationProfileId: !Ref RhythmTenantsProfile
      ConfigurationVersion: !Ref RhythmTenantsInitialVersion
      DeploymentStrategyId: "AppConfig.AllAtOnce"
      Description: "ENC-TSK-N30: activate full heavy tenant manifest (predefined AllAtOnce strategy)"

Outputs:
  RhythmTenantsProfileId:
    Value: !Ref RhythmTenantsProfile
    Export:
      Name: !Sub "${AWS::StackName}-RhythmTenantsProfileId"
