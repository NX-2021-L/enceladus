  # ---------------------------------------------------------------------------
  # ENC-TSK-K42 / B66 Ph5: GDMP Stage-1 auto-remediation Lambda. Consumes K41's
  # Compliance/Semantic detector output and deterministically resolves a
  # whitelist of compliance_warnings classes via documents.patch, advancing
  # raw documents to compliant maturity_state with no agent involvement.
  # DATA-SAFETY: GDMP_DRY_RUN=0, GDMP_MUTATION_ENABLED=1, GDMP_IO_APPROVAL_RUNS=3
  # (FTR-106 AC-4 io-approval-ramp pattern, same shape as UnlearningFunction).
  # Stage-1 mutation-ramp ARMED 2026-07-07 per io directive #2 (ENC-TSK-L90),
  # then DISARMED same day (ENC-TSK-L91): CEE_GDMP_HARD_DISABLED="1" pulls the
  # ~2026-07-11 4th-run mutation fuse after a silent-data-loss race + unauditable
  # ramp were confirmed. GDMP performs NO live documents.patch until io reviews
  # 3 nights of persisted candidate reports and gives an explicit go.
  # CEE_GDMP_HARD_DISABLED is the mandatory kill switch (ISS-465 cost-preflight
  # precedent), checked first thing in the handler. Gamma-only (Condition:
  # IsGamma): v3-prod is frozen (DOC-499FA089EC30).
  # ---------------------------------------------------------------------------
  CorpusEntropyGdmpRemediationFunction:
    Type: AWS::Lambda::Function
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      FunctionName: !Sub "enceladus-corpus-entropy-gdmp-remediation${EnvironmentSuffix}"
      Code:
        ZipFile: "# managed outside CloudFormation"
      Runtime: !If [IsGamma, python3.12, python3.11]
      Handler: lambda_function.lambda_handler
      MemorySize: 512
      Timeout: 300
      Architectures:
        - !If [IsGamma, arm64, x86_64]
      SnapStart: !If
        - SnapStartEnabled
        - ApplyOn: PublishedVersions
        - !Ref AWS::NoValue
      Role: !GetAtt CorpusEntropyGdmpRemediationRole.Arn
      Layers:
        - !Ref SharedLayerArn
        - !If
          - HasAppConfigLayer
          - !If [IsGamma, !Ref AppConfigExtensionLayerArnArm64, !Ref AppConfigExtensionLayerArnX86]
          - !Ref AWS::NoValue
      Environment:
        Variables:
          DOCUMENT_API_BASE: !Sub "https://enceladus-gamma.jreese.net/api/v1/documents"
          COORDINATION_INTERNAL_API_KEY: !Ref CoordinationInternalApiKey
          COORDINATION_INTERNAL_API_KEY_PREVIOUS: !Ref CoordinationInternalApiKeyPrevious
          PROJECT_ID: enceladus
          COMPLIANCE_SCORE_THRESHOLD: "70"
          GDMP_STATE_BUCKET: !Ref S3Bucket
          GDMP_STATE_PREFIX: !Sub "${S3EnvPrefix}gdmp-remediation-state"
          GDMP_MAX_DOCS_PER_RUN: "200"
          # DATA-SAFETY: Stage-1 mutation-ramp ARMED 2026-07-07 per io directive
          # #2 (ENC-TSK-L90). After the initial IO_APPROVAL_RUNS candidate
          # reports were reviewed, io flipped GDMP_DRY_RUN "1"->"0" and
          # GDMP_MUTATION_ENABLED "0"->"1". Mirrors UNLEARNING_* (K03) convention.
          # Mutation remains gated by the code-enforced io-approval ramp: the
          # handler's mutation_allowed() keeps the next 3 live nightly runs
          # candidate-report-only (run_count < GDMP_IO_APPROVAL_RUNS; the counter
          # increments only on non-dry runs and is currently 0) before the 4th
          # live run performs real documents.patch remediation.
          GDMP_DRY_RUN: "0"
          GDMP_MUTATION_ENABLED: "1"
          GDMP_IO_APPROVAL_RUNS: "3"
          # ISS-465-style kill switch -- checked FIRST in the handler, halts all
          # mutation regardless of ramp state. Mirrors CEE_HARD_DISABLED (K41) /
          # UNLEARNING_MUTATION_ENABLED (K03) sibling convention.
          # DISARMED 2026-07-07 (ENC-TSK-L91): set "1" to pull the ~2026-07-11
          # 4th-run mutation fuse after a silent-data-loss race + unauditable
          # ramp were confirmed on the L90 flip (architect-ruled load-bearing).
          # Codifies the live out-of-band disarm so no deploy reverts it.
          # Re-enable is io's explicit call post-soak -- do NOT flip back to "0"
          # without io go after 3 nights of persisted candidate reports.
          CEE_GDMP_HARD_DISABLED: "1"
          AWS_APPCONFIG_EXTENSION_POLL_INTERVAL_SECONDS: "45"
          APPCONFIG_APPLICATION: !If [HasAppConfigLayer, !Ref AppConfigApplicationId, !Ref "AWS::NoValue"]
          APPCONFIG_ENVIRONMENT: !If [HasAppConfigLayer, !Ref AppConfigEnvironmentId, !Ref "AWS::NoValue"]
          APPCONFIG_CONFIGURATION: feature-flags
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: corpus-entropy-gdmp-remediation
        - Key: Feature
          Value: ENC-TSK-K42

  # Nightly at 06:00 UTC -- after the CEE detection scan (05:00), so
  # remediation always sees the freshest Compliance/Semantic findings.
  CorpusEntropyGdmpRemediationSchedule:
    Type: AWS::Events::Rule
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      Name: !Sub "enceladus-corpus-entropy-gdmp-nightly${EnvironmentSuffix}"
      Description: "Nightly GDMP Stage-1 auto-remediation pass (ENC-TSK-K42 / B66 Ph5)"
      ScheduleExpression: "cron(0 6 * * ? *)"
      # ENC-TSK-N19: absorbed into the RhythmAbsorbed BRD 4.2 gate set. No-op today
