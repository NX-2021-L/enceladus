      State: !If [RhythmAbsorbed, DISABLED, ENABLED]
      Targets:
        - Arn: !GetAtt CorpusEntropyGdmpRemediationFunction.Arn
          Id: corpus-entropy-gdmp-nightly

  CorpusEntropyGdmpRemediationPermission:
