        - !Ref AWS::NoValue
      Role: !GetAtt IdServiceRole.Arn
      # ENC-TSK-K45 / B66 AC-1 posture: active X-Ray tracing (ID Service is a "Record"-class
      # service in the same sense as TrackerMutationFunction — it mints the canonical id).
      TracingConfig:
        Mode: Active
      Layers:
        - !Ref SharedLayerArn
      Environment:
        Variables:
          DYNAMODB_TABLE: !Sub "devops-project-tracker${EnvironmentSuffix}"
          DYNAMODB_REGION: !Ref AWS::Region
          ID_COUNTERS_TABLE: !Sub "enceladus-id-counters${EnvironmentSuffix}"
          IDEMPOTENCY_TABLE: !Sub "enceladus-id-idempotency${EnvironmentSuffix}"
          VIOLATIONS_TABLE: !Sub "enceladus-id-violations${EnvironmentSuffix}"
          HMAC_SECRET_ARN: !Ref IdServiceHmacSecret
          VIOLATION_THRESHOLD: "5"
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: id-service

