                  - s3:GetObject
                  - s3:DeleteObject
                Resource: !Sub "arn:aws:s3:::jreese-net/${S3EnvPrefix}agent-documents/*"
              # ENC-TSK-M59 / ENC-ISS-526: gamma's documents table carries rows cloned
              # from prod whose s3_key names the UNPREFIXED prod path; the bodies were
