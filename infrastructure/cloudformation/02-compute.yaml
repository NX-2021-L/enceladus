  DeployDecideFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    Properties:
      FunctionName: !Sub "devops-deploy-decide${EnvironmentSuffix}"
      Code:
        ZipFile: "# managed outside CloudFormation"
      Runtime: !If [IsGamma, python3.12, python3.11]
