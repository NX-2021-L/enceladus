  TrackerMutationRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      RoleName: !Sub "devops-tracker-mutation-lambda-role${EnvironmentSuffix}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      # ENC-ISS-401: CloudWatch Logs (CreateLogGroup/CreateLogStream/PutLogEvents). The
      # G95 codification below captured this role's INLINE policies from the live IAM dump
      # but missed its ATTACHED managed policies (logs + DynamoDB + projects). On gamma the
      # role is created fresh by this template, so those grants were absent and the Lambda
      # failed every request with 500 'Database read failed' (and had no log group).
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        # ENC-TSK-K45 / B66 AC-1: X-Ray active tracing write access ("Record" service).
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess
      Policies:
        # ENC-ISS-313 / ENC-TSK-G95: grants applied out-of-band by the tombstoned
        # per-Lambda deploy.sh ensure_role() (dropped by matrix-build migration
        # ENC-TSK-G43), codified here from the live IAM dump. Each statement is
        # proven to resolve identically to prod-live (EnvironmentSuffix='') and
        # gamma-live (EnvironmentSuffix='-gamma'). See tools/iam-audit/.
        # ENC-ISS-401: the DynamoDB + projects grants below were ATTACHED managed
        # policies on prod-live (devops-tracker-dynamodb-policy, projects-read-policy)
        # which are scoped to PROD table ARNs — so they are codified inline here with
        # EnvironmentSuffix instead, resolving to the correct per-env table on gamma too.
        - PolicyName: tracker-dynamodb
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: TrackerTableAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DescribeTable
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/devops-project-tracker${EnvironmentSuffix}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/devops-project-tracker${EnvironmentSuffix}/index/*"
              # ENC-ISS-509: gamma's tracker table is a physically separate, one-time-seeded
              # DynamoDB table (devops-project-tracker-gamma) that is never continuously synced
              # from the canonical governed table, so recently-created records 404 on gamma's
              # PWA detail route. Read-only least-privilege GetItem fallback onto the canonical
              # (un-suffixed) table lets tracker_mutation._get_record_full_with_gamma_fallback
              # resolve a gamma-table miss for GET-detail only. Omitted entirely on prod (IsGamma
              # false) since prod's own tracker-table statement above already covers that ARN.
              - !If
                - IsGamma
                - Sid: TrackerTableCanonicalReadFallback
                  Effect: Allow
                  Action:
                    - dynamodb:GetItem
                  Resource:
                    - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/devops-project-tracker"
                - !Ref AWS::NoValue
              - Sid: RelationshipsTableAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DescribeTable
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/enceladus-relationships${EnvironmentSuffix}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/enceladus-relationships${EnvironmentSuffix}/index/*"
        # ENC-TSK-L06 / B63 Phase 2 AC-6 — AC-0 IAM isolation note: counter allocation now
        # lives in the DEDICATED IdCountersTable (see IdServiceRole / IdCountersTableAccess
        # below), not in this table's counter#* rows. TrackerMutationRole intentionally
        # carries NO grant of any kind on enceladus-id-counters${EnvironmentSuffix} — table-
        # level IAM isolation via ordinary resource-scoped Allow/Deny, which is the AWS-native
        # mechanism that actually works here. (An earlier draft of this policy attempted a
        # dynamodb:LeadingKeys condition DENY scoped to counter#* directly on THIS table, but
        # that condition key can only constrain the PARTITION key (project_id), not the sort
        # key (record_id) where counter#* actually lives — it would have silently been a
        # no-op. Table separation is the correct fix, not a same-table condition.) Legacy
        # counter#* rows written by the pre-L06 inline path remain in this table as
        # historical data only; the flag-OFF rollback path still reads/writes them here via
        # the existing TrackerTableAccess grant above (unchanged, zero new restriction on the
        # rollback path itself).
        - PolicyName: projects-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: ProjectsRead
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/projects${EnvironmentSuffix}"
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/projects${EnvironmentSuffix}/index/*"
        - PolicyName: eventbridge-put-events
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - events:PutEvents
                Resource: !Sub "arn:aws:events:${AWS::Region}:${AWS::AccountId}:event-bus/default"
        - PolicyName: AppConfigAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: AppConfigRead
                Effect: Allow
                Action:
                  - appconfig:GetConfiguration
                  - appconfig:GetLatestConfiguration
                  - appconfig:StartConfigurationSession
                Resource: "*"
        # ENC-TSK-H46: allow tracker_mutation to synchronously invoke the Lifecycle Service.
        - PolicyName: invoke-lifecycle-service
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: InvokeLifecycleService
                Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:enceladus-lifecycle-service${EnvironmentSuffix}"
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:enceladus-lifecycle-service${EnvironmentSuffix}:*"
        # ENC-TSK-L06: allow tracker_mutation to synchronously (allocate) and asynchronously
        # (record_violation, Event invocation) invoke the ID Service. This is the ONLY grant
        # tracker_mutation's role holds anywhere near record-ID allocation — it has no direct
        # access to IdCountersTable or IdIdempotencyTable (AC-0 isolation).
        - PolicyName: invoke-id-service
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: InvokeIdService
                Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:enceladus-id-service${EnvironmentSuffix}"
                  - !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:enceladus-id-service${EnvironmentSuffix}:*"
        # ENC-TSK-H47: allow tracker_mutation to publish lesson-scoring requests to the Scoring
        # Service SNS topic (least-privilege: this one topic only).
        - PolicyName: publish-lesson-scoring
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: PublishLessonScoring
                Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:enceladus-lesson-scoring${EnvironmentSuffix}"
              # ENC-TSK-J72 / ENC-FTR-121 Ph5: escalation notifications to io
              # ride the existing feed-alerts topic (DOC-5B888FCA43B8 §5.8).
              - Sid: PublishEscalationAlerts
                Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:devops-feed-alerts${EnvironmentSuffix}"

