        - ApplyOn: PublishedVersions
        - !Ref AWS::NoValue
      Role: !GetAtt DeployOrchestratorRole.Arn
      Layers:
        - !Ref SharedLayerArn
        - !If
          - HasAppConfigLayer
          - !If [IsGamma, !Ref AppConfigExtensionLayerArnArm64, !Ref AppConfigExtensionLayerArnX86]
          - !Ref AWS::NoValue
