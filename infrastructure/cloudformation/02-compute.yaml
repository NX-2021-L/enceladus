        - Key: Component
          Value: scoring

  # ENC-TSK-H47: subscribe the Scoring Service to the lesson-scoring topic (async fan-out). Lambda
  # protocol SNS subscriptions cannot use raw message delivery, so the function receives the
  # standard SNS Notification envelope ({Records:[{Sns:{Message}}]}), which the handler unwraps.
  ScoringServiceSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:enceladus-lesson-scoring${EnvironmentSuffix}"
      Protocol: lambda
      Endpoint: !GetAtt ScoringServiceFunction.Arn

  # ENC-TSK-H47: allow SNS to invoke the Scoring Service for the subscription above.
  ScoringServiceSnsPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ScoringServiceFunction
      Action: lambda:InvokeFunction
      Principal: sns.amazonaws.com
      SourceArn: !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:enceladus-lesson-scoring${EnvironmentSuffix}"

  # ENC-TSK-L06 / B63 Phase 2 AC-6 — shared secret for HMAC-SHA256 record_id provenance
  # signing. CFN-generates the secret material server-side (GenerateSecretString) so no
  # plaintext ever passes through a git commit, CI log, or agent session — mirroring the
  # AgentM2MClientSecret pattern (infrastructure/cloudformation/08-agent-auth.yaml). The
  # ID Service reads this by ARN (HMAC_SECRET_ARN env var) via secretsmanager:GetSecretValue,
  # cached at cold start; graph_sync / graph_query_api read the SAME secret to verify
  # provenance on projection (AC-2's "and verified on projection").
  IdServiceHmacSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "enceladus/id-service/hmac-key${EnvironmentSuffix}"
      Description: >
        HMAC-SHA256 shared secret for ID Service record_id provenance signing (ENC-TSK-L06).
        Generated by CloudFormation at stack-create time; no plaintext ever committed to
        source control or handled by an agent session.
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: hmac_key
        PasswordLength: 64
        ExcludePunctuation: true
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: id-service

  # ENC-TSK-L06 / B63 Phase 2 AC-6 — ID Service. Standalone Lambda that is the SOLE
  # authority for record-ID allocation (counter#* keys in the tracker table), the
  # idempotency-key contract (AC-1), and HMAC provenance signing (AC-2). Synchronously
  # invoked by tracker_mutation (RequestResponse, FAIL-CLOSED — mirrors the Lifecycle
  # Service posture exactly). Also owns the trust-score violation counter (AC-4),
  # invoked fire-and-forget (Event) by tracker_mutation's edge-layer rejection guard.
  IdServiceFunction:
