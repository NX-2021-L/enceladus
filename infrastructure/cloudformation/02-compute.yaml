  # ENC-FTR-091 / ENC-TSK-F87 — Deploy Parity Validator
  DeployParityValidatorFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    Properties:
      FunctionName: !Sub "devops-deploy-parity-validator${EnvironmentSuffix}"
      Code:
        ZipFile: "# managed outside CloudFormation"
      Runtime: !If [IsGamma, python3.12, python3.11]
      Handler: lambda_function.lambda_handler
      MemorySize: 512
      # ENC-TSK-G43: raised from 120 to 300 to fit chained
      # daily_drift_audit + mentions_drift_audit (~100 graphsearch round-trips)
      # in one EventBridge-triggered invocation.
      Timeout: 300
      Architectures:
        - !If [IsGamma, arm64, x86_64]
      SnapStart: !If
        - SnapStartEnabled
        - ApplyOn: PublishedVersions
        - !Ref AWS::NoValue
      Role: !GetAtt DeployParityValidatorRole.Arn
      Layers:
        - !Ref SharedLayerArn
        - !If
          - HasAppConfigLayer
          - !If [IsGamma, !Ref AppConfigExtensionLayerArnArm64, !Ref AppConfigExtensionLayerArnX86]
          - !Ref AWS::NoValue
      Environment:
        Variables:
          DEPLOY_TABLE: !Sub "devops-deployment-manager${EnvironmentSuffix}"
          DEPLOY_REGION: !Ref AWS::Region
          ENVIRONMENT_SUFFIX: !Ref EnvironmentSuffix
          GITHUB_TOKEN_SECRET: devops/github-app/private-key
          DOCUMENT_API_URL: https://8nkzqkmxqc.execute-api.us-west-2.amazonaws.com/api/v1
          TRACKER_API_URL: https://8nkzqkmxqc.execute-api.us-west-2.amazonaws.com/api/v1/tracker
          AWS_APPCONFIG_EXTENSION_POLL_INTERVAL_SECONDS: "45"
          APPCONFIG_APPLICATION: !If [HasAppConfigLayer, !Ref AppConfigApplicationId, !Ref "AWS::NoValue"]
          APPCONFIG_ENVIRONMENT: !If [HasAppConfigLayer, !Ref AppConfigEnvironmentId, !Ref "AWS::NoValue"]
          APPCONFIG_CONFIGURATION: feature-flags
          SNS_TOPIC_ARN: !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:enceladus-deploy-alerts"
          CFN_DRIFT_STACKS: "enceladus-data,enceladus-api,enceladus-github-roles,enceladus-monitoring"
          SNAPSTART_MAX_STALE_VERSIONS: "5"
          DRIFT_POLL_TIMEOUT: "240"
          # ENC-TSK-G43 / ENC-FTR-098 AC-7 — mentions_drift_audit
          TRACKER_TABLE:    !Sub "devops-project-tracker${EnvironmentSuffix}"
          DOCUMENTS_TABLE:  !Sub "documents${EnvironmentSuffix}"
          MENTIONS_AUDIT_SAMPLE_SIZE: "100"
          MENTIONS_AUDIT_THRESHOLD:   "0.01"
          # ENC-TSK-L87: root cause of the escalating MENTIONS drift ratio.
          # TRACKER_TABLE/DOCUMENTS_TABLE above are correctly environment-scoped
          # (via EnvironmentSuffix) so "expected" mentions are extracted from
          # THIS environment's DynamoDB rows, but TRACKER_API_URL above is
          # hardcoded to the prod API Gateway (8nkzqkmxqc) on both prod and
          # gamma -- so _current_mentions_for()'s graphsearch lookup (the
          # "actual" side of the diff) was comparing gamma DynamoDB content
          # against PROD's Neo4j graph on the gamma validator, not gamma's own
          # graph. Verified live: prod graphsearch for ENC-TSK-005 returned the
          # stale 2026-02-23 seed updated_at while gamma's own graph reflected
          # a same-day write -- proof the two graphs are genuinely independent.
          # graph_query_api._current_mentions_for already supports this exact
          # override (falls back to TRACKER_API_URL/graphsearch only if unset)
          # -- it was simply never wired up in CFN. TRACKER_API_URL itself is
          # left untouched (both environments still emit drift ENC-ISS records
          # into the shared meta-governance tracker for cross-environment
          # visibility); only the comparison target changes for gamma.
          GRAPHSEARCH_URL: !If
            - IsGamma
            - https://hi0dzmvqrc.execute-api.us-west-2.amazonaws.com/api/v1/tracker/graphsearch
            - !Ref "AWS::NoValue"
          # Required for the audit to POST drift findings to tracker_api
          # (X-Coordination-Internal-Key) and to query graph_query_api when
          # they enforce internal-key auth on service-to-service calls.
          COORDINATION_INTERNAL_API_KEY: !Ref CoordinationInternalApiKey
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: deployment

  FeedPublisherFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    Properties:
      FunctionName: !Sub "devops-feed-publisher${EnvironmentSuffix}"
      Code:
        ZipFile: "# managed outside CloudFormation"
      Runtime: !If [IsGamma, python3.12, python3.11]
      Handler: lambda_function.handler
      MemorySize: 512
      Timeout: 600
      Architectures:
        - !If [IsGamma, arm64, x86_64]
      SnapStart: !If
        - SnapStartEnabled
        - ApplyOn: PublishedVersions
        - !Ref AWS::NoValue
      Role: !GetAtt FeedPublisherRole.Arn
      Description: Event-driven mobile feed publisher triggered by DynamoDB Streams via SQS FIFO
      Layers:
        - !Ref SharedLayerArn
        - !If
          - HasAppConfigLayer
          - !If [IsGamma, !Ref AppConfigExtensionLayerArnArm64, !Ref AppConfigExtensionLayerArnX86]
          - !Ref AWS::NoValue
      Environment:
        Variables:
          TRACKER_TABLE: !Sub "devops-project-tracker${EnvironmentSuffix}"
          TRACKER_REGION: !Ref AWS::Region
          PROJECTS_TABLE: !Sub "projects${EnvironmentSuffix}"
          PROJECTS_REGION: !Ref AWS::Region
          # ENC-TSK-K69: without this the code default is the PROD "documents"
          # table (feed_utils.DEFAULT_DOCUMENTS_TABLE) — the gamma publisher
          # was reading prod documents cross-env. Prod rendering: "documents"
          # (identical to the code default; no-op).
          DOCUMENTS_TABLE: !Sub "documents${EnvironmentSuffix}"
          # ENC-TSK-K69 gamma env isolation: publish snapshots into the ui-v2
          # origin bucket (07-ui-cdn.yaml exports) so the PWA's same-origin
          # VITE_FEED_BASE_URL=/mobile/v1 fetch resolves through the gamma
          # distribution, and invalidate THAT distribution — not the prod
          # E2BOQXCW1TA6Y4 code default (whose grant is IsProduction-gated
          # anyway, so gamma invalidations were failing silently). Prod
          # branches render byte-identical to the previous template
          # (jreese-net + ${S3EnvPrefix}mobile/v1 + CF_DISTRIBUTION absent ->
          # code default).
          FEED_BUCKET: !If
            - IsGamma
            - !ImportValue "enceladus-ui-cdn-gamma-UiBucketName"
            - !Ref S3Bucket
          FEED_PREFIX: !If
            - IsGamma
            - "mobile/v1"
            - !Sub "${S3EnvPrefix}mobile/v1"
          CF_DISTRIBUTION: !If
            - IsGamma
            - !ImportValue "enceladus-ui-cdn-gamma-UiDistributionId"
            - !Ref "AWS::NoValue"
          # ENC-TSK-K98: gamma's /mobile/v1 objects are served PUBLICLY by the
          # shared UI-origin cockpit CDN (full-record data leak). The ui-v2
          # cockpit now reads its snapshot from the authenticated feed_query API,
          # so disable the public mobile publish + CF invalidation on gamma.
          # Prod omits the var -> lambda default "true" (unchanged behaviour).
          FEED_S3_PUBLISH_ENABLED: !If
            - IsGamma
            - "false"
            - !Ref "AWS::NoValue"
          EVENT_BUS: default
          DEPLOY_TABLE: !Sub "devops-deployment-manager${EnvironmentSuffix}"
          AWS_APPCONFIG_EXTENSION_POLL_INTERVAL_SECONDS: "45"
          APPCONFIG_APPLICATION: !If [HasAppConfigLayer, !Ref AppConfigApplicationId, !Ref "AWS::NoValue"]
          APPCONFIG_ENVIRONMENT: !If [HasAppConfigLayer, !Ref AppConfigEnvironmentId, !Ref "AWS::NoValue"]
          APPCONFIG_CONFIGURATION: feature-flags
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: feed

