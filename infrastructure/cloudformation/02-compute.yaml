          S3_BUCKET: !Ref S3Bucket
          S3_PREFIX: !Sub "${S3EnvPrefix}agent-documents"
          S3_REFERENCE_PREFIX: !Sub "${S3EnvPrefix}mobile/v1/reference"
          S3_GOVERNANCE_PREFIX: !Sub "${S3EnvPrefix}governance/live"
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: documents

  ProjectServiceFunction:
