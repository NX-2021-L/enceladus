  # ENC-TSK-L06 / B63 Phase 2 AC-6 — execution role for the ID Service. AC-0 IAM isolation:
  # this is the ONLY role in the account granted any access to IdCountersTable (the
  # dedicated counter-allocation table — see IdCountersTableAccess below). Table-level
  # resource-ARN scoping is the AWS-native isolation mechanism here: TrackerMutationRole
  # carries NO statement referencing enceladus-id-counters${EnvironmentSuffix} anywhere in
  # its policy, so it structurally cannot touch a counter item even via a misconfigured
  # future edit — there's no condition to accidentally loosen. This role does still need
  # READ-ONLY Query access to the main tracker table (TrackerReadOnlyForSeed) for the
  # `_max_existing_number` cold-start fallback scan (when a counter has never been seeded,
  # e.g. right after this migration for a project/record_type pairing with pre-L06 history).
  # Also holds exclusive write access to the new idempotency + violations tables, and
  # read-only access to its own HMAC signing secret.
  IdServiceRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      RoleName: !Sub "enceladus-id-service-lambda-role${EnvironmentSuffix}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: enceladus-id-service-inline
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/enceladus-id-service${EnvironmentSuffix}*"
              - Sid: XRayTracing
                Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                Resource: "*"
              # AC-0: exclusive counter allocation access. No other role in the account
              # (including TrackerMutationRole) references this table's ARN anywhere.
              - Sid: IdCountersTableAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/enceladus-id-counters${EnvironmentSuffix}"
              # Read-only fallback: _max_existing_number scans the main tracker table by
              # record_type# prefix ONLY when a counter has no seed yet (e.g. first
              # allocation for a project/record_type pairing predating this migration).
              # No write access of any kind to this table.
              - Sid: TrackerReadOnlyForSeed
                Effect: Allow
                Action:
                  - dynamodb:Query
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/devops-project-tracker${EnvironmentSuffix}"
              - Sid: IdIdempotencyTableAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/enceladus-id-idempotency${EnvironmentSuffix}"
              - Sid: IdViolationsTableAccess
                Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource:
                  - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/enceladus-id-violations${EnvironmentSuffix}"
              - Sid: HmacSecretRead
                Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref IdServiceHmacSecret

