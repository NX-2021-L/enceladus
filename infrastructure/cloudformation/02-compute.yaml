          GITHUB_INSTALLATION_ID: !Ref GitHubInstallationId
          GITHUB_PRIVATE_KEY_SECRET: devops/github-app/private-key
          ALLOWED_REPOS: NX-2021-L/enceladus
          GAMMA_INTEGRATION_BRANCH: v4/main
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: deployment

  FeedPublisherFunction:
