  # ENC-TSK-L10 (B64 Ph3): MCP Streamable HTTP over true Lambda response streaming.
  # Distinct from enceladus-mcp-streamable (ENC-FTR-025, Function URL, BUFFERED,
  # event-per-invocation) -- this runs as a persistent Starlette/uvicorn server
  # behind the AWS Lambda Web Adapter so API Gateway REST API's
  # responseTransferMode=STREAM integration (03-api.yaml) can invoke it via
  # InvokeWithResponseStream. Reuses server.py's tool surface (asgi_app.py).
  # SnapStart explicitly NOT enabled -- unproven combination with a Web-Adapter
  # subprocess model; correctness over cold-start optimization for this first cut.
  # Gamma-only (Condition: IsGamma), 15-min timeout per AC.
  McpStreamingGatewayFunction:
    Type: AWS::Lambda::Function
    Condition: IsGamma
    DeletionPolicy: Retain
    Properties:
      FunctionName: !Sub "enceladus-mcp-streaming-gateway${EnvironmentSuffix}"
      Code:
        ZipFile: "# managed outside CloudFormation"
      Runtime: !If [IsGamma, python3.12, python3.11]
      Handler: run.sh
      MemorySize: 512
      Timeout: 900
      Architectures:
        - !If [IsGamma, arm64, x86_64]
      # ENC-TSK-M11 / B66 AC-0 / ENC-TSK-K45 AC-0: active X-Ray tracing. This
      # resource is stack-owned (CREATE_COMPLETE via enceladus-compute-gamma,
      # not CFN-IMPORTed), so a normal change-set diffs and applies this
      # property directly -- unlike the ENC-ISS-497 IMPORTed-resource gap that
      # affects CheckoutServiceFunction (K44/K45/K66) and EnceladusMcpCodeGammaFunction.
      TracingConfig:
        Mode: Active
      Role: !GetAtt McpStreamingGatewayRole.Arn
      Layers:
        - !Ref SharedLayerArn
        - !If
          - IsGamma
          - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerArm64:28"
          - !Sub "arn:aws:lambda:${AWS::Region}:753240598075:layer:LambdaAdapterLayerX86:28"
      Environment:
        Variables:
          AWS_LAMBDA_EXEC_WRAPPER: /opt/bootstrap
          AWS_LWA_PORT: "8080"
          AWS_LWA_INVOKE_MODE: response_stream
          ENCELADUS_MCP_TRANSPORT: streamable_http
          COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
          COGNITO_CLIENT_ID: !Ref CognitoClientId
          ENCELADUS_COORDINATION_API_URL: https://enceladus-gamma.jreese.net/api/v1
          ENCELADUS_TRACKER_API_BASE: https://enceladus-gamma.jreese.net/api/v1/tracker
          ENCELADUS_GRAPH_QUERY_API_BASE: https://enceladus-gamma.jreese.net/api/v1/tracker/graphsearch
          CORS_ORIGIN: !Ref CorsOrigin
      Tags:
        - Key: Project
          Value: enceladus
        - Key: Component
          Value: mcp-streaming-gateway
        - Key: Feature
          Value: ENC-TSK-L10

