AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Enceladus Monitoring Stack — Production health probes, CodeSize sentinel,
  error rate alarms, and SNS alerting. ENC-TSK-D20 / ENC-PLN-020 Phase 4.

Parameters:
  EnvironmentSuffix:
    Type: String
    Default: ""
    AllowedValues: ["", "-gamma"]
  SnsTopicArn:
    Type: String
    Default: ""
    Description: >
      Optional ARN of an existing SNS topic for alarm actions.
      If empty, alarms are created without notification actions.
      Create the topic manually: aws sns create-topic --name enceladus-deploy-alerts

Conditions:
  IsGamma: !Not [!Equals [!Ref EnvironmentSuffix, ""]]
  HasSnsTopic: !Not [!Equals [!Ref SnsTopicArn, ""]]

Resources:

  # ---------------------------------------------------------------------------
  # Health Probe Lambda — ENC-TSK-K44 / ENC-FTR-071: the Lambda function
  # (AWS::Lambda::Function) + its execution role now live in
  # infrastructure/cloudformation/02-compute.yaml so the Lambda Workflow
  # Coverage Guard (which only parses that template) recognizes the function.
  # This template keeps the pieces that reference it by name: the EventBridge
  # 15-min schedule + invoke permission, and the CloudWatch Alarms. Mirrors
  # the existing cross-stack-by-ARN pattern already used below for
  # devops-deploy-parity-validator / devops-env-drift-auditor.
  # ---------------------------------------------------------------------------
  ProdHealthMonitorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub "enceladus-prod-health-monitor${EnvironmentSuffix}"
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt HealthProbeScheduleRule.Arn

  # ---------------------------------------------------------------------------
  # EventBridge rule — every 15 minutes
  # ---------------------------------------------------------------------------
  HealthProbeScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "enceladus-health-probe-schedule${EnvironmentSuffix}"
      Description: Triggers production health monitor Lambda every 15 minutes
      ScheduleExpression: "rate(15 minutes)"
      State: ENABLED
      Targets:
        - Id: ProdHealthMonitorTarget
          Arn: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:enceladus-prod-health-monitor${EnvironmentSuffix}"

  # ---------------------------------------------------------------------------
  # ENC-TSK-K43 (B66 Ph5) — Fiedler lambda-2 GraphHealth metric schedule
  # ---------------------------------------------------------------------------
  # Gamma re-delivery of ENC-TSK-C10 (v3, closed). Triggers the existing
  # devops-graph-query-api Lambda every 15 minutes (same cadence as
  # HealthProbeScheduleRule above) with action='publish_graph_health', which
  # computes the graph's Fiedler value (lambda2, algebraic connectivity) via
  # the FTR-088 CSR/Fiedler _query_laplacian path (ISS-465-compliant: no GDS
  # projection) and publishes it to the Enceladus/GraphHealth CloudWatch
  # namespace. No new Lambda function — targets the existing graph_query_api
  # function by ARN + Input, mirroring the ParityDriftDailyScheduleRule
  # precedent immediately below of pointing a schedule's Input at an existing
  # multi-action Lambda rather than minting a dedicated one.
  GraphHealthScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "enceladus-graph-health-schedule${EnvironmentSuffix}"
      Description: >
        Triggers graph_query_api publish_graph_health (Fiedler lambda2 ->
        Enceladus/GraphHealth) every 15 minutes (ENC-TSK-K43)
      ScheduleExpression: "rate(15 minutes)"
      State: ENABLED
      Targets:
        - Id: GraphHealthMetricTarget
          Arn: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-graph-query-api${EnvironmentSuffix}"
          Input: '{"action": "publish_graph_health"}'

  GraphHealthScheduleInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub "devops-graph-query-api${EnvironmentSuffix}"
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt GraphHealthScheduleRule.Arn

  # ---------------------------------------------------------------------------
  # ENC-TSK-K43 (B66 Ph5) — Fiedler lambda-2 GraphHealth metric schedule
  # ---------------------------------------------------------------------------
  # Gamma re-delivery of ENC-TSK-C10 (v3, closed). Triggers the existing
  # devops-graph-query-api Lambda every 15 minutes (same cadence as
  # HealthProbeScheduleRule above) with action='publish_graph_health', which
  # computes the graph's Fiedler value (lambda2, algebraic connectivity) via
  # the FTR-088 CSR/Fiedler _query_laplacian path (ISS-465-compliant: no GDS
  # projection) and publishes it to the Enceladus/GraphHealth CloudWatch
  # namespace. No new Lambda function — targets the existing graph_query_api
  # function by ARN + Input, mirroring the ParityDriftDailyScheduleRule
  # precedent immediately below of pointing a schedule's Input at an existing
  # multi-action Lambda rather than minting a dedicated one.
  GraphHealthScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "enceladus-graph-health-schedule${EnvironmentSuffix}"
      Description: >
        Triggers graph_query_api publish_graph_health (Fiedler lambda2 ->
        Enceladus/GraphHealth) every 15 minutes (ENC-TSK-K43)
      ScheduleExpression: "rate(15 minutes)"
      State: ENABLED
      Targets:
        - Id: GraphHealthMetricTarget
          Arn: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-graph-query-api${EnvironmentSuffix}"
          Input: '{"action": "publish_graph_health"}'

  GraphHealthScheduleInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub "devops-graph-query-api${EnvironmentSuffix}"
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt GraphHealthScheduleRule.Arn

  # ---------------------------------------------------------------------------
  # ENC-TSK-F64 / ENC-FTR-090 AC-20 — Daily parity + drift schedule
  # ---------------------------------------------------------------------------
  # Extends devops-deploy-parity-validator (ENC-TSK-F87) via EventBridge to run
  # daily at 10:00 UTC with action=daily_drift_audit. Adds to its scope:
  #   (a) CFN detect_stack_drift across enceladus-data/api/github-roles/monitoring
  #   (b) CodeSize < 1024 bytes anomaly detection (CFN stomp — ENC-FTR-068 AC-5)
  #   (c) SnapStart published-version count audit (>5 stale triggers SNS alert)
  # No new Lambda created; all logic consolidated in deploy-parity-validator per
  # ENC-LSN-027 (minimise blast-radius surface).

  ParityDriftDailyScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "devops-parity-drift-daily${EnvironmentSuffix}"
      Description: >
        Triggers deploy-parity-validator daily_drift_audit at 10:00 UTC (ENC-TSK-F64 / AC-20)
      ScheduleExpression: "cron(0 10 * * ? *)"
      State: ENABLED
      Targets:
        - Id: ParityDriftDailyTarget
          Arn: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-deploy-parity-validator${EnvironmentSuffix}"
          Input: '{"action": "daily_drift_audit"}'

  ParityDriftDailyInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub "devops-deploy-parity-validator${EnvironmentSuffix}"
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ParityDriftDailyScheduleRule.Arn

  # ---------------------------------------------------------------------------
  # ENC-ISS-283 / ENC-LSN-027 — Env Drift Auditor schedule
  # ---------------------------------------------------------------------------
  # The Lambda function itself + its IAM role were created out-of-band during
  # the 2026-04-20 io-override session (DOC-298D807FB175). This block owns the
  # EventBridge rule + lambda:InvokeFunction permission so the schedule is
  # IaC-managed and visible to the CFN drift audit. Mirror of the
  # DeployCapabilityAuditor pattern directly above.
  #
  # Adopting the existing Lambda + role into CFN requires a stack-update with
  # resource-import; tracked in ENC-TSK-F56 AC#2. Until imported, the Lambda
  # and role are orphan in CFN but live in AWS.

  EnvDriftAuditorScheduleRule:
    Type: AWS::Events::Rule
    DeletionPolicy: Retain
    Properties:
      Name: !Sub "devops-env-drift-auditor-hourly${EnvironmentSuffix}"
      Description: Triggers env drift auditor Lambda hourly at :07 past the hour
      ScheduleExpression: "cron(7 * * * ? *)"
      State: ENABLED
      Targets:
        - Id: EnvDriftAuditorTarget
          Arn: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-env-drift-auditor${EnvironmentSuffix}"

  EnvDriftAuditorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub "devops-env-drift-auditor${EnvironmentSuffix}"
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EnvDriftAuditorScheduleRule.Arn

  # ---------------------------------------------------------------------------
  # CloudWatch Alarms
  # ---------------------------------------------------------------------------

  # CodeSize stomp sentinel — any Lambda < 1024 bytes
  CodeSizeMinimumAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "enceladus-prod-codesize-minimum${EnvironmentSuffix}"
      AlarmDescription: >
        Triggers when any monitored Lambda has CodeSize < 1024 bytes,
        indicating a likely CFN ZipFile stub overwrite. Zero false positives —
        production Lambdas are always > 1024 bytes.
      Namespace: Enceladus/Prod
      MetricName: LambdaCodeSize
      Statistic: Minimum
      Period: 900
      EvaluationPeriods: 1
      Threshold: 1024
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions: !If
        - HasSnsTopic
        - [!Ref SnsTopicArn]
        - !Ref "AWS::NoValue"

  # Lambda error rate alarm — Errors > 5 in 5 minutes across all functions
  LambdaErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "enceladus-prod-lambda-error-rate${EnvironmentSuffix}"
      AlarmDescription: >
        Triggers when total Lambda errors across all Enceladus functions
        exceed 5 in a 5-minute window.
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasSnsTopic
        - [!Ref SnsTopicArn]
        - !Ref "AWS::NoValue"

  # ---------------------------------------------------------------------------
  # ENC-TSK-K44 / ENC-FTR-071 — B66 Ph5 dashboard data-source alarms.
  # Thresholds documented alongside the metric publishers in
  # backend/lambda/prod_health_monitor/lambda_function.py (keep in sync).
  # ---------------------------------------------------------------------------

  # DynamoDB throttle — any throttled request against the tracker table in a
  # 15-minute health-probe window pages (dashboard: DynamoDB-throttle panel).
  DynamoDBThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "enceladus-prod-dynamodb-throttle${EnvironmentSuffix}"
      AlarmDescription: >
        Triggers when the production health monitor observes a DynamoDB
        throttle signal against the tracker table.
      Namespace: Enceladus/Prod
      MetricName: DynamoDBThrottle
      Dimensions:
        - Name: TableName
          Value: !Sub "devops-project-tracker${EnvironmentSuffix}"
      Statistic: Maximum
      Period: 900
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasSnsTopic
        - [!Ref SnsTopicArn]
        - !Ref "AWS::NoValue"

  # graph_sync queue backlog — dashboard: graph_sync-lag panel.
  GraphSyncLagAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "enceladus-prod-graph-sync-lag${EnvironmentSuffix}"
      AlarmDescription: >
        Triggers when the devops-graph-sync-queue backlog exceeds 100
        messages, indicating graph projection is falling behind DynamoDB
        writes.
      Namespace: Enceladus/Prod
      MetricName: GraphSyncLag
      Dimensions:
        - Name: QueueName
          Value: !Sub "devops-graph-sync-queue${EnvironmentSuffix}.fifo"
      Statistic: Maximum
      Period: 900
      EvaluationPeriods: 1
      Threshold: 100
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasSnsTopic
        - [!Ref SnsTopicArn]
        - !Ref "AWS::NoValue"

  # MCP cold-start baseline — dashboard: MCP-cold-start panel.
  MCPColdStartAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "enceladus-prod-mcp-cold-start${EnvironmentSuffix}"
      AlarmDescription: >
        Triggers when the production health monitor's Lambda cold-start
        baseline sample reports an unhealthy (non-Active/non-Successful)
        function state.
      Namespace: Enceladus/Prod
      MetricName: MCPColdStart
      Statistic: Maximum
      Period: 900
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasSnsTopic
        - [!Ref SnsTopicArn]
        - !Ref "AWS::NoValue"

Outputs:
  ProdHealthMonitorFunctionArn:
    Description: ARN of the production health monitor Lambda (defined in 02-compute.yaml)
    Value: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:enceladus-prod-health-monitor${EnvironmentSuffix}"

  HealthProbeScheduleRuleArn:
    Description: ARN of the EventBridge health probe schedule
    Value: !GetAtt HealthProbeScheduleRule.Arn

  ParityDriftDailyScheduleRuleArn:
    Description: ARN of the daily parity+drift EventBridge schedule (ENC-TSK-F64 / AC-20)
    Value: !GetAtt ParityDriftDailyScheduleRule.Arn

  GraphHealthScheduleRuleArn:
    Description: ARN of the Fiedler lambda2 GraphHealth EventBridge schedule (ENC-TSK-K43)
    Value: !GetAtt GraphHealthScheduleRule.Arn
