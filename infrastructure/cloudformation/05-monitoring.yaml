AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Enceladus Monitoring Stack — Production health probes, CodeSize sentinel,
  error rate alarms, and SNS alerting. ENC-TSK-D20 / ENC-PLN-020 Phase 4.
  ENC-TSK-J15 GAMMA CREATE-via-IMPORT variant: adopts ONLY the two out-of-band
  live gamma resources (health-monitor Lambda + its role). All other monitoring
  resources are added by the subsequent full-template UPDATE (step 2).

Parameters:
  EnvironmentSuffix:
    Type: String
    Default: ""
    AllowedValues: ["", "-gamma"]
  SnsTopicArn:
    Type: String
    Default: ""
    Description: >
      Optional ARN of an existing SNS topic for alarm actions.
      If empty, alarms are created without notification actions.
      Create the topic manually: aws sns create-topic --name enceladus-deploy-alerts

Conditions:
  IsGamma: !Not [!Equals [!Ref EnvironmentSuffix, ""]]
  HasSnsTopic: !Not [!Equals [!Ref SnsTopicArn, ""]]

Resources:

  # ---------------------------------------------------------------------------
  # Health Probe Lambda role — IMPORT TARGET (enceladus-prod-health-monitor-role-gamma)
  # ---------------------------------------------------------------------------
  ProdHealthMonitorRole:
    Type: AWS::IAM::Role
    DeletionPolicy: Retain
    Properties:
      RoleName: !Sub "enceladus-prod-health-monitor-role${EnvironmentSuffix}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ProdHealthMonitorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
              - Effect: Allow
                Action:
                  - lambda:GetFunctionConfiguration
                  - lambda:ListFunctions
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: "*"

  # ---------------------------------------------------------------------------
  # Health Probe Lambda — IMPORT TARGET (enceladus-prod-health-monitor-gamma)
  # ZipFile stub is IDENTICAL to the full-template step-2 value, so the
  # subsequent UPDATE produces no Code change and cannot stomp the live 1818-byte
  # code (deployed out-of-band via deploy.sh).
  # ---------------------------------------------------------------------------
  ProdHealthMonitorFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    Properties:
      FunctionName: !Sub "enceladus-prod-health-monitor${EnvironmentSuffix}"
      Code:
        ZipFile: "# managed outside CloudFormation — deployed by deploy.sh"
      Runtime: !If [IsGamma, python3.12, python3.11]
      Handler: lambda_function.handler
      MemorySize: 256
      Timeout: 120
      Architectures:
        - !If [IsGamma, arm64, x86_64]
      Role: !GetAtt ProdHealthMonitorRole.Arn
      Environment:
        Variables:
          FUNCTION_NAMES: "[]"

Outputs:
  ProdHealthMonitorFunctionArn:
    Description: ARN of the production health monitor Lambda
    Value: !GetAtt ProdHealthMonitorFunction.Arn
