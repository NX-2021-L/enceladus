AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Enceladus Monitoring Stack — Production health probes, CodeSize sentinel,
  error rate alarms, and SNS alerting. ENC-TSK-D20 / ENC-PLN-020 Phase 4.

Parameters:
  EnvironmentSuffix:
    Type: String
    Default: ""
    AllowedValues: ["", "-gamma"]
  SnsTopicArn:
    Type: String
    Default: ""
    Description: >
      Optional ARN of an existing SNS topic for alarm actions.
      If empty, alarms are created without notification actions.
      Create the topic manually: aws sns create-topic --name enceladus-deploy-alerts

Conditions:
  IsGamma: !Not [!Equals [!Ref EnvironmentSuffix, ""]]
  HasSnsTopic: !Not [!Equals [!Ref SnsTopicArn, ""]]

Resources:

  # ---------------------------------------------------------------------------
  # Health Probe Lambda — reads CodeSize for all prod Lambdas
  # ---------------------------------------------------------------------------
  ProdHealthMonitorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "enceladus-prod-health-monitor-role${EnvironmentSuffix}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ProdHealthMonitorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
              - Effect: Allow
                Action:
                  - lambda:GetFunctionConfiguration
                  - lambda:ListFunctions
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: "*"

  ProdHealthMonitorFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    Properties:
      FunctionName: !Sub "enceladus-prod-health-monitor${EnvironmentSuffix}"
      Code:
        ZipFile: "# managed outside CloudFormation — deployed by deploy.sh"
      Runtime: !If [IsGamma, python3.12, python3.11]
      Handler: lambda_function.handler
      MemorySize: 256
      Timeout: 120
      Architectures:
        - !If [IsGamma, arm64, x86_64]
      Role: !GetAtt ProdHealthMonitorRole.Arn
      Environment:
        Variables:
          FUNCTION_NAMES: "[]"

  ProdHealthMonitorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProdHealthMonitorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt HealthProbeScheduleRule.Arn

  # ---------------------------------------------------------------------------
  # EventBridge rule — every 15 minutes
  # ---------------------------------------------------------------------------
  HealthProbeScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "enceladus-health-probe-schedule${EnvironmentSuffix}"
      Description: Triggers production health monitor Lambda every 15 minutes
      ScheduleExpression: "rate(15 minutes)"
      State: ENABLED
      Targets:
        - Id: ProdHealthMonitorTarget
          Arn: !GetAtt ProdHealthMonitorFunction.Arn

  # ---------------------------------------------------------------------------
  # ENC-TSK-E69 / ENC-PLN-031 Phase 4 — Deploy Capability Auditor schedule
  # ---------------------------------------------------------------------------
  # The Lambda function itself is created by backend/lambda/deploy_capability_auditor/deploy.sh
  # (self-managed IAM + zip update). This block owns only the EventBridge rule
  # so the schedule is IaC-managed and visible to the CFN drift audit
  # (ENC-TSK-E67).

  DeployCapabilityAuditorScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "enceladus-deploy-capability-auditor-schedule${EnvironmentSuffix}"
      Description: Triggers deploy capability auditor Lambda daily at 10:00 UTC
      ScheduleExpression: "cron(0 10 * * ? *)"
      State: ENABLED
      Targets:
        - Id: DeployCapabilityAuditorTarget
          Arn: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:enceladus-deploy-capability-auditor${EnvironmentSuffix}"

  DeployCapabilityAuditorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub "enceladus-deploy-capability-auditor${EnvironmentSuffix}"
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DeployCapabilityAuditorScheduleRule.Arn

  # ---------------------------------------------------------------------------
  # CloudWatch Alarms
  # ---------------------------------------------------------------------------

  # CodeSize stomp sentinel — any Lambda < 1024 bytes
  CodeSizeMinimumAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "enceladus-prod-codesize-minimum${EnvironmentSuffix}"
      AlarmDescription: >
        Triggers when any monitored Lambda has CodeSize < 1024 bytes,
        indicating a likely CFN ZipFile stub overwrite. Zero false positives —
        production Lambdas are always > 1024 bytes.
      Namespace: Enceladus/Prod
      MetricName: LambdaCodeSize
      Statistic: Minimum
      Period: 900
      EvaluationPeriods: 1
      Threshold: 1024
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions: !If
        - HasSnsTopic
        - [!Ref SnsTopicArn]
        - !Ref "AWS::NoValue"

  # Lambda error rate alarm — Errors > 5 in 5 minutes across all functions
  LambdaErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "enceladus-prod-lambda-error-rate${EnvironmentSuffix}"
      AlarmDescription: >
        Triggers when total Lambda errors across all Enceladus functions
        exceed 5 in a 5-minute window.
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasSnsTopic
        - [!Ref SnsTopicArn]
        - !Ref "AWS::NoValue"

Outputs:
  ProdHealthMonitorFunctionArn:
    Description: ARN of the production health monitor Lambda
    Value: !GetAtt ProdHealthMonitorFunction.Arn

  HealthProbeScheduleRuleArn:
    Description: ARN of the EventBridge health probe schedule
    Value: !GetAtt HealthProbeScheduleRule.Arn
