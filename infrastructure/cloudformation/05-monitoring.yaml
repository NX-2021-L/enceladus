AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Enceladus Monitoring Stack — Production health probes, CodeSize sentinel,
  error rate alarms, and SNS alerting. ENC-TSK-D20 / ENC-PLN-020 Phase 4.

Parameters:
  EnvironmentSuffix:
    Type: String
    Default: ""
    AllowedValues: ["", "-gamma"]
  SnsTopicArn:
    Type: String
    Default: ""
    Description: >
      Optional ARN of an existing SNS topic for alarm actions.
      If empty, alarms are created without notification actions.
      Create the topic manually: aws sns create-topic --name enceladus-deploy-alerts

Conditions:
  IsGamma: !Not [!Equals [!Ref EnvironmentSuffix, ""]]
  HasSnsTopic: !Not [!Equals [!Ref SnsTopicArn, ""]]

Resources:

  # ---------------------------------------------------------------------------
  # Health Probe Lambda — reads CodeSize for all prod Lambdas
  # ---------------------------------------------------------------------------
  ProdHealthMonitorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "enceladus-prod-health-monitor-role${EnvironmentSuffix}"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ProdHealthMonitorPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"
              - Effect: Allow
                Action:
                  - lambda:GetFunctionConfiguration
                  - lambda:ListFunctions
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: "*"

  ProdHealthMonitorFunction:
    Type: AWS::Lambda::Function
    DeletionPolicy: Retain
    Properties:
      FunctionName: !Sub "enceladus-prod-health-monitor${EnvironmentSuffix}"
      Code:
        ZipFile: "# managed outside CloudFormation — deployed by deploy.sh"
      Runtime: !If [IsGamma, python3.12, python3.11]
      Handler: lambda_function.handler
      MemorySize: 256
      Timeout: 120
      Architectures:
        - !If [IsGamma, arm64, x86_64]
      Role: !GetAtt ProdHealthMonitorRole.Arn
      Environment:
        Variables:
          FUNCTION_NAMES: "[]"

  ProdHealthMonitorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProdHealthMonitorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt HealthProbeScheduleRule.Arn

  # ---------------------------------------------------------------------------
  # EventBridge rule — every 15 minutes
  # ---------------------------------------------------------------------------
  HealthProbeScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "enceladus-health-probe-schedule${EnvironmentSuffix}"
      Description: Triggers production health monitor Lambda every 15 minutes
      ScheduleExpression: "rate(15 minutes)"
      State: ENABLED
      Targets:
        - Id: ProdHealthMonitorTarget
          Arn: !GetAtt ProdHealthMonitorFunction.Arn

  # ---------------------------------------------------------------------------
  # ENC-TSK-F64 / ENC-FTR-090 AC-20 — Daily parity + drift schedule
  # ---------------------------------------------------------------------------
  # Extends devops-deploy-parity-validator (ENC-TSK-F87) via EventBridge to run
  # daily at 10:00 UTC with action=daily_drift_audit. Adds to its scope:
  #   (a) CFN detect_stack_drift across enceladus-data/api/github-roles/monitoring
  #   (b) CodeSize < 1024 bytes anomaly detection (CFN stomp — ENC-FTR-068 AC-5)
  #   (c) SnapStart published-version count audit (>5 stale triggers SNS alert)
  # No new Lambda created; all logic consolidated in deploy-parity-validator per
  # ENC-LSN-027 (minimise blast-radius surface).

  ParityDriftDailyScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "devops-parity-drift-daily${EnvironmentSuffix}"
      Description: >
        Triggers deploy-parity-validator daily_drift_audit at 10:00 UTC (ENC-TSK-F64 / AC-20)
      ScheduleExpression: "cron(0 10 * * ? *)"
      State: ENABLED
      Targets:
        - Id: ParityDriftDailyTarget
          Arn: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-deploy-parity-validator${EnvironmentSuffix}"
          Input: '{"action": "daily_drift_audit"}'

  ParityDriftDailyInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub "devops-deploy-parity-validator${EnvironmentSuffix}"
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ParityDriftDailyScheduleRule.Arn

  # ---------------------------------------------------------------------------
  # ENC-ISS-283 / ENC-LSN-027 — Env Drift Auditor schedule
  # ---------------------------------------------------------------------------
  # The Lambda function itself + its IAM role were created out-of-band during
  # the 2026-04-20 io-override session (DOC-298D807FB175). This block owns the
  # EventBridge rule + lambda:InvokeFunction permission so the schedule is
  # IaC-managed and visible to the CFN drift audit. Mirror of the
  # DeployCapabilityAuditor pattern directly above.
  #
  # Adopting the existing Lambda + role into CFN requires a stack-update with
  # resource-import; tracked in ENC-TSK-F56 AC#2. Until imported, the Lambda
  # and role are orphan in CFN but live in AWS.

  EnvDriftAuditorScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "devops-env-drift-auditor-hourly${EnvironmentSuffix}"
      Description: Triggers env drift auditor Lambda hourly at :07 past the hour
      ScheduleExpression: "cron(7 * * * ? *)"
      State: ENABLED
      Targets:
        - Id: EnvDriftAuditorTarget
          Arn: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:devops-env-drift-auditor${EnvironmentSuffix}"

  EnvDriftAuditorInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Sub "devops-env-drift-auditor${EnvironmentSuffix}"
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt EnvDriftAuditorScheduleRule.Arn

  # ---------------------------------------------------------------------------
  # CloudWatch Alarms
  # ---------------------------------------------------------------------------

  # CodeSize stomp sentinel — any Lambda < 1024 bytes
  CodeSizeMinimumAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "enceladus-prod-codesize-minimum${EnvironmentSuffix}"
      AlarmDescription: >
        Triggers when any monitored Lambda has CodeSize < 1024 bytes,
        indicating a likely CFN ZipFile stub overwrite. Zero false positives —
        production Lambdas are always > 1024 bytes.
      Namespace: Enceladus/Prod
      MetricName: LambdaCodeSize
      Statistic: Minimum
      Period: 900
      EvaluationPeriods: 1
      Threshold: 1024
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions: !If
        - HasSnsTopic
        - [!Ref SnsTopicArn]
        - !Ref "AWS::NoValue"

  # Lambda error rate alarm — Errors > 5 in 5 minutes across all functions
  LambdaErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "enceladus-prod-lambda-error-rate${EnvironmentSuffix}"
      AlarmDescription: >
        Triggers when total Lambda errors across all Enceladus functions
        exceed 5 in a 5-minute window.
      Namespace: AWS/Lambda
      MetricName: Errors
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions: !If
        - HasSnsTopic
        - [!Ref SnsTopicArn]
        - !Ref "AWS::NoValue"

Outputs:
  ProdHealthMonitorFunctionArn:
    Description: ARN of the production health monitor Lambda
    Value: !GetAtt ProdHealthMonitorFunction.Arn

  HealthProbeScheduleRuleArn:
    Description: ARN of the EventBridge health probe schedule
    Value: !GetAtt HealthProbeScheduleRule.Arn

  ParityDriftDailyScheduleRuleArn:
    Description: ARN of the daily parity+drift EventBridge schedule (ENC-TSK-F64 / AC-20)
    Value: !GetAtt ParityDriftDailyScheduleRule.Arn
