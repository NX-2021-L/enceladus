  # ---------------------------------------------------------------------------

  # --- project-service ---
  ProjectServiceErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "enc-codedeploy-project-service-errors${EnvironmentSuffix}"
