<!DOCTYPE html>
<html><head><title>ISS-255 Pass 3 Observer</title>
<style>body{font-family:monospace;padding:12px;background:#111;color:#eee}table{border-collapse:collapse;width:100%;font-size:12px}td,th{border:1px solid #333;padding:4px 8px;text-align:left;vertical-align:top}.swap{background:#c33;color:#fff}.doc{background:#963}.vanish{background:#e93}.lifecycle{background:#36a}details{max-width:900px;overflow:auto}pre{white-space:pre-wrap;word-break:break-all}</style>
</head><body>
<h3>ISS-255 Pass 3 Observer</h3>
<div id=status>Listening on BroadcastChannel "iss255p3". Open /enceladus/deployments on this origin to capture the event stream.</div>
<button onclick="localStorage.removeItem('__iss255p3_observer_log');location.reload()">Clear</button>
<div id="realm-count"></div>
<table id=log><thead><tr><th>wall</th><th>realm#</th><th>init</th><th>t</th><th>type</th><th>detail</th></tr></thead><tbody></tbody></table>
<script>
  const bc = new BroadcastChannel('iss255p3');
  const tbody = document.querySelector('#log tbody');
  const realmCountEl = document.querySelector('#realm-count');
  const startedAt = Date.now();
  const realms = new Map();
  let realmIdx = 0;
  let prevRealmUuid = null;
  const render = (d) => {
    if (!realms.has(d.realmUuid)) realms.set(d.realmUuid, ++realmIdx);
    const currRealm = realms.get(d.realmUuid);
    const isSwap = prevRealmUuid && prevRealmUuid !== d.realmUuid;
    prevRealmUuid = d.realmUuid;
    realmCountEl.textContent = `Realms observed: ${realms.size} | Latest init counter: ${d.initCount}`;
    const row = document.createElement('tr');
    const wallT = ((Date.now() - startedAt) / 1000).toFixed(3) + 's';
    let cls = '';
    if (isSwap) cls = 'swap';
    else if (d.type === 'document.write' || d.type === 'document.open' || d.type === 'document.close') cls = 'doc';
    else if (d.type === 'fiber.vanished') cls = 'vanish';
    else if (d.type && d.type.startsWith('lifecycle.')) cls = 'lifecycle';
    row.className = cls;
    row.innerHTML = `<td>${wallT}</td><td>${currRealm}${isSwap ? ' \u26a1NEW' : ''}</td><td>${d.initCount}</td><td>${(d.t || 0).toFixed(0)}</td><td>${d.type}</td><td><details><summary>view</summary><pre>${JSON.stringify(d, null, 2).replace(/</g, '&lt;')}</pre></details></td>`;
    tbody.insertBefore(row, tbody.firstChild);
  };
  bc.onmessage = (e) => render(e.data);
  // Also subscribe to localStorage changes as fallback (storage events fire in other tabs on same origin)
  window.addEventListener('storage', (e) => {
    if (e.key === '__iss255p3_log' && e.newValue) {
      try {
        const arr = JSON.parse(e.newValue);
        const last = arr[arr.length - 1];
        if (last) render({ ...last, _via: 'storage' });
      } catch {}
    }
  });
  setInterval(() => {
    try { localStorage.setItem('__iss255p3_observer_log', JSON.stringify([...tbody.children].slice(0, 200).map(r => r.innerText))); } catch {}
  }, 3000);
</script></body></html>
