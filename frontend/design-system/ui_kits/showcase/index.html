<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enceladus Platform — Showcase</title>
  <link rel="icon" type="image/svg+xml" href="../../assets/original-favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Space+Grotesk:wght@300;400;500;600&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap">
  <style>
    :root {
      --enc-abyss: #0A0E14;
      --enc-starlight: #F5EEDC;
      --enc-seafoam: #7FDBCA;
      --enc-moondust: #A8B5C5;
    }
    html, body { background: var(--enc-abyss); color: var(--enc-starlight); font-family: 'Inter', sans-serif; }
    body { margin: 0; }

    .navbar-custom { background: transparent; transition: background .3s ease, border-color .3s ease; border-bottom: 1px solid transparent; }
    .navbar-custom.scrolled { background: rgba(10, 14, 20, .85); backdrop-filter: blur(14px); border-bottom: 1px solid rgba(127, 219, 202, .08); }
    .navbar-custom .nav-link { transition: color .2s ease, border-color .2s ease; border-bottom: 1px solid transparent; }
    .navbar-custom .nav-link:hover { color: var(--enc-seafoam) !important; border-bottom-color: var(--enc-seafoam); }

    .article-hero { position: relative; min-height: 100vh; display: flex; align-items: center; overflow: hidden; background: var(--enc-abyss); padding: 6rem 0 4rem; }
    .moon-bg { position: absolute; inset: 0; background-size: cover; background-position: center; opacity: .15; z-index: 0; }
    .article-hero::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10,14,20,.4) 0%, rgba(10,14,20,.85) 70%, var(--enc-abyss) 100%); z-index: 1; }
    .article-hero > .container { position: relative; z-index: 2; }
    .article-hero h1 {
      font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(3rem, 9vw, 7rem);
      letter-spacing: -.04em; line-height: .95; color: var(--enc-starlight);
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #F5EEDC 0%, #7FDBCA 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .hero-subtitle { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1.1rem, 2.2vw, 1.6rem); color: var(--enc-moondust); font-weight: 300; letter-spacing: .02em; margin-bottom: 2rem; }
    .hero-byline { font-family: 'JetBrains Mono', monospace; font-size: .85rem; color: var(--enc-moondust); opacity: .7; letter-spacing: .1em; text-transform: uppercase; margin-bottom: 3rem; }
    .hero-badges { display: flex; gap: .75rem; justify-content: center; flex-wrap: wrap; margin-bottom: 4rem; }
    .badge { font-family: 'JetBrains Mono', monospace; font-size: .75rem; letter-spacing: .08em; padding: .4rem .9rem; border-radius: 999px; background: rgba(127,219,202,.08); color: var(--enc-seafoam); border: 1px solid rgba(127,219,202,.25); text-transform: uppercase; font-weight: 400; }
    .badge-green { background: rgba(56,161,105,.12); color: #68D391; border-color: rgba(104,211,145,.3); }

    .article-body { padding: 4rem 0 6rem; max-width: 820px; margin: 0 auto; }
    .article-body h2 {
      font-family: 'Syne', sans-serif; font-size: clamp(1.6rem, 3vw, 2.25rem); font-weight: 700;
      letter-spacing: -.02em; color: var(--enc-seafoam); margin: 4rem 0 1.5rem;
      padding-bottom: .75rem; border-bottom: 1px solid rgba(127,219,202,.15);
    }
    .article-body h2:first-child { margin-top: 0; }
    .article-body h3 { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; font-weight: 600; color: var(--enc-starlight); margin: 2.5rem 0 1rem; letter-spacing: -.01em; }
    .article-body p { font-size: 1.05rem; line-height: 1.75; color: var(--enc-moondust); margin-bottom: 1.5rem; }
    .article-body em { color: var(--enc-starlight); font-style: italic; }
    .article-body code { font-family: 'JetBrains Mono', monospace; font-size: .9em; background: rgba(127,219,202,.08); color: var(--enc-seafoam); padding: .1em .4em; border-radius: 4px; border: 1px solid rgba(127,219,202,.15); }
    .record-id { font-family: 'JetBrains Mono', monospace; font-size: .85em; color: var(--enc-seafoam); opacity: .85; letter-spacing: .02em; }

    blockquote {
      border-left: 3px solid var(--enc-seafoam); padding: 1.25rem 1.75rem;
      background: rgba(127,219,202,.04); margin: 2.5rem 0; font-style: italic;
    }
    blockquote p { margin-bottom: 0; color: var(--enc-starlight); font-size: 1.08rem; }

    .arch-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin: 2rem 0; }
    @media (min-width: 720px) { .arch-grid { grid-template-columns: 1fr 1fr; } }
    .arch-card { border: 1px solid rgba(127,219,202,.15); background: rgba(127,219,202,.03); padding: 1.25rem 1.4rem; border-radius: 8px; }
    .arch-card p { margin: 0; font-size: .95rem; line-height: 1.6; }
    .arch-label { font-family: 'JetBrains Mono', monospace; font-size: .72rem; text-transform: uppercase; letter-spacing: .1em; color: var(--enc-seafoam); margin-bottom: .5rem; }

    .innovation-item { padding: 1.5rem 0; border-bottom: 1px solid rgba(127,219,202,.08); }
    .innovation-item:last-child { border-bottom: 0; }
    .innovation-item h3 { margin-top: 0; }
    .innovation-item p { margin-bottom: 0; }

    .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin: 2rem 0; }
    @media (min-width: 720px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    .stat-item { text-align: center; padding: 1.25rem 1rem; border: 1px solid rgba(127,219,202,.12); border-radius: 8px; background: rgba(127,219,202,.02); }
    .stat-number { font-family: 'Syne', sans-serif; font-size: 2.25rem; font-weight: 700; color: var(--enc-seafoam); letter-spacing: -.02em; line-height: 1; }
    .stat-label { font-family: 'JetBrains Mono', monospace; font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; color: var(--enc-moondust); opacity: .8; margin-top: .5rem; }

    .site-footer { padding: 3rem 1rem; text-align: center; border-top: 1px solid rgba(127,219,202,.12); margin-top: 4rem; }
    .site-footer p { font-family: 'JetBrains Mono', monospace; font-size: .78rem; color: var(--enc-moondust); opacity: .6; letter-spacing: .05em; margin: 0 0 .5rem; }
    .footer-links a { color: var(--enc-seafoam); text-decoration: none; font-size: .82rem; opacity: .7; transition: opacity .2s; }
    .footer-links a:hover { opacity: 1; text-decoration: underline; }

    .float-strip { position: fixed; bottom: 1.25rem; left: 1.25rem; display: flex; flex-direction: column; gap: .5rem; z-index: 30; }
    .site-float {
      font-family: 'JetBrains Mono', monospace; font-size: .78rem; letter-spacing: .04em;
      background: rgba(10,14,20,.7); color: var(--enc-seafoam); border: 1px solid rgba(127,219,202,.25);
      padding: .55rem .9rem; border-radius: 6px; cursor: pointer; text-decoration: none;
      backdrop-filter: blur(8px); transition: background .2s, border-color .2s, transform .15s;
      text-align: left;
    }
    .site-float:hover { background: rgba(127,219,202,.1); border-color: var(--enc-seafoam); transform: translateY(-1px); }

    .carousel-overlay { position: fixed; inset: 0; background: rgba(10,14,20,.96); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .carousel-inner { position: relative; width: 100%; max-width: 1200px; max-height: 100%; display: flex; flex-direction: column; align-items: center; }
    .carousel-close { position: absolute; top: -2.5rem; right: 0; background: transparent; border: 0; color: var(--enc-starlight); font-size: 2rem; line-height: 1; cursor: pointer; opacity: .7; transition: opacity .2s; }
    .carousel-close:hover { opacity: 1; }
    .carousel-image-wrapper { width: 100%; text-align: center; }
    .carousel-image-wrapper img { max-width: 100%; max-height: 75vh; border-radius: 6px; border: 1px solid rgba(127,219,202,.15); }
    .carousel-caption { font-family: 'JetBrains Mono', monospace; font-size: .82rem; color: var(--enc-moondust); margin-top: 1rem; letter-spacing: .03em; }
    .carousel-arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(127,219,202,.08); border: 1px solid rgba(127,219,202,.25); color: var(--enc-seafoam); width: 48px; height: 48px; border-radius: 50%; font-size: 1.5rem; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .2s; }
    .carousel-arrow:hover { background: rgba(127,219,202,.2); }
    .carousel-prev { left: -4rem; }
    .carousel-next { right: -4rem; }
    @media (max-width: 900px) { .carousel-prev { left: .5rem; } .carousel-next { right: .5rem; } }
    .carousel-counter { position: absolute; bottom: -2.5rem; font-family: 'JetBrains Mono', monospace; font-size: .75rem; color: var(--enc-moondust); opacity: .6; letter-spacing: .08em; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ==================== DATA ====================
    const data = {
      hero: {
        title: 'ENCELADUS',
        subtitle: 'The system that learns from itself.',
        byline: 'J Reese · Solo Architect & Operator · April 2026',
        badges: [
          { label: 'v3.0', variant: 'default' },
          { label: 'Active Production', variant: 'green' },
          { label: 'AWS Serverless', variant: 'default' },
          { label: 'Multi-Agent', variant: 'default' },
        ],
      },
      architecture: [
        { label: 'Infrastructure', body: '20 Lambda functions, 8 DynamoDB tables, 2 SQS FIFO queues, Neo4j AuraDB Free (graph-indexed search), CloudFront CDN, API Gateway HTTP v2, Cognito auth with Lambda@Edge' },
        { label: 'Frontend',       body: 'React 19 PWA with TypeScript, Vite, Tailwind CSS, TanStack React Query — mobile-first governance cockpit across all active projects with full primitive surface' },
        { label: 'Agent Interface', body: 'Code-mode MCP: 5 governed meta-tools (search, execute, get_compact_context, coordination, connection_health) over Streamable HTTP + OAuth 2.1/PKCE — 89% schema reduction vs. raw mode' },
        { label: 'CI/CD',          body: '5 GitHub Actions workflows, nightly SHA-256 parity audits, secrets guardrail, 13 deployment types with semver changelog; component registry enforces deployment transition arcs at the infrastructure level' },
        { label: 'Multi-Agent',    body: 'Coordination API with dispatch heuristics and graph-indexed tracker search across Claude, OpenAI Codex, and AWS Bedrock; 10 typed relationship edges with weight, confidence, and provenance' },
      ],
      innovations: [
        { title: 'Governed Lesson Primitive', html: `The Lesson Primitive (<span class="record-id">ENC-FTR-052</span>) transforms operational history into institutional knowledge. Every lesson is a first-class governed record type, evidence-gated and append-only, constitutionally scored against four pillars (force/surrender, convergence/play, efficiency/love, intention/flow) and a vibe board before it can propose governance amendments. Cross-project knowledge mining scanned 2,789 records across 20 projects and produced 17 governed lessons — the first time Enceladus examined its own operational history as a knowledge asset.` },
        { title: 'Exclusive Checkout Service', html: `Prevents agent collisions via atomic task ownership — only the owning session can advance status. Child tasks support parallel dispatch. Commit Approval IDs (CAI) gate code completion; Commit Complete IDs (CCI) are validated in PR bodies by GitHub Actions before merge. A checkout-service assistant subsystem auto-remediates misclassified tasks by relaxing deployment arcs when evidence confirms the mechanism, and can never tighten them.` },
        { title: 'Evidence-Gated Lifecycle', html: `Task state machine (<code>open → in-progress → coding-complete → committed → pr → merged-main → deploy-success → closed</code>) requires proof at every gate: commit SHAs validated against GitHub API, PR merge timestamps within 60-second tolerance, deployment evidence from GitHub Actions Jobs API with 7 validated fields. The component registry enforces the most-restrictive deployment arc across all components a task touches — infrastructure-level governance agents cannot bypass.` },
        { title: 'Governance as Architecture', html: `SHA-256 governance hash required on every write mutation. MCP-API boundary policy ensures no tool handler directly accesses DynamoDB business tables, preventing transport-specific behavior drift. Write-source attribution on all mutations enables the audit Lambda to detect anomalies and alert via SNS. A CI-gated governance data dictionary enforces authoritative field semantics at both runtime and deploy time.` },
        { title: 'Token Economy Design', html: `Every design decision weighs token cost. The code-mode MCP interface delivers an 89% tool-schema reduction. Graph-indexed tracker search collapses 20–50 sequential record lookups into 1–2 Neo4j traversal queries. Context nodes wrap every tracker record in mathematically-scored metadata enabling greedy knapsack context packing within token budgets. Prompt caching, strategic model selection, and batch API routing compress operational AI cost by an estimated 60–80% overall.` },
        { title: 'Event-Driven Pipelines', html: `DynamoDB Streams → EventBridge Pipes → SQS FIFO (natural debounce via 5-min visibility timeout) → Lambda feed publisher → S3/CloudFront invalidation. The same stream architecture drives the Neo4j graph sync with graceful degradation — DynamoDB mutations are never blocked by graph failures, and agents receive structured fallback hints when the index is unreachable.` },
      ],
      stats: [
        { n: '2,789+', l: 'Governed Records' }, { n: '20', l: 'Production Projects' },
        { n: '5', l: 'Code-Mode Tools' }, { n: '17', l: 'Governed Lessons' },
        { n: '~$35', l: 'Monthly Cost' }, { n: '20', l: 'Lambda Functions' },
        { n: '8', l: 'DynamoDB Tables' }, { n: '1', l: 'Operator' },
      ],
      carousel: [
        { src: '../../assets/showcase-dashboard.jpg',      caption: 'Dashboard — project overview and active task feed' },
        { src: '../../assets/showcase-task-tracker.jpg',   caption: 'Task Tracker — governed lifecycle with status arc' },
        { src: '../../assets/showcase-feature-detail.jpg', caption: 'Feature Detail — acceptance criteria and evidence handshake' },
      ],
    };

    // ==================== COMPONENTS ====================
    function Navbar() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const h = () => setScrolled(window.scrollY > 80);
        h(); window.addEventListener('scroll', h);
        return () => window.removeEventListener('scroll', h);
      }, []);
      return (
        <nav className={`navbar-custom ${scrolled ? 'scrolled' : ''}`} style={{position:'fixed', top:0, left:0, right:0, zIndex:40, padding:'.75rem 0'}}>
          <div className="container px-5 mx-auto" style={{maxWidth:'1200px', display:'flex', alignItems:'center', justifyContent:'space-between'}}>
            <a href="#" style={{color:'var(--enc-seafoam)', fontFamily:'Space Grotesk, sans-serif', fontWeight:500, fontSize:'1.1rem', letterSpacing:'.03em', textDecoration:'none'}}>J Reese</a>
            <ul style={{display:'flex', gap:'1.5rem', margin:0, padding:0, listStyle:'none', fontSize:'.9rem', fontFamily:'Inter, sans-serif'}}>
              <li><a className="nav-link" href="#" style={{color:'var(--enc-starlight)', textDecoration:'none', paddingBottom:'4px'}}>home</a></li>
              <li><a className="nav-link" href="#" style={{color:'var(--enc-starlight)', textDecoration:'none', paddingBottom:'4px'}}>links</a></li>
            </ul>
          </div>
        </nav>
      );
    }

    function Hero({ data, moonSrc }) {
      return (
        <header className="article-hero">
          <div className="moon-bg" style={{backgroundImage: `url(${moonSrc})`}} />
          <div className="container px-5 mx-auto text-center">
            <h1>{data.title}</h1>
            <p className="hero-subtitle">{data.subtitle}</p>
            <p className="hero-byline">{data.byline}</p>
            <div className="hero-badges">
              {data.badges.map(b => (
                <span key={b.label} className={`badge ${b.variant === 'green' ? 'badge-green' : ''}`}>{b.label}</span>
              ))}
            </div>
          </div>
        </header>
      );
    }

    function ArchGrid({ items }) {
      return (
        <div className="arch-grid">
          {items.map(it => (
            <div className="arch-card" key={it.label}>
              <div className="arch-label">{it.label}</div>
              <p>{it.body}</p>
            </div>
          ))}
        </div>
      );
    }

    function InnovationList({ items }) {
      return (
        <div>
          {items.map(it => (
            <div className="innovation-item" key={it.title}>
              <h3>{it.title}</h3>
              <p dangerouslySetInnerHTML={{ __html: it.html }} />
            </div>
          ))}
        </div>
      );
    }

    function StatsGrid({ stats }) {
      return (
        <div className="stats-grid">
          {stats.map(s => (
            <div className="stat-item" key={s.l}>
              <div className="stat-number">{s.n}</div>
              <div className="stat-label">{s.l}</div>
            </div>
          ))}
        </div>
      );
    }

    function BottomLineQuote() {
      return (
        <blockquote>
          <p>Enceladus is not a product for sale — it is an operational philosophy made manifest. It demonstrates that a single operator, armed with the right abstractions and governed AI agents, can build, maintain, and <em>learn from</em> production systems at a scale and quality level that would traditionally require a team. The platform's power comes not from complexity, but from the disciplined simplicity of treating every entity, every transition, every mutation, and now every lesson as an opportunity to enforce quality, accumulate wisdom, and align with values at the architectural level.</p>
        </blockquote>
      );
    }

    function Footer() {
      const year = new Date().getFullYear();
      return (
        <footer className="site-footer">
          <p>Copyright © J Reese 2002–{year} · Enceladus v3.0 · April 2026</p>
          <div className="footer-links">
            <a href="#">linkedin</a> · <a href="#">resume</a> · <a href="#">home</a>
          </div>
        </footer>
      );
    }

    function FloatStrip({ onOpenCarousel }) {
      return (
        <div className="float-strip">
          <button onClick={onOpenCarousel} className="site-float">◆ View Platform Screenshots</button>
          <a href="#" onClick={e => e.preventDefault()} className="site-float">◆ Architecture Documentation</a>
        </div>
      );
    }

    function Carousel({ open, images, index, onPrev, onNext, onClose }) {
      useEffect(() => {
        if (!open) return;
        const h = (e) => {
          if (e.key === 'Escape') onClose();
          if (e.key === 'ArrowRight') onNext();
          if (e.key === 'ArrowLeft') onPrev();
        };
        document.addEventListener('keydown', h);
        document.body.style.overflow = 'hidden';
        return () => { document.removeEventListener('keydown', h); document.body.style.overflow = ''; };
      }, [open, onClose, onNext, onPrev]);
      if (!open) return null;
      const s = images[index];
      return (
        <div className="carousel-overlay" role="dialog" onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
          <div className="carousel-inner">
            <button className="carousel-close" onClick={onClose}>×</button>
            <button className="carousel-arrow carousel-prev" onClick={onPrev}>‹</button>
            <div className="carousel-image-wrapper">
              <img src={s.src} alt={s.caption} />
              <p className="carousel-caption">{s.caption}</p>
            </div>
            <button className="carousel-arrow carousel-next" onClick={onNext}>›</button>
            <div className="carousel-counter">{index + 1} / {images.length}</div>
          </div>
        </div>
      );
    }

    // ==================== APP ====================
    function App() {
      const [open, setOpen] = useState(false);
      const [idx, setIdx] = useState(0);
      const next = () => setIdx(i => (i + 1) % data.carousel.length);
      const prev = () => setIdx(i => (i - 1 + data.carousel.length) % data.carousel.length);
      return (
        <React.Fragment>
          <Navbar />
          <Hero data={data.hero} moonSrc="../../assets/enceladus-moon.jpg" />
          <main className="container px-5 mx-auto" style={{maxWidth:'1200px'}}>
            <div className="article-body">
              <h2>The Thesis</h2>
              <p>Enceladus began as a personal governance framework and evolved into something unexpected: a living, self-auditing operational platform that doesn't just <em>execute</em> work — it <em>learns</em> from its own history. Today it orchestrates 20 active production projects through a single AWS serverless backbone, coordinating multiple AI agents (Claude, OpenAI Codex, AWS Bedrock) under a shared constitutional governance model, while its knowledge layer continuously mines its own operational record for lessons that then propose governance amendments back to the system.</p>
              <p>The platform is operated by a single human — me — with ~2,789 governed records produced across 20 projects. It runs on less than $35 per month of AWS spend. Every mutation is cryptographically signed, every lesson is evidence-gated, and every deployment boundary is enforced by the component registry before code ships.</p>
              <h2>Architecture at a Glance</h2>
              <ArchGrid items={data.architecture} />
              <h2>Innovations</h2>
              <InnovationList items={data.innovations} />
              <h2>By the Numbers</h2>
              <StatsGrid stats={data.stats} />
              <h2>The Bottom Line</h2>
              <BottomLineQuote />
            </div>
          </main>
          <Footer />
          <FloatStrip onOpenCarousel={() => { setIdx(0); setOpen(true); }} />
          <Carousel open={open} images={data.carousel} index={idx} onPrev={prev} onNext={next} onClose={() => setOpen(false)} />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
