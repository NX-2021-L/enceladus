<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
.cell{padding:10px;border-radius:6px;font-family:var(--font-mono);font-size:10px;color:var(--enc-seafoam);min-height:60px;display:flex;flex-direction:column;justify-content:flex-end}
.label{font-family:var(--font-body);font-size:10px;color:var(--enc-dust);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px}
.sec{margin-bottom:14px}
.sec:last-child{margin-bottom:0}
</style></head><body><div class="card">
<div class="sec">
<div class="label">Teal · subtle → hover → full</div>
<div class="grid">
<div class="cell" style="background:rgba(61,155,168,0.05);border:1px solid rgba(61,155,168,0.1)">teal/5</div>
<div class="cell" style="background:rgba(61,155,168,0.1);border:1px solid rgba(61,155,168,0.2)">teal/10</div>
<div class="cell" style="background:rgba(61,155,168,0.2);border:1px solid rgba(61,155,168,0.35)">teal/20</div>
<div class="cell" style="background:rgba(61,155,168,0.5);border:1px solid rgba(61,155,168,0.7)">teal/50</div>
<div class="cell" style="background:#3D9BA8;color:#0A0A0F">teal/100</div>
</div></div>
<div class="sec">
<div class="label">Crimson alert</div>
<div class="grid">
<div class="cell" style="background:rgba(200,80,96,0.1);border:1px solid rgba(200,80,96,0.3)">crim/10</div>
<div class="cell" style="background:rgba(200,80,96,0.2);border:1px solid rgba(200,80,96,0.5)">crim/20</div>
<div class="cell" style="background:rgba(200,80,96,0.5)">crim/50</div>
<div class="cell" style="background:#C85060;color:#0A0A0F">crim/100</div>
<div class="cell" style="background:#C85060;color:#EEF2F7;box-shadow:0 0 18px rgba(200,80,96,0.3)">glow</div>
</div></div>
<div class="sec">
<div class="label">Lavender knowledge</div>
<div class="grid">
<div class="cell" style="background:rgba(138,140,181,0.05)">lav/5</div>
<div class="cell" style="background:rgba(138,140,181,0.1);border:1px solid rgba(138,140,181,0.25)">lav/10</div>
<div class="cell" style="background:rgba(138,140,181,0.2)">lav/20</div>
<div class="cell" style="background:#8A8CB5;color:#0A0A0F">lav/100</div>
<div class="cell" style="background:#8A8CB5;color:#0A0A0F;box-shadow:0 0 18px rgba(138,140,181,0.3)">glow</div>
</div></div>
</div></body></html>
