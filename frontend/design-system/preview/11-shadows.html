<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>body{padding:28px 20px 36px}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.box{height:80px;background:var(--enc-surface);border:1px solid rgba(61,155,168,0.2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:11px;color:var(--enc-seafoam)}
.nm{font-family:var(--font-body);font-size:11px;color:var(--enc-dust);margin-top:10px;text-align:center}</style>
</head><body><div class="card">
<div class="grid">
<div><div class="box" style="box-shadow:0 1px 2px rgba(0,0,0,0.4)">shadow-sm</div><div class="nm">subtle lift</div></div>
<div><div class="box" style="box-shadow:0 4px 18px rgba(0,0,0,0.5)">shadow-md</div><div class="nm">floating CTAs</div></div>
<div><div class="box" style="box-shadow:0 8px 48px rgba(0,0,0,0.7)">shadow-lg</div><div class="nm">modals / carousel</div></div>
<div><div class="box" style="box-shadow:0 0 24px rgba(61,155,168,0.3);border-color:rgba(61,155,168,0.5)">glow-teal</div><div class="nm">interactive focus</div></div>
<div><div class="box" style="box-shadow:0 0 24px rgba(138,140,181,0.35);border-color:rgba(138,140,181,0.5)">glow-lavender</div><div class="nm">high-score lesson</div></div>
<div><div class="box" style="box-shadow:0 0 24px rgba(200,80,96,0.35);border-color:rgba(200,80,96,0.5)">glow-crimson</div><div class="nm">P0 / critical</div></div>
</div>
</div></body></html>
