<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sw{border-radius:8px;padding:10px 12px;min-height:110px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid rgba(61,155,168,0.15)}
.sw .n{font-family:var(--font-heading);font-weight:700;font-size:12px;color:var(--enc-seafoam);margin:0}
.sw .h{font-family:var(--font-mono);font-size:10px;color:var(--enc-dust);margin-top:2px}
.sw.on-light .n,.sw.on-light .h{color:#0A0A0F}
</style></head><body><div class="card">
<div class="swatches">
 <div class="sw on-light" style="background:#8A8CB5"><p class="n">Nebula Lavender</p><div class="h">#8A8CB5</div></div>
 <div class="sw on-light" style="background:#C85060"><p class="n">Stellar Crimson</p><div class="h">#C85060</div></div>
 <div class="sw on-light" style="background:#7AC8D4"><p class="n">Tectonic Teal</p><div class="h">#7AC8D4</div></div>
 <div class="sw" style="background:#2E4D5C"><p class="n">Terminator Slate</p><div class="h">#2E4D5C</div></div>
 <div class="sw on-light" style="background:#6B8A94"><p class="n">Lunar Dust</p><div class="h">#6B8A94</div></div>
</div>
</div></body></html>
