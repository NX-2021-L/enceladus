<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(61,155,168,0.1)}
.row:last-child{border-bottom:none}
.left{display:flex;align-items:center;gap:12px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:4px;font-family:var(--font-mono);font-size:11px;font-weight:500}
.label{color:var(--enc-starlight);font-family:var(--font-body);font-size:13px}
.hex{color:var(--enc-dust);font-family:var(--font-mono);font-size:11px}
</style></head><body><div class="card">
<div class="row"><div class="left"><span class="chip" style="background:rgba(61,155,168,0.1);color:#3D9BA8;border:1px solid rgba(61,155,168,0.35)">● Open</span><span class="label">Active records, open status</span></div><span class="hex">#3D9BA8</span></div>
<div class="row"><div class="left"><span class="chip" style="background:rgba(122,200,212,0.15);color:#7AC8D4;border:1px solid rgba(122,200,212,0.4)">◐ In Progress</span><span class="label">Tasks being worked on (animate-pulse)</span></div><span class="hex">#7AC8D4</span></div>
<div class="row"><div class="left"><span class="chip" style="background:rgba(200,80,96,0.1);color:#C85060;border:1px solid rgba(200,80,96,0.5)">✕ Blocked</span><span class="label">Dependency-blocked, P0 issues</span></div><span class="hex">#C85060</span></div>
<div class="row"><div class="left"><span class="chip" style="background:rgba(46,77,92,0.3);color:#6B8A94;border:1px solid rgba(46,77,92,0.6)">✓ Closed</span><span class="label">Closed / done · 60% opacity</span></div><span class="hex">#2E4D5C</span></div>
<div class="row"><div class="left"><span class="chip" style="background:rgba(138,140,181,0.1);color:#8A8CB5;border:1px solid rgba(138,140,181,0.4);font-style:italic">◇ Draft</span><span class="label">Draft / pending</span></div><span class="hex">#8A8CB5</span></div>
<div class="row"><div class="left"><span class="chip" style="background:rgba(138,140,181,0.12);color:#8A8CB5;border:1px solid rgba(138,140,181,0.4);box-shadow:0 0 18px rgba(138,140,181,0.25)">◆ Lesson</span><span class="label">Knowledge primitive · glow-lavender</span></div><span class="hex">#8A8CB5</span></div>
</div></body></html>
