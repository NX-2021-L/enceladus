<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>.row{display:flex;align-items:baseline;gap:16px;padding:6px 0;border-bottom:1px solid rgba(61,155,168,0.1)}
.row:last-child{border:0}
.k{font-family:var(--font-body);font-size:12px;color:var(--enc-dust);width:140px;text-transform:uppercase;letter-spacing:0.07em}
.v{font-family:var(--font-mono)}</style>
</head><body><div class="card">
<div class="row"><div class="k">Record ID</div><span class="v" style="color:var(--enc-teal);font-size:15px;opacity:0.85">ENC-FTR-052</span></div>
<div class="row"><div class="k">Score</div><span class="v" style="color:var(--enc-teal);font-size:18px;font-weight:500;font-variant-numeric:tabular-nums">0.823</span></div>
<div class="row"><div class="k">Gov Hash</div><span class="v" style="color:var(--enc-dust);font-size:12px">3f8a9c · d7e4f2b1</span></div>
<div class="row"><div class="k">TTL</div><span class="v" style="color:var(--enc-teal-light);font-size:14px">42s</span></div>
<div class="row"><div class="k">Version</div><span class="v" style="color:var(--enc-dust);font-size:12px">v0.20.12</span></div>
<div class="row"><div class="k">Inline code</div><code style="font-family:var(--font-mono);font-size:13px;background:var(--enc-slate);color:var(--enc-teal-light);padding:2px 8px;border-radius:3px;border:1px solid rgba(61,155,168,0.2)">pillar_composite ≥ 0.80</code></div>
<div style="margin-top:12px;font-family:var(--font-body);font-size:11px;color:var(--enc-dust);font-style:italic">JetBrains Mono · 400/500 · telemetry is decoration, not noise</div>
</div></body></html>
