<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>.row{display:flex;align-items:center;gap:18px;padding:10px 0;border-bottom:1px solid rgba(61,155,168,0.1)}
.row:last-child{border:0}
.nm{font-family:var(--font-heading);font-weight:500;font-size:14px;color:var(--enc-seafoam);width:130px}
.curve{flex:1;height:36px;position:relative;background:rgba(61,155,168,0.06);border-radius:4px;overflow:hidden}
.dot{position:absolute;top:50%;width:14px;height:14px;border-radius:50%;background:var(--enc-teal);transform:translateY(-50%);box-shadow:0 0 12px rgba(61,155,168,0.6)}
@keyframes orbit{0%{left:4px}50%{left:calc(100% - 18px)}100%{left:4px}}
.d1{animation:orbit 2s cubic-bezier(0.4,0,0.2,1) infinite}
.d2{animation:orbit 2s cubic-bezier(0.34,1.56,0.64,1) infinite;background:var(--enc-crimson);box-shadow:0 0 12px rgba(200,80,96,0.5)}
.meta{font-family:var(--font-mono);font-size:10px;color:var(--enc-dust);width:170px}</style>
</head><body><div class="card">
<div class="row"><div class="nm">Orbital ✓</div><div class="curve"><div class="dot d1"></div></div><div class="meta">cubic-bezier(.4,0,.2,1)</div></div>
<div class="row"><div class="nm">Spring ✗</div><div class="curve"><div class="dot d2"></div></div><div class="meta">banned — no bounces</div></div>
<div style="display:flex;gap:14px;margin-top:14px;font-family:var(--font-mono);font-size:11px;color:var(--enc-dust)">
<div>dur-fast <span style="color:var(--enc-teal-light)">150ms</span></div>
<div>dur-base <span style="color:var(--enc-teal-light)">200ms</span></div>
<div>dur-slow <span style="color:var(--enc-teal-light)">300ms</span></div>
</div>
</div></body></html>
