<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.l{font-family:var(--font-body);font-size:10px;color:var(--enc-dust);text-transform:uppercase;letter-spacing:0.07em;margin-bottom:8px}
.btn-float{background:var(--enc-surface);color:var(--enc-teal);border:1px solid var(--enc-teal);padding:10px 18px;border-radius:8px;font-family:var(--font-heading);font-weight:500;font-size:14px;box-shadow:0 4px 18px rgba(0,0,0,0.5);display:inline-flex;align-items:center;gap:8px;cursor:pointer;transition:all 200ms cubic-bezier(0.4,0,0.2,1)}
.btn-float:hover{background:var(--enc-surface-alt);border-color:var(--enc-teal-light);color:var(--enc-teal-light);transform:translateY(-2px)}
.btn-ghost{background:transparent;color:var(--enc-teal);border:1px solid transparent;padding:8px 14px;border-radius:6px;font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer}
.btn-ghost:hover{border-color:rgba(61,155,168,0.4);color:var(--enc-teal-light)}
.btn-danger{background:rgba(200,80,96,0.1);color:var(--enc-crimson);border:1px solid rgba(200,80,96,0.5);padding:8px 14px;border-radius:6px;font-family:var(--font-body);font-size:13px;font-weight:500;cursor:pointer}
.btn-primary{background:var(--enc-teal);color:var(--enc-void);border:0;padding:10px 18px;border-radius:6px;font-family:var(--font-heading);font-weight:500;font-size:14px;cursor:pointer}</style>
</head><body><div class="card">
<div class="grid">
<div><div class="l">Floating CTA</div><button class="btn-float">◆ View Platform Screenshots</button></div>
<div><div class="l">Primary</div><button class="btn-primary">Create Project</button></div>
<div><div class="l">Ghost / text</div><button class="btn-ghost">View all</button></div>
<div><div class="l">Danger</div><button class="btn-danger">Block Task</button></div>
</div>
</div></body></html>
