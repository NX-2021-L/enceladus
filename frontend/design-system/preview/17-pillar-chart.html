<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>.wrap{background:var(--enc-surface-alt);border:1px solid rgba(61,155,168,0.2);border-radius:10px;padding:16px 18px}
.scores{display:flex;gap:28px;margin-bottom:14px}
.sc .n{font-family:var(--font-heading);font-weight:700;font-size:28px;line-height:1;font-variant-numeric:tabular-nums}
.sc .lbl{font-family:var(--font-body);font-size:11px;color:var(--enc-dust);margin-top:4px;text-transform:uppercase;letter-spacing:0.07em}
.pillar{display:flex;align-items:center;gap:10px;margin:6px 0}
.pname{font-family:var(--font-body);font-size:12px;color:var(--enc-starlight);width:130px}
.track{flex:1;height:8px;background:var(--enc-slate);border-radius:4px;overflow:hidden}
.fill{height:100%;border-radius:4px}
.v{font-family:var(--font-mono);font-size:11px;color:var(--enc-dust);width:40px;text-align:right;font-variant-numeric:tabular-nums}</style>
</head><body><div class="card">
<div class="wrap">
<div class="scores">
<div class="sc"><div class="n" style="color:var(--enc-lavender)">0.823</div><div class="lbl">Composite</div></div>
<div class="sc"><div class="n" style="color:var(--enc-teal-light)">0.734</div><div class="lbl">Resonance</div></div>
</div>
<div class="pillar"><div class="pname">Efficiency</div><div class="track"><div class="fill" style="width:82%;background:var(--enc-teal-light)"></div></div><span class="v">0.82</span></div>
<div class="pillar"><div class="pname">Human Protection</div><div class="track"><div class="fill" style="width:91%;background:var(--enc-seafoam)"></div></div><span class="v">0.91</span></div>
<div class="pillar"><div class="pname">Intention</div><div class="track"><div class="fill" style="width:76%;background:var(--enc-teal)"></div></div><span class="v">0.76</span></div>
<div class="pillar"><div class="pname">Alignment</div><div class="track"><div class="fill" style="width:79%;background:var(--enc-lavender)"></div></div><span class="v">0.79</span></div>
</div>
</div></body></html>
