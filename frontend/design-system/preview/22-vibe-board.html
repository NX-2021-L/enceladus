<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.pair{background:var(--enc-surface-alt);border:1px solid rgba(61,155,168,0.18);border-radius:8px;padding:12px 14px;display:flex;align-items:baseline;gap:10px}
.a{font-family:var(--font-heading);font-weight:700;font-size:15px;color:var(--enc-teal)}
.s{font-family:var(--font-body);font-size:14px;color:var(--enc-dust)}
.b{font-family:var(--font-heading);font-weight:500;font-size:15px;color:var(--enc-lavender)}
.extra{margin-top:12px;font-family:var(--font-mono);font-size:11px;color:var(--enc-dust);display:flex;gap:12px;flex-wrap:wrap}
.extra span{padding:3px 8px;border:1px solid rgba(138,140,181,0.3);border-radius:3px;color:var(--enc-lavender)}</style>
</head><body><div class="card">
<div class="grid">
<div class="pair"><span class="a">force</span><span class="s">/</span><span class="b">surrender</span></div>
<div class="pair"><span class="a">convergence</span><span class="s">/</span><span class="b">play</span></div>
<div class="pair"><span class="a">efficiency</span><span class="s">/</span><span class="b">love</span></div>
<div class="pair"><span class="a">intention</span><span class="s">/</span><span class="b">flow</span></div>
</div>
<div class="extra"><span>will</span><span>balance</span><span>resonance</span><span>telemetry</span></div>
</div></body></html>
