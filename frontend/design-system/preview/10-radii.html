<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}
.s{aspect-ratio:1;background:rgba(61,155,168,0.15);border:1px solid rgba(61,155,168,0.4);display:flex;align-items:flex-end;padding:8px}
.lbl{font-family:var(--font-mono);font-size:10px;color:var(--enc-dust)}
.nm{font-family:var(--font-body);font-size:11px;color:var(--enc-starlight);margin-top:6px}</style>
</head><body><div class="card">
<div class="grid">
<div><div class="s" style="border-radius:3px"><span class="lbl">3px</span></div><div class="nm">radius-xs · code pills</div></div>
<div><div class="s" style="border-radius:4px"><span class="lbl">4px</span></div><div class="nm">radius-sm · chips</div></div>
<div><div class="s" style="border-radius:6px"><span class="lbl">6px</span></div><div class="nm">radius-md · quotes</div></div>
<div><div class="s" style="border-radius:8px"><span class="lbl">8px</span></div><div class="nm">radius-lg · cards</div></div>
<div><div class="s" style="border-radius:12px"><span class="lbl">12px</span></div><div class="nm">radius-xl · panels</div></div>
</div>
</div></body></html>
