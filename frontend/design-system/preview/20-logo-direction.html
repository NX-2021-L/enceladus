<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>.row{display:flex;gap:20px;align-items:center;padding:16px 0;border-bottom:1px solid rgba(61,155,168,0.1)}
.row:last-child{border:0}
.mark{width:72px;height:72px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;background:var(--enc-void);border-radius:10px}
.meta{font-family:var(--font-mono);font-size:10px;color:var(--enc-dust);margin-top:6px}
.nm{font-family:var(--font-heading);font-weight:500;font-size:13px;color:var(--enc-seafoam)}</style>
</head><body><div class="card">
<div class="row">
<div class="mark">
<svg width="52" height="52" viewBox="0 0 52 52" fill="none">
<circle cx="26" cy="26" r="23" stroke="#3D9BA8" stroke-width="2"/>
<path d="M 6 26 A 20 20 0 0 1 46 26" stroke="#7AC8D4" stroke-width="1.2" fill="none" opacity="0.6"/>
<circle cx="26" cy="26" r="5" fill="#8A8CB5"/>
</svg>
</div>
<div><div style="font-family:var(--font-display);font-weight:800;font-size:26px;letter-spacing:0.15em;color:var(--enc-seafoam)">ENCELADUS</div><div class="meta">Wordmark · Syne/Space Grotesk · tracking 0.15em · seafoam on void</div></div>
</div>
<div class="row">
<div class="mark" style="background:var(--enc-surface-alt)">
<svg width="52" height="52" viewBox="0 0 52 52" fill="none">
<polygon points="26,4 46,16 46,36 26,48 6,36 6,16" stroke="#3D9BA8" stroke-width="2" fill="rgba(61,155,168,0.08)"/>
<circle cx="26" cy="26" r="4" fill="#3D9BA8" opacity="0.8"/>
</svg>
</div>
<div><div class="nm">Governance Node · secondary mark</div><div class="meta">Hexagonal node · Neo4j reference · dev contexts, favicon</div></div>
</div>
<div class="row">
<div class="mark" style="width:32px;height:32px;border-radius:6px">
<svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="9" stroke="#3D9BA8" stroke-width="1.5" fill="none"/><circle cx="11" cy="11" r="5" stroke="#7AC8D4" stroke-width="1" fill="none" opacity="0.6"/><circle cx="11" cy="11" r="2" fill="#8A8CB5"/></svg>
</div>
<div><div class="nm">Favicon 32×32 · 3-arc cross-section</div><div class="meta">teal outer · teal/50 middle · lavender dot · tx bg</div></div>
</div>
</div></body></html>
