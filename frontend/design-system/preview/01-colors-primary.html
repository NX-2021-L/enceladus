<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_card.css">
<style>
.swatches{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sw{border-radius:8px;padding:10px 12px;min-height:110px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid rgba(61,155,168,0.15)}
.sw .n{font-family:var(--font-heading);font-weight:700;font-size:12px;color:var(--enc-seafoam);margin:0}
.sw .h{font-family:var(--font-mono);font-size:10px;color:var(--enc-dust);margin-top:2px}
.sw.on-dark .n{color:var(--enc-seafoam)}
.sw.on-light .n,.sw.on-light .h{color:#0A0A0F}
</style></head><body><div class="card">
<div class="swatches">
 <div class="sw on-dark" style="background:#0A0A0F;border-color:rgba(255,255,255,0.08)"><p class="n">Void Black</p><div class="h">#0A0A0F</div></div>
 <div class="sw on-dark" style="background:#111827"><p class="n">Deep Space</p><div class="h">#111827</div></div>
 <div class="sw on-light" style="background:#3D9BA8"><p class="n">Cosmic Teal</p><div class="h">#3D9BA8</div></div>
 <div class="sw on-light" style="background:#C8DDD9"><p class="n">Seafoam</p><div class="h">#C8DDD9</div></div>
 <div class="sw on-light" style="background:#EEF2F7"><p class="n">Starlight</p><div class="h">#EEF2F7</div></div>
</div>
</div></body></html>
