<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../../styles.css">
<style>body{background:var(--enc-void);margin:0;padding:24px;font-family:var(--font-body)}.w{max-width:520px}</style>
</head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../../../_ds_bundle.js"></script>
<script>
const { AttributeEditor } = window.EnceladusDesignSystem_7eb1fe;
const e = React.createElement;
function Demo(){
  const [items,setItems]=React.useState([
    {key:'blocks',value:'ENC-TSK-A58'},
    {key:'derived-from',value:'ENC-LSN-004'}
  ]);
  return e('div',{className:'w'},e(AttributeEditor,{items:items,keyLabel:'Edge type',valueLabel:'Target record',
    onChange:(ev)=>setItems(ev.detail.items),
    onAddButtonClick:()=>setItems([...items,{key:'',value:''}]),
    onRemoveButtonClick:(ev)=>setItems(items.filter((_,j)=>j!==ev.detail.itemIndex))}));
}
ReactDOM.createRoot(document.getElementById('root')).render(e(Demo));
</script>
</body></html>
