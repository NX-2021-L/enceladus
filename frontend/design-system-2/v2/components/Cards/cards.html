<!-- @dsCard group="v2 · Collections" viewport="820x340" name="Cards" subtitle="Selectable card grid · label/value sections" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../../styles.css">
<style>body{background:var(--enc-void);margin:0;padding:24px;font-family:var(--font-body)}</style>
</head><body><div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="../../../_ds_bundle.js"></script>
<script>
const NS = window.EnceladusDesignSystem_7eb1fe;
const { Cards, Header, Badge, Link } = NS;
const e = React.createElement;
const projects=[
  { id:'enceladus', name:'Enceladus', tasks:14, issues:3, features:52 },
  { id:'devops', name:'DevOps', tasks:6, issues:1, features:31 },
  { id:'showcase', name:'Showcase', tasks:2, issues:0, features:7 },
];
function Demo(){
  const [sel,setSel]=React.useState([projects[0]]);
  return e(Cards,{
    items:projects, columns:3, selectionType:'multi', selectedItems:sel, trackBy:'id',
    onSelectionChange:(ev)=>setSel(ev.detail.selectedItems),
    header:e(Header,{variant:'h2',counter:'(3)'},'Projects'),
    cardDefinition:{
      header:(p)=>e(Link,null,p.name),
      sections:[
        { id:'id', header:'Prefix', content:(p)=>e('span',{className:'ev2-table__mono',style:{fontFamily:'JetBrains Mono',color:'#3D9BA8',fontSize:12}},p.id) },
        { id:'stats', header:'Open work', content:(p)=>e('span',null,
            e(Badge,{color:'teal'},p.tasks+' tasks'),' ',
            e(Badge,{color:'crimson'},p.issues+' issues')) },
      ],
    },
  });
}
ReactDOM.createRoot(document.getElementById('root')).render(e(Demo));
</script>
</body></html>
