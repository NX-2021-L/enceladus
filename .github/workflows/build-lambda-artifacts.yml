name: Build Lambda Artifacts

on:
  pull_request:
    branches: [main]
    paths:
      - 'backend/lambda/**'
      - 'tools/package_lambda_artifact.sh'
      - 'tools/check_lambda_pyjwt_requirements.py'
      - 'infrastructure/lambda_workflow_manifest.json'
      - 'tools/enceladus-mcp-server/server.py'
      - 'tools/enceladus-mcp-server/manifest_projection.py'
      - 'tools/enceladus-mcp-server/dispatch_plan_generator.py'
      - '.github/workflows/build-lambda-artifacts.yml'
  push:
    branches: [main]
    paths:
      - 'backend/lambda/**'
      - 'tools/package_lambda_artifact.sh'
      - 'tools/check_lambda_pyjwt_requirements.py'
      - 'infrastructure/lambda_workflow_manifest.json'
      - 'tools/enceladus-mcp-server/server.py'
      - 'tools/enceladus-mcp-server/manifest_projection.py'
      - 'tools/enceladus-mcp-server/dispatch_plan_generator.py'
      - '.github/workflows/build-lambda-artifacts.yml'
  workflow_call:
    outputs:
      artifact_prefix:
        description: 'S3 prefix for built artifacts'
        value: ${{ jobs.upload-artifacts.outputs.artifact_prefix }}

permissions:
  id-token: write
  contents: read

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      functions: ${{ steps.parse.outputs.functions }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard — every jwt-importing Lambda must declare PyJWT in requirements.txt (ENC-LSN-020)
        run: python3 tools/check_lambda_pyjwt_requirements.py

      - name: Parse manifest into matrix
        id: parse
        run: |
          # Emit a bare JSON array of per-function objects so `function` can be a
          # real matrix dimension below. The previous `{include: [...]}` shape
          # collapsed under GitHub Actions matrix-merge semantics: include entries
          # share no key with the base arch_tag dimension, so each was merged into
          # the 2 arch combinations and later functions overwrote earlier ones,
          # leaving only the LAST manifest function building (ENC-ISS-402).
          #
          # Only include functions this workflow can actually package: those with a
          # backend/lambda/<dir>/lambda_function.py. Out-of-band Lambdas such as
          # enceladus-mcp-code / enceladus-mcp-streamable (deployed via
          # tools/enceladus-mcp-server, no lambda_function.py) have no handler here,
          # and packaging them would hard-fail tools/package_lambda_artifact.sh.
          #
          # package_extra_files is joined to a comma-separated string here because
          # tools/package_lambda_artifact.sh parses its 4th arg with IFS=','.
          present=$(find backend/lambda -maxdepth 2 -name lambda_function.py \
            | sed -E 's|/lambda_function\.py$||' | jq -R . | jq -cs .)
          functions=$(jq -c --argjson present "$present" \
            '[.functions[]
               | select(.lambda_dir as $d | ($present | index($d)) != null)
               | {function_name: .function_name, lambda_dir: .lambda_dir, package_extra_files: ((.package_extra_files // []) | join(","))}]' \
            infrastructure/lambda_workflow_manifest.json)
          echo "functions=${functions}" >> "$GITHUB_OUTPUT"
          echo "Included $(echo "${functions}" | jq 'length') packageable functions of $(jq '.functions | length' infrastructure/lambda_workflow_manifest.json) in manifest." >&2
          echo "Skipped (no lambda_function.py — built out-of-band):" >&2
          jq -r --argjson present "$present" '.functions[] | select(.lambda_dir as $d | ($present | index($d)) == null) | "  - \(.function_name) (\(.lambda_dir))"' infrastructure/lambda_workflow_manifest.json >&2
          echo "${functions}" | jq . >&2

  build:
    needs: setup-matrix
    runs-on: ubuntu-latest
    strategy:
      # Don't let one function's packaging failure cancel the other 50+ jobs and
      # wipe every artifact — each function builds and uploads independently.
      fail-fast: false
      max-parallel: 10
      matrix:
        # Full cross-product: every packageable function builds for every arch.
        arch_tag: [x86_64-py311, arm64-py312]
        function: ${{ fromJson(needs.setup-matrix.outputs.functions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Package Lambda artifact
        id: package
        run: |
          zip_path=$(bash tools/package_lambda_artifact.sh \
            "${{ matrix.function.function_name }}" \
            "${{ matrix.function.lambda_dir }}" \
            "${{ matrix.arch_tag }}" \
            "${{ matrix.function.package_extra_files }}")
          echo "zip_path=${zip_path}" >> "$GITHUB_OUTPUT"

      - name: Derive expected architecture
        id: arch
        run: |
          case "${{ matrix.arch_tag }}" in
            x86_64-py311) echo "expected=x86_64" >> "$GITHUB_OUTPUT" ;;
            arm64-py312)  echo "expected=arm64"  >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Verify package architecture
        run: |
          python3 tools/verify_lambda_package_arch.py \
            --package "${{ steps.package.outputs.zip_path }}" \
            --expected-arch "${{ steps.arch.outputs.expected }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-${{ matrix.function.function_name }}-${{ matrix.arch_tag }}
          path: ${{ steps.package.outputs.zip_path }}
          retention-days: 7

  # ---------------------------------------------------------------------------
  # BUILD-MCP-CODE — packages enceladus-mcp-code from tools/enceladus-mcp-server/
  # (ENC-TSK-I39). See _build.yml build-mcp-code for rationale.
  # ---------------------------------------------------------------------------
  build-mcp-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Package enceladus-mcp-code
        run: |
          set -euo pipefail
          BUILD=$(mktemp -d)
          cp tools/enceladus-mcp-server/server.py              "$BUILD/"
          cp tools/enceladus-mcp-server/manifest_projection.py "$BUILD/"
          cp tools/enceladus-mcp-server/dispatch_plan_generator.py "$BUILD/"
          cp backend/lambda/shared_layer/python/enceladus_shared/appconfig_flags.py "$BUILD/"
          python -m pip install \
            --platform manylinux2014_x86_64 \
            --implementation cp \
            --python-version 3.11 \
            --only-binary=:all: \
            --upgrade \
            --target "$BUILD" \
            -r backend/lambda/mcp_code/requirements.txt \
            --quiet
          ZIP="/tmp/enceladus-mcp-code.zip"
          (cd "$BUILD" && zip -qrX "$ZIP" .)
          echo "zip_path=${ZIP}" >> "$GITHUB_OUTPUT"
        id: package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-enceladus-mcp-code-x86_64-py311
          path: /tmp/enceladus-mcp-code.zip
          retention-days: 7

  upload-artifacts:
    needs: [build, build-mcp-code]
    # Upload on push to main (standalone) or when called via workflow_call (from deploy-orchestration)
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_call' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      artifact_prefix: ${{ steps.upload.outputs.artifact_prefix }}
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BACKEND_ROLE_TO_ASSUME }}
          aws-region: us-west-2

      - name: Upload artifacts to S3
        id: upload
        run: |
          prefix="lambda-artifacts/${GITHUB_SHA}"
          for dir in artifacts/lambda-*; do
            artifact_name=$(basename "${dir}")
            # artifact_name is lambda-<function_name>-<arch_tag>
            # Extract arch_tag (last segment after the last hyphen-group matching an arch pattern)
            arch_tag=$(echo "${artifact_name}" | grep -oE '(x86_64-py311|arm64-py312)$')
            function_name=$(echo "${artifact_name}" | sed "s/^lambda-//" | sed "s/-${arch_tag}$//")

            zip_file=$(find "${dir}" -name '*.zip' | head -1)
            if [[ -z "${zip_file}" ]]; then
              echo "WARNING: No zip found in ${dir}, skipping" >&2
              continue
            fi

            s3_key="${prefix}/${arch_tag}/${function_name}.zip"
            echo "Uploading ${zip_file} -> s3://jreese-net/${s3_key}" >&2
            aws s3 cp "${zip_file}" "s3://jreese-net/${s3_key}"
          done

          echo "artifact_prefix=${prefix}" >> "$GITHUB_OUTPUT"
          echo "All artifacts uploaded to s3://jreese-net/${prefix}/" >&2
