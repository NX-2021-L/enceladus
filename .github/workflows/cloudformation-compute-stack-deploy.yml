name: CloudFormation Compute Stack Deploy

# ENC-TSK-J62 / ENC-FTR-120: plan/apply split with a GitHub Environment gate.
# The plan job runs every read-only guard (orphan-Lambda guard, pre-deploy
# health gate, NoEcho strip-class guards) and creates — but does not execute —
# the 01-data and 02-compute change-sets, writing their resource summaries to
# the job summary. The apply job runs inside a GitHub Environment: v3-prod
# (required reviewer: io) for main, v4-gamma (no reviewer) for v4/**. A merge
# to main therefore PAUSES as a reviewable, rejectable request instead of
# deploying prod directly (the 1292/J08 class).
#
# Change-set creation uses `aws cloudformation deploy --no-execute-changeset`
# deliberately: it preserves deploy's parameter-override semantics (unlisted
# params reuse the stack's stored values), which the ENC-LSN-053 NoEcho
# strip-class guards depend on.
#
# Known constraint: the 02-compute change-set is created before the 01-data
# change-set applies, so a change that ADDS a new cross-stack export consumed
# by 02-compute in the same merge fails at plan (missing export). Remediation:
# land/dispatch the data-stack change first, then re-run. Pre-cutover both
# stacks are fully deployed, so this is a rare, loud, safe failure mode.

on:
  push:
    branches:
      - main
      - 'v4/**'
    paths:
      - "infrastructure/cloudformation/01-data.yaml"
      - "infrastructure/cloudformation/02-compute.yaml"
      - ".github/workflows/cloudformation-compute-stack-deploy.yml"
  workflow_dispatch:
    inputs:
      stack_name:
        description: "CloudFormation stack name for 02-compute template"
        type: string
        required: false
        default: "enceladus-compute"
      data_stack_name:
        description: "Referenced data stack name (for cross-stack imports)"
        type: string
        required: false
        default: "enceladus-data"
      reason:
        description: "Why this deploy is being triggered"
        type: string
        required: false
        default: "manual compute stack deploy"

permissions:
  contents: read
  id-token: write

concurrency:
  group: cloudformation-compute-stack-deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: us-west-2
  TEMPLATE_FILE: infrastructure/cloudformation/02-compute.yaml
  ENVIRONMENT_SUFFIX: ${{ startsWith(github.ref, 'refs/heads/v4/') && '-gamma' || '' }}
  DEFAULT_STACK_NAME: enceladus-compute
  DEFAULT_DATA_STACK_NAME: enceladus-data

jobs:
  plan:
    name: Plan Data + Compute change-sets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      stack_name: ${{ steps.params.outputs.stack_name }}
      data_stack_name: ${{ steps.params.outputs.data_stack_name }}
      data_has_changes: ${{ steps.data_changeset.outputs.has_changes }}
      data_changeset_arn: ${{ steps.data_changeset.outputs.changeset_arn }}
      compute_has_changes: ${{ steps.compute_changeset.outputs.has_changes }}
      compute_changeset_arn: ${{ steps.compute_changeset.outputs.changeset_arn }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify CF role secret is set
        run: |
          if [ -z "${{ secrets.AWS_CLOUDFORMATION_ROLE_TO_ASSUME }}" ]; then
            echo "::error::AWS_CLOUDFORMATION_ROLE_TO_ASSUME secret is not set or empty. Set it to the ARN of a role with cloudformation:* and lambda:*/iam:* permissions."
            exit 1
          fi
          echo "AWS_CLOUDFORMATION_ROLE_TO_ASSUME is set."

      - name: Configure AWS credentials (OIDC privileged CloudFormation role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CLOUDFORMATION_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Resolve deployment parameters
        id: params
        env:
          INPUT_STACK_NAME: ${{ github.event.inputs.stack_name }}
          INPUT_DATA_STACK_NAME: ${{ github.event.inputs.data_stack_name }}
        run: |
          set -euo pipefail

          stack_name="${INPUT_STACK_NAME:-${DEFAULT_STACK_NAME}}${ENVIRONMENT_SUFFIX}"
          data_stack_name="${INPUT_DATA_STACK_NAME:-${DEFAULT_DATA_STACK_NAME}}${ENVIRONMENT_SUFFIX}"

          {
            echo "stack_name=${stack_name}"
            echo "data_stack_name=${data_stack_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Guard against unadopted out-of-band Lambdas (ENC-TSK-H29 / ENC-ISS-386)
        run: |
          set -euo pipefail
          # ENC-TSK-H29 / ENC-ISS-386: Lambda code+config for the template's functions is created
          # out-of-band by the matrix-build (_deploy.yml), NOT by this CFN workflow (see the CodeSize
          # step below). When such a function is created live but never adopted into the target stack,
          # `aws cloudformation deploy` plans it as an Add, and AWS::EarlyValidation::ResourceExistenceCheck
          # rejects the ENTIRE change set ("resource already exists") at change-set creation — silently
          # wedging every deploy to this stack (gamma sat broken ~2 months this way). The failure mode is
          # opaque (it names no resource), so detect it here and fail closed with the remediation.
          #
          # Signal uses ONLY perms the privileged CFN deploy role reliably holds: cloudformation
          # ListStackResources (the stack's own managed Lambda set) + lambda:GetFunction (live existence).
          # It deliberately does NOT read resource tags — the OIDC role lacks lambda:ListTags, and the
          # first cut of this guard relied on tags and produced a false-positive that failed the prod
          # deploy (every function read as untagged => "orphan"). Only !Sub "...${EnvironmentSuffix}"
          # FunctionNames are checked; literal cross-environment names (e.g. enceladus-mcp-code-gamma,
          # intentionally prod-owned and gated by Condition: IsProduction) are out of scope here.
          stack_name="${{ steps.params.outputs.stack_name }}"
          suffix="${ENVIRONMENT_SUFFIX}"
          managed=$(aws cloudformation list-stack-resources --stack-name "${stack_name}" --region "${AWS_REGION}" \
            --query "StackResourceSummaries[?ResourceType=='AWS::Lambda::Function'].PhysicalResourceId" \
            --output text 2>/dev/null | tr '\t' '\n' | sort -u)
          if [ -z "${managed}" ]; then
            echo "::warning::Could not read the managed Lambda set for ${stack_name} (new/empty stack or API error) — skipping orphan guard (fail open)."
            exit 0
          fi
          tfns=$(grep -E '^[[:space:]]*FunctionName:[[:space:]]*!Sub' "${TEMPLATE_FILE}" \
            | sed -E 's/.*!Sub[[:space:]]*//; s/"//g' \
            | sed -E "s/\\\$\{EnvironmentSuffix\}/${suffix}/g" \
            | grep -E '^[A-Za-z0-9._-]+$' | sort -u)
          orphans=()
          while IFS= read -r fn; do
            [ -z "${fn}" ] && continue
            aws lambda get-function --function-name "${fn}" --region "${AWS_REGION}" >/dev/null 2>&1 || continue  # not live => CFN creates fresh
            grep -qxF "${fn}" <<< "${managed}" || orphans+=("${fn}")
          done <<< "${tfns}"
          if [ "${#orphans[@]}" -gt 0 ]; then
            echo "::error::Unadopted out-of-band Lambda(s) detected — live but NOT managed by ${stack_name}."
            echo "::error::This deploy would fail AWS::EarlyValidation::ResourceExistenceCheck. Offending function(s):"
            printf '::error::  - %s\n' "${orphans[@]}"
            echo "::error::Remediate by IMPORTING them into ${stack_name} before re-running:"
            echo "::error::  aws cloudformation create-change-set --change-set-type IMPORT --stack-name ${stack_name} \\"
            echo "::error::    --resources-to-import <manifest> --template-url <s3 template> --parameters <UsePreviousValue + new> --capabilities CAPABILITY_NAMED_IAM"
            echo "::error::  aws cloudformation execute-change-set --stack-name ${stack_name} --change-set-name <name>"
            echo "::error::Full procedure: ENC-TSK-H29 / ENC-ISS-386 worklog."
            exit 1
          fi
          echo "✓ No unadopted out-of-band Lambdas — every live env-suffixed template function is managed by ${stack_name}."

      - name: Pre-deploy health gate (ENC-FTR-102 env parity + ENC-PLN-020 — ENC-TSK-H20)
        # ENC-TSK-H20 / ENC-PLN-048 Obj 3: run the sanctioned pre-deploy health gate
        # BEFORE change-set creation, so a deploy that would strip a deploy-critical
        # env var (the H05/H09/ENC-ISS-369 strip class) fails THIS job and no
        # change-set reaches the approval gate. Check 6 of the script is the FTR-102
        # env-parity gate (tools/env_parity_gate.py), registry-driven via
        # env_drift_registry.json (ENC-TSK-H16).
        #
        # AC2 (resolved-env parity reflects the actual deploy): --stack passes the SAME resolved
        # stack name the change-set uses (steps.params.outputs.stack_name), so the gate resolves
        # the template under the identical EnvironmentSuffix (prod="" / gamma="-gamma").
        # No `continue-on-error`: a non-zero exit is fail-closed and blocks the deploy.
        run: |
          set -euo pipefail
          bash tools/pre-deploy-health-gate.sh \
            --stack "${{ steps.params.outputs.stack_name }}" \
            --template "${TEMPLATE_FILE}" \
            --region "${AWS_REGION}"

      - name: Handle orphaned data-stack resources (pre-changeset idempotency guard)
        run: |
          set -euo pipefail
          # When a previous 01-data CFN update creates resources then rolls back with
          # DeletionPolicy:Retain, those resources are left untracked by the stack and the
          # next change-set fails AWS::EarlyValidation::ResourceExistenceCheck.
          #
          # ENC-TSK-J62 / ENC-FTR-120 posture change: on GAMMA this step self-heals by
          # deleting the orphaned debris (as before). On PROD it now FAILS CLOSED and
          # names the orphans instead of deleting prod resources from an ungated plan
          # job — strictly safer than the pre-J62 behavior, where this deletion ran
          # ungated on every main merge. Prod orphans need an explicit import or a
          # deliberate manual cleanup (DOC-B716E8FB10B6 hard-stop class).
          stack_name="${{ steps.params.outputs.data_stack_name }}"
          region="${AWS_REGION}"
          suffix="${ENVIRONMENT_SUFFIX}"
          is_gamma="false"
          [ "${suffix}" = "-gamma" ] && is_gamma="true"
          prod_orphans=()

          # --- SNS topics ---
          candidate_topics=(
            "arn:aws:sns:${region}:356364570033:enceladus-component-registry-events${suffix}"
          )
          tracked_sns=$(aws cloudformation list-stack-resources \
            --stack-name "${stack_name}" --region "${region}" \
            --query "StackResourceSummaries[?ResourceType=='AWS::SNS::Topic'].PhysicalResourceId" \
            --output text 2>/dev/null || echo "")
          for arn in "${candidate_topics[@]}"; do
            if echo "${tracked_sns}" | grep -qF "${arn}"; then
              echo "SNS topic tracked by stack, skipping: ${arn}"
            elif aws sns get-topic-attributes --topic-arn "${arn}" --region "${region}" >/dev/null 2>&1; then
              if [ "${is_gamma}" = "true" ]; then
                echo "Deleting orphaned SNS topic: ${arn}"
                aws sns delete-topic --topic-arn "${arn}" --region "${region}" 2>/dev/null || true
              else
                prod_orphans+=("SNS ${arn}")
              fi
            fi
          done

          # --- DynamoDB tables (new tables added by ENC-TSK-I27/I28 that can be orphaned) ---
          candidate_tables=(
            "governance-version${suffix}"
            "agent-sessions${suffix}"
            "agent-types${suffix}"
          )
          tracked_tables=$(aws cloudformation list-stack-resources \
            --stack-name "${stack_name}" --region "${region}" \
            --query "StackResourceSummaries[?ResourceType=='AWS::DynamoDB::Table'].PhysicalResourceId" \
            --output text 2>/dev/null || echo "")
          for table in "${candidate_tables[@]}"; do
            if echo "${tracked_tables}" | grep -qF "${table}"; then
              echo "DynamoDB table tracked by stack, skipping: ${table}"
              continue
            fi
            table_status=$(aws dynamodb describe-table --table-name "${table}" \
              --region "${region}" \
              --query "Table.TableStatus" --output text 2>/dev/null || echo "NOT_FOUND")
            if [ "${table_status}" = "NOT_FOUND" ]; then
              echo "Table does not exist: ${table} — nothing to do"
              continue
            fi
            if [ "${is_gamma}" != "true" ]; then
              prod_orphans+=("DynamoDB ${table}")
              continue
            fi
            protect=$(aws dynamodb describe-table --table-name "${table}" \
              --region "${region}" \
              --query "Table.DeletionProtectionEnabled" --output text 2>/dev/null || echo "false")
            if [ "${protect}" = "True" ] || [ "${protect}" = "true" ]; then
              echo "::warning::Table ${table} has DeletionProtection=true — skipping delete, manual import required"
            else
              echo "Deleting orphaned DynamoDB table: ${table} (status=${table_status})"
              aws dynamodb delete-table --table-name "${table}" --region "${region}" 2>&1 || true
              aws dynamodb wait table-not-exists --table-name "${table}" --region "${region}" 2>/dev/null || true
              echo "Table ${table} deleted."
            fi
          done

          if [ "${#prod_orphans[@]}" -gt 0 ]; then
            echo "::error::Orphaned prod data-stack resource(s) detected (live but not stack-managed):"
            printf '::error::  - %s\n' "${prod_orphans[@]}"
            echo "::error::Refusing to auto-delete prod resources from the plan job. Import them into ${stack_name} or clean up deliberately (DOC-B716E8FB10B6 hard-stop class), then re-run."
            exit 1
          fi

      - name: Create Data stack change-set (01-data, no execute)
        id: data_changeset
        run: |
          set -euo pipefail
          [ -n "${ENVIRONMENT_SUFFIX}" ] && environment="gamma" || environment="production"

          aws cloudformation deploy \
            --region "${AWS_REGION}" \
            --stack-name "${{ steps.params.outputs.data_stack_name }}" \
            --template-file infrastructure/cloudformation/01-data.yaml \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --no-execute-changeset \
            --s3-bucket enceladus-cfn-staging-us-west-2 \
            --s3-prefix 01-data/ \
            --parameter-overrides \
              EnvironmentSuffix="${ENVIRONMENT_SUFFIX}" \
              Environment="${environment}" \
              DynamoDBRegion="${AWS_REGION}" 2>&1 | tee /tmp/plan-data.log

          if grep -q "No changes to deploy" /tmp/plan-data.log; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "changeset_arn=" >> "${GITHUB_OUTPUT}"
            {
              echo "## Data stack plan — ${{ steps.params.outputs.data_stack_name }}"
              echo "No changes to deploy."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          changeset_arn=$(grep -oE 'arn:aws:cloudformation:[^ "]*changeSet/[^ "]*' /tmp/plan-data.log | head -1)
          if [ -z "${changeset_arn}" ]; then
            echo "::error::Data change-set creation output did not contain a change-set ARN."
            exit 1
          fi
          echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          echo "changeset_arn=${changeset_arn}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Data stack plan — ${{ steps.params.outputs.data_stack_name }}"
            echo ""
            echo "Change-set: \`${changeset_arn}\`"
            echo ""
            echo '```'
            aws cloudformation describe-change-set \
              --region "${AWS_REGION}" \
              --change-set-name "${changeset_arn}" \
              --query 'Changes[].{Action:ResourceChange.Action,Resource:ResourceChange.LogicalResourceId,Type:ResourceChange.ResourceType,Replacement:ResourceChange.Replacement}' \
              --output table
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create Compute stack change-set (02-compute, no execute)
        id: compute_changeset
        run: |
          set -euo pipefail

          # ENC-TSK-H05: CoordinationInternalApiKey is a NoEcho param with Default "".
          # `aws cloudformation deploy` REUSES a parameter's current stack value for any param
          # not in --parameter-overrides; the template Default applies only when the stack has
          # no stored value (a fresh stack or a newly added param). An empty/unset internal key
          # therefore resolves to "" and the env is zeroed on every consumer Lambda, re-triggering
          # the 2026-06-18 MCP-auth Sev-1 (ENC-LSN-053, DOC-ED50175387B8). Pass it explicitly and
          # fail closed if the secret is missing rather than silently stripping the key.
          # (ENC-TSK-H28 corrected the prior "no UsePreviousValue -> resolves to default" wording:
          # reuse-of-stored-value is also why the SharedLayerArn=:7 stale param persisted below.)
          if [ -z "${{ secrets.COORDINATION_INTERNAL_API_KEY }}" ]; then
            echo "::error::COORDINATION_INTERNAL_API_KEY secret is empty — refusing to deploy (would strip the internal key; ENC-TSK-H05)"
            exit 1
          fi

          # ENC-TSK-H27 / ENC-ISS-383: EnceladusCognitoClientSecret is likewise a NoEcho param
          # with Default "". The gamma MCP function (enceladus-mcp-code-gamma) carries the live
          # 52-char Cognito client secret OUT-OF-BAND in ENCELADUS_COGNITO_CLIENT_SECRET, which
          # 02-compute.yaml resolves from this param; a full-env deploy that does not pass it
          # resolves the var to "" and zeroes the secret, breaking the gamma OAuth-direct path
          # (ENC-TSK-F74 / ENC-ISS-279). Same NoEcho value-strip class as ENC-LSN-053 — the
          # key-specific H05 guard above does not catch it. Fail closed rather than strip it.
          if [ -z "${{ secrets.ENCELADUS_COGNITO_CLIENT_SECRET }}" ]; then
            echo "::error::ENCELADUS_COGNITO_CLIENT_SECRET secret is empty — refusing to deploy (would strip the gamma Cognito client secret; ENC-TSK-H27 / ENC-ISS-383)"
            exit 1
          fi

          # ENC-TSK-H28 / ENC-ISS-385: SharedLayerArn must be passed explicitly too -- for the
          # INVERSE reason to the NoEcho guards above. enceladus-shared:10 (== :7 + appconfig_flags)
          # is the canonical pin; 02-compute.yaml's SharedLayerArn Default is :10 and all 23 fns
          # !Ref it. But `aws cloudformation deploy` reuses the stack's stored param value for any
          # un-passed param, and the deployed enceladus-compute stack stored SharedLayerArn=:7
          # (stale/out-of-band). So every deploy reused :7, the :10 template Default was inert
          # ("No changes to deploy" for layers), and 21/23 fns stayed on enceladus-shared:7 --
          # blocking appconfig_flags fleet-wide (ENC-FTR-103) and ENC-TSK-H24 AC-1/AC-2. AXIS-2 of
          # ENC-LSN-053 / DOC-ED50175387B8: a template Default is NOT a deployed value. Passing the
          # canonical :10 ARN here forces the param so the heal moves live; the H24 gate
          # (tools/verify_shared_layer_version.py) asserts this override stays == the canonical pin.

          # ENC-TSK-J31 / ENC-ISS-462: env-aware AppConfig IDs so the gamma stack reads its OWN
          # feature-flags (enceladus-feature-flags-gamma) instead of prod's. Previously both prod
          # AND gamma deploys passed the prod IDs (5t3sqte/bnwj3lj), so gamma/UAT silently resolved
          # prod feature flags. Prod: 5t3sqte/bnwj3lj; gamma: fhhcl7m/zecfu42.
          if [ "${ENVIRONMENT_SUFFIX}" = "-gamma" ]; then
            APPCFG_APP="fhhcl7m"; APPCFG_ENV="zecfu42"
            # ENC-TSK-L54: scheduler IAM landed (enceladus-cfn-deploy-scheduler-v1 on CFN deploy role).
            RHYTHM_CYCLE_ENABLED="true"
          else
            APPCFG_APP="5t3sqte"; APPCFG_ENV="bnwj3lj"
            RHYTHM_CYCLE_ENABLED="true"
          fi

          aws cloudformation deploy \
            --region "${AWS_REGION}" \
            --stack-name "${{ steps.params.outputs.stack_name }}" \
            --template-file "${TEMPLATE_FILE}" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --no-execute-changeset \
            --s3-bucket enceladus-cfn-staging-us-west-2 \
            --s3-prefix 02-compute/ \
            --parameter-overrides \
              DataStackName="${{ steps.params.outputs.data_stack_name }}" \
              CoordinationInternalApiKey="${{ secrets.COORDINATION_INTERNAL_API_KEY }}" \
              AppConfigApplicationId="${APPCFG_APP}" \
              AppConfigEnvironmentId="${APPCFG_ENV}" \
              EnceladusCognitoClientSecret="${{ secrets.ENCELADUS_COGNITO_CLIENT_SECRET }}" \
              SharedLayerArn="arn:aws:lambda:us-west-2:356364570033:layer:enceladus-shared:10" \
              RhythmCycleEnabled="${RHYTHM_CYCLE_ENABLED}" \
              CursorWebhookSecret="${{ secrets.CURSOR_WEBHOOK_SECRET }}" 2>&1 | tee /tmp/plan-compute.log
              # ADE Component C (ENC-FTR-118): pass the Cursor webhook HMAC secret as a NoEcho
              # param so `aws cloudformation deploy` does not reuse/zero it (same value-strip class
              # as ENC-LSN-053). No hard empty-guard here on purpose: an unset secret resolves to
              # "" and the handler fails CLOSED (rejects all webhooks) — secure default — so an
              # un-set secret never wedges unrelated gamma compute deploys.

          if grep -q "No changes to deploy" /tmp/plan-compute.log; then
            echo "has_changes=false" >> "${GITHUB_OUTPUT}"
            echo "changeset_arn=" >> "${GITHUB_OUTPUT}"
            {
              echo "## Compute stack plan — ${{ steps.params.outputs.stack_name }}"
              echo "No changes to deploy."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          changeset_arn=$(grep -oE 'arn:aws:cloudformation:[^ "]*changeSet/[^ "]*' /tmp/plan-compute.log | head -1)
          if [ -z "${changeset_arn}" ]; then
            echo "::error::Compute change-set creation output did not contain a change-set ARN."
            exit 1
          fi
          echo "has_changes=true" >> "${GITHUB_OUTPUT}"
          echo "changeset_arn=${changeset_arn}" >> "${GITHUB_OUTPUT}"
          {
            echo "## Compute stack plan — ${{ steps.params.outputs.stack_name }}"
            echo ""
            echo "Change-set: \`${changeset_arn}\`"
            echo ""
            echo '```'
            aws cloudformation describe-change-set \
              --region "${AWS_REGION}" \
              --change-set-name "${changeset_arn}" \
              --query 'Changes[].{Action:ResourceChange.Action,Resource:ResourceChange.LogicalResourceId,Type:ResourceChange.ResourceType,Replacement:ResourceChange.Replacement}' \
              --output table
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  apply:
    name: Apply Data + Compute change-sets
    needs: plan
    if: needs.plan.outputs.data_has_changes == 'true' || needs.plan.outputs.compute_has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # ENC-FTR-120: v3-prod carries a required-reviewer rule (io); v4-gamma has
    # none. A main-branch run therefore pauses here as a rejectable request.
    environment: ${{ startsWith(github.ref, 'refs/heads/v4/') && 'v4-gamma' || 'v3-prod' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (environment-scoped OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CLOUDFORMATION_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Execute Data stack change-set
        id: deploy_data
        if: needs.plan.outputs.data_has_changes == 'true'
        run: |
          set -euo pipefail
          aws cloudformation execute-change-set \
            --region "${AWS_REGION}" \
            --change-set-name "${{ needs.plan.outputs.data_changeset_arn }}"
          aws cloudformation wait stack-update-complete \
            --region "${AWS_REGION}" \
            --stack-name "${{ needs.plan.outputs.data_stack_name }}"

      - name: Execute Compute stack change-set
        id: deploy
        if: needs.plan.outputs.compute_has_changes == 'true'
        run: |
          set -euo pipefail
          aws cloudformation execute-change-set \
            --region "${AWS_REGION}" \
            --change-set-name "${{ needs.plan.outputs.compute_changeset_arn }}"
          aws cloudformation wait stack-update-complete \
            --region "${AWS_REGION}" \
            --stack-name "${{ needs.plan.outputs.stack_name }}"

      - name: Report stack events on failure
        if: failure()
        run: |
          for s in "${{ needs.plan.outputs.data_stack_name }}" "${{ needs.plan.outputs.stack_name }}"; do
            echo "=== Stack events (last 20) — ${s} ==="
            aws cloudformation describe-stack-events \
              --region "${AWS_REGION}" \
              --stack-name "${s}" \
              --query 'StackEvents[:20].{Time:Timestamp,Resource:LogicalResourceId,Status:ResourceStatus,Reason:ResourceStatusReason}' \
              --output table || echo "(describe-stack-events unavailable)"
          done

      - name: Verify deployed stack state
        run: |
          set -euo pipefail
          stack_state=$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name "${{ needs.plan.outputs.stack_name }}" \
            --query 'Stacks[0].StackStatus' \
            --output text)
          echo "Stack status: ${stack_state}"
          if [ "${stack_state}" != "UPDATE_COMPLETE" ] && [ "${stack_state}" != "CREATE_COMPLETE" ]; then
            echo "::error::Stack ${{ needs.plan.outputs.stack_name }} is in unexpected state: ${stack_state}"
            exit 1
          fi
          aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name "${{ needs.plan.outputs.stack_name }}" \
            --query 'Stacks[0].{StackName:StackName,StackStatus:StackStatus,LastUpdatedTime:LastUpdatedTime}' \
            --output table

      - name: Validate Lambda CodeSize (detect CFN stub stomp)
        # Informational only — full-stack orchestration below handles restoration
        continue-on-error: true
        run: |
          set -euo pipefail
          # Read function names from the manifest (source of truth for CFN-managed Lambdas)
          suffix="${ENVIRONMENT_SUFFIX}"
          failed=0
          while IFS= read -r fn_name; do
            effective_name="${fn_name}${suffix}"
            code_size=$(aws lambda get-function-configuration \
              --function-name "${effective_name}" \
              --region "${AWS_REGION}" \
              --query 'CodeSize' \
              --output text 2>/dev/null || echo "0")
            if [ "${code_size}" -lt 1024 ]; then
              echo "::warning::Lambda ${effective_name} has CodeSize=${code_size} (< 1024) — likely CFN ZipFile stub. Full-stack orchestration will restore."
              failed=1
            else
              echo "✓ ${effective_name}: CodeSize=${code_size}"
            fi
          done < <(jq -r '.functions[].function_name' infrastructure/lambda_workflow_manifest.json)
          if [ "${failed}" -eq 1 ]; then
            echo "::warning::One or more Lambda functions have stub-sized code packages. Lambda code is managed out-of-band (matrix-build / _deploy.yml); this CFN workflow deploys config/IAM only and does not deploy or restore code."
          fi
          echo "CodeSize validation complete (informational only; Lambda code is deployed out-of-band via matrix-build / _deploy.yml, not by this CFN workflow)."
