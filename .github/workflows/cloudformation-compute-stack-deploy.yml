name: CloudFormation Compute Stack Deploy

on:
  push:
    branches:
      - main
      - 'v4/**'
    paths:
      - "infrastructure/cloudformation/02-compute.yaml"
      - ".github/workflows/cloudformation-compute-stack-deploy.yml"
  workflow_dispatch:
    inputs:
      stack_name:
        description: "CloudFormation stack name for 02-compute template"
        type: string
        required: false
        default: "enceladus-compute"
      data_stack_name:
        description: "Referenced data stack name (for cross-stack imports)"
        type: string
        required: false
        default: "enceladus-data"
      reason:
        description: "Why this deploy is being triggered"
        type: string
        required: false
        default: "manual compute stack deploy"

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-west-2
  TEMPLATE_FILE: infrastructure/cloudformation/02-compute.yaml
  ENVIRONMENT_SUFFIX: ${{ startsWith(github.ref, 'refs/heads/v4/') && '-gamma' || '' }}
  DEFAULT_STACK_NAME: enceladus-compute
  DEFAULT_DATA_STACK_NAME: enceladus-data

jobs:
  deploy:
    name: Deploy Compute CloudFormation stack
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: cloudformation-compute-stack-deploy-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify CF role secret is set
        run: |
          if [ -z "${{ secrets.AWS_CLOUDFORMATION_ROLE_TO_ASSUME }}" ]; then
            echo "::error::AWS_CLOUDFORMATION_ROLE_TO_ASSUME secret is not set or empty. Set it to the ARN of a role with cloudformation:* and lambda:*/iam:* permissions."
            exit 1
          fi
          echo "AWS_CLOUDFORMATION_ROLE_TO_ASSUME is set."

      - name: Configure AWS credentials (OIDC privileged CloudFormation role)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_CLOUDFORMATION_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Resolve deployment parameters
        id: params
        env:
          INPUT_STACK_NAME: ${{ github.event.inputs.stack_name }}
          INPUT_DATA_STACK_NAME: ${{ github.event.inputs.data_stack_name }}
        run: |
          set -euo pipefail

          stack_name="${INPUT_STACK_NAME:-${DEFAULT_STACK_NAME}}${ENVIRONMENT_SUFFIX}"
          data_stack_name="${INPUT_DATA_STACK_NAME:-${DEFAULT_DATA_STACK_NAME}}${ENVIRONMENT_SUFFIX}"

          {
            echo "stack_name=${stack_name}"
            echo "data_stack_name=${data_stack_name}"
          } >> "${GITHUB_OUTPUT}"

      - name: Deploy Compute stack (02-compute)
        id: deploy
        run: |
          set -euo pipefail

          aws cloudformation deploy \
            --region "${AWS_REGION}" \
            --stack-name "${{ steps.params.outputs.stack_name }}" \
            --template-file "${TEMPLATE_FILE}" \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              DataStackName="${{ steps.params.outputs.data_stack_name }}"

      - name: Report stack events on failure
        if: failure() && steps.deploy.conclusion == 'failure'
        run: |
          echo "=== Stack events (last 20) ==="
          aws cloudformation describe-stack-events \
            --region "${AWS_REGION}" \
            --stack-name "${{ steps.params.outputs.stack_name }}" \
            --query 'StackEvents[:20].{Time:Timestamp,Resource:LogicalResourceId,Status:ResourceStatus,Reason:ResourceStatusReason}' \
            --output table || echo "(describe-stack-events unavailable)"

      - name: Verify deployed stack state
        run: |
          set -euo pipefail
          status=$(aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name "${{ steps.params.outputs.stack_name }}" \
            --query 'Stacks[0].StackStatus' \
            --output text)
          echo "Stack status: ${status}"
          if [ "${status}" != "UPDATE_COMPLETE" ] && [ "${status}" != "CREATE_COMPLETE" ]; then
            echo "::error::Stack ${{ steps.params.outputs.stack_name }} is in unexpected state: ${status}"
            exit 1
          fi
          aws cloudformation describe-stacks \
            --region "${AWS_REGION}" \
            --stack-name "${{ steps.params.outputs.stack_name }}" \
            --query 'Stacks[0].{StackName:StackName,StackStatus:StackStatus,LastUpdatedTime:LastUpdatedTime}' \
            --output table

      - name: Validate Lambda CodeSize (detect CFN stub stomp)
        run: |
          set -euo pipefail
          # Read function names from the manifest (source of truth for CFN-managed Lambdas)
          suffix="${ENVIRONMENT_SUFFIX}"
          failed=0
          while IFS= read -r fn_name; do
            effective_name="${fn_name}${suffix}"
            code_size=$(aws lambda get-function-configuration \
              --function-name "${effective_name}" \
              --region "${AWS_REGION}" \
              --query 'CodeSize' \
              --output text 2>/dev/null || echo "0")
            if [ "${code_size}" -lt 1024 ]; then
              echo "::error::Lambda ${effective_name} has CodeSize=${code_size} (< 1024) — likely CFN ZipFile stub. Deploy workflows must re-deploy this function."
              failed=1
            else
              echo "✓ ${effective_name}: CodeSize=${code_size}"
            fi
          done < <(jq -r '.functions[].function_name' infrastructure/lambda_workflow_manifest.json)
          if [ "${failed}" -eq 1 ]; then
            echo "::error::One or more Lambda functions have stub-sized code packages after CFN stack update. This indicates a CFN ZipFile stomp — trigger per-Lambda deploy workflows to restore."
            exit 1
          fi
          echo "All Lambda functions have valid CodeSize (>= 1024)."
