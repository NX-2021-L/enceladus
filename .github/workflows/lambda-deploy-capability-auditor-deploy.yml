name: Lambda Deploy - enceladus-deploy-capability-auditor

# ENC-TSK-E69 / ENC-PLN-031 Phase 4.

on:
  push:
    branches:
      - main
      - 'v4/**'
    paths:
      - "backend/lambda/deploy_capability_auditor/**"
      - ".github/workflows/lambda-deploy-capability-auditor-deploy.yml"
      - ".github/workflows/deploy-orchestration.yml"
      - ".github/workflows/lambda-deploy-reusable.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this deploy is being triggered"
        type: string
        required: false
        default: "manual deploy"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-orchestration.yml
    with:
      function_name: "enceladus-deploy-capability-auditor"
      lambda_dir: "backend/lambda/deploy_capability_auditor"
      deploy_script: "backend/lambda/deploy_capability_auditor/deploy.sh"
      deploy_mode: "per-lambda"
    secrets: inherit
