name: CFN Drift Audit

# ENC-TSK-E67 / ENC-PLN-031 Phase 2.
#
# Daily audit comparing live AWS resources (API Gateway v2 routes,
# EventBridge rules) against CloudFormation-declared resources. Any
# drift is posted to an idempotent tracking GitHub issue so the
# capability auditor (Phase 4) and humans can reconcile.

on:
  schedule:
    # Daily at 09:00 UTC — after overnight maintenance windows
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      api_id:
        description: Optional explicit API Gateway v2 API ID
        type: string
        required: false
        default: ""

permissions:
  contents: read
  id-token: write
  issues: write

jobs:
  audit:
    name: Audit CFN drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BACKEND_ROLE_TO_ASSUME }}
          aws-region: us-west-2

      - name: Run audit
        id: audit
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.api_id }}" ]]; then
            python3 tools/audit_cfn_drift.py \
              --api-id "${{ inputs.api_id }}" \
              --output-json /tmp/cfn-drift-report.json \
              || true
          else
            python3 tools/audit_cfn_drift.py \
              --output-json /tmp/cfn-drift-report.json \
              || true
          fi
          echo "=== Drift Report ==="
          cat /tmp/cfn-drift-report.json

          any_drift=$(python3 -c "
          import json,sys
          r=json.load(open('/tmp/cfn-drift-report.json'))
          drift = any(
            r[s]['live_only'] or r[s]['cfn_only']
            for s in ('apigw_routes','eventbridge_rules')
          )
          print('true' if drift else 'false')
          ")
          echo "any_drift=${any_drift}" >> "$GITHUB_OUTPUT"

      - name: Upload drift report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfn-drift-report
          path: /tmp/cfn-drift-report.json
          retention-days: 30

      - name: Build issue body
        if: steps.audit.outputs.any_drift == 'true'
        run: |
          set -euo pipefail
          python3 - <<'PY' > /tmp/cfn-drift-issue-body.md
          import json
          r = json.load(open('/tmp/cfn-drift-report.json'))
          lines = ["# CFN drift detected", "", f"api_id: `{r['_api_id']}`", ""]
          for section, label in [
              ("apigw_routes", "API Gateway v2 routes"),
              ("eventbridge_rules", "EventBridge rules"),
          ]:
              s = r[section]
              lines.append(f"## {label}")
              lines.append(f"live={s['live_count']} declared={s['declared_count']}")
              if s["live_only"]:
                  lines.append("")
                  lines.append("### Live-only (not in CFN — add to template or mark as CLI-only exception)")
                  for k in s["live_only"]:
                      lines.append(f"- `{k}`")
              if s["cfn_only"]:
                  lines.append("")
                  lines.append("### CFN-only (declared but missing from live — CFN not yet deployed)")
                  for k in s["cfn_only"]:
                      lines.append(f"- `{k}`")
              lines.append("")
          lines.append("_Auto-generated by cfn-drift-audit.yml (ENC-TSK-E67). Updates idempotently each run._")
          open('/tmp/cfn-drift-issue-body.md','w').write("\n".join(lines))
          PY
          cat /tmp/cfn-drift-issue-body.md

      - name: Upsert tracking issue
        if: steps.audit.outputs.any_drift == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TITLE="[CFN-drift] Active CloudFormation/live drift"
          EXISTING=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "$TITLE in:title" \
            --json number \
            --jq '.[0].number // empty')
          if [[ -n "$EXISTING" ]]; then
            gh issue edit "$EXISTING" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file /tmp/cfn-drift-issue-body.md
            gh issue comment "$EXISTING" \
              --repo "$GITHUB_REPOSITORY" \
              --body "Updated $(date -u +%Y-%m-%dT%H:%M:%SZ) from run ${{ github.run_id }}."
          else
            gh issue create \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TITLE" \
              --body-file /tmp/cfn-drift-issue-body.md \
              --label "cfn-drift,automated"
          fi

      - name: Close tracking issue if drift cleared
        if: steps.audit.outputs.any_drift == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TITLE="[CFN-drift] Active CloudFormation/live drift"
          EXISTING=$(gh issue list \
            --repo "$GITHUB_REPOSITORY" \
            --state open \
            --search "$TITLE in:title" \
            --json number \
            --jq '.[0].number // empty')
          if [[ -n "$EXISTING" ]]; then
            gh issue comment "$EXISTING" \
              --repo "$GITHUB_REPOSITORY" \
              --body "Drift cleared as of $(date -u +%Y-%m-%dT%H:%M:%SZ) (run ${{ github.run_id }}). Closing."
            gh issue close "$EXISTING" --repo "$GITHUB_REPOSITORY"
          fi
