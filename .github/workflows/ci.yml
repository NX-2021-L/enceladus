name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'v4/**'

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Python files
        run: |
          set -euo pipefail
          python3 -m py_compile \
            backend/lambda/coordination_api/lambda_function.py \
            tools/enceladus-mcp-server/server.py
          echo "[SUCCESS] Python syntax check passed"

      - name: Validate governance dictionary JSON
        run: |
          set -euo pipefail
          python3 -c "
          import json, sys
          with open('backend/lambda/coordination_api/governance_data_dictionary.json') as f:
              d = json.load(f)
          assert 'version' in d, 'Missing version field'
          assert 'entities' in d, 'Missing entities field'
          print('[SUCCESS] governance_data_dictionary.json is valid JSON with required fields')
          print(f'  version: {d[\"version\"]}')
          print(f'  entities: {list(d[\"entities\"].keys())}')
          "

      - name: Verify Lambda architecture parity
        run: |
          set -euo pipefail
          python3 tools/verify_lambda_arch_parity.py

      - name: Test Lambda package architecture parity guard (ENC-TSK-E19)
        run: |
          set -euo pipefail
          python3 -m unittest tools.test_verify_lambda_package_arch -v

      # ENC-TSK-H22 (ENC-PLN-048 Obj 4.1): prove the env-parity gate catches a
      # template strip. Needs PyYAML (the gate's resolver parses CFN); no current
      # CI step imports yaml, so provision Python+PyYAML scoped to this step only.
      - name: Set up Python for env-parity strip proof
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Env-parity gate synthetic-strip proof (ENC-TSK-H22)
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyyaml
          python3 tools/test_synthetic_strip_proof.py

      # ENC-TSK-J65 / ENC-FTR-120: no agent-reachable git operation may mutate
      # v3-prod without the environment reviewer gate. Fail-closed: unclassified
      # workflows and ungated prod-mutating jobs fail CI here.
      - name: Prod-gate coverage guard (ENC-TSK-J65)
        run: |
          set -euo pipefail
          python3 tools/prod_gate_coverage_guard.py
          python3 -m unittest tools.test_prod_gate_coverage_guard

  frontend-ui-tests:
    name: Frontend UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend/ui

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ENC-TSK-H81 (ENC-FTR-051 AC3): documentMarkdown/DownloadMarkdownButton
      # tests run here; this job is the "comp-enceladus-pwa CI suite" the AC refers to.
      - name: Run tests
        run: npm test
