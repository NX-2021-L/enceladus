name: Deploy Orchestration (Gamma-First)

# ENC-TSK-D18 / ENC-PLN-020 Phase 2, wired by ENC-TSK-E28
# Enforces gamma-first deploy sequencing:
#   build artifacts -> gamma deploy -> UAT gate -> manual approval -> prod deploy -> prod validation
#
# Two modes:
#   per-lambda:  Single function through the full sequence
#   full-stack:  All manifest functions via matrix strategy
#
# S3 artifact keys (ENC-TSK-E20 split pipeline):
#   lambda-artifacts/{git_sha}/arm64-py312/{fn}.zip  (gamma)
#   lambda-artifacts/{git_sha}/x86_64-py311/{fn}.zip (prod)

on:
  workflow_call:
    inputs:
      function_name:
        description: Lambda function name (required for per-lambda mode)
        required: false
        type: string
        default: ""
      lambda_dir:
        description: Relative path to lambda source directory (required for per-lambda mode)
        required: false
        type: string
        default: ""
      deploy_mode:
        description: "per-lambda or full-stack"
        required: false
        type: string
        default: "per-lambda"
      deploy_script:
        description: Optional deploy script path
        required: false
        type: string
        default: ""
      package_extra_files:
        description: Optional comma-separated extra files for generic packaging
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      function_name:
        description: Lambda function name (required for per-lambda mode)
        type: string
        required: false
        default: ""
      lambda_dir:
        description: Relative path to lambda source directory (required for per-lambda mode)
        type: string
        required: false
        default: ""
      deploy_mode:
        description: "per-lambda or full-stack"
        type: choice
        options:
          - per-lambda
          - full-stack
        default: "per-lambda"
      deploy_script:
        description: Optional deploy script path
        type: string
        required: false
        default: ""
      package_extra_files:
        description: Optional comma-separated extra files for generic packaging
        type: string
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

# ---------------------------------------------------------------------------
# BUILD ARTIFACTS (both architectures, all functions)
# ---------------------------------------------------------------------------

jobs:

  # ENC-TSK-E28: Build all Lambda artifacts before any deploy job runs.
  # Outputs artifact_prefix used to construct per-function S3 keys.
  build-artifacts:
    uses: ./.github/workflows/build-lambda-artifacts.yml
    secrets: inherit

  # ---------------------------------------------------------------------------
  # PER-LAMBDA MODE
  # ---------------------------------------------------------------------------

  # ---- Gamma deploy (per-lambda) ----
  gamma-deploy:
    needs: build-artifacts
    if: inputs.deploy_mode == 'per-lambda'
    uses: ./.github/workflows/lambda-deploy-reusable.yml
    with:
      function_name: ${{ inputs.function_name }}
      lambda_dir: ${{ inputs.lambda_dir }}
      deploy_script: ${{ inputs.deploy_script }}
      package_extra_files: ${{ inputs.package_extra_files }}
      environment_suffix: "-gamma"
      artifact_s3_bucket: jreese-net
      artifact_s3_key: ${{ needs.build-artifacts.outputs.artifact_prefix }}/arm64-py312/${{ inputs.function_name }}.zip
    secrets: inherit

  # ---- Gamma health gate (per-lambda) ----
  gamma-health-gate:
    needs: gamma-deploy
    if: inputs.deploy_mode == 'per-lambda'
    name: Gamma Health Gate (${{ inputs.function_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BACKEND_ROLE_TO_ASSUME }}
          aws-region: us-west-2

      - name: Install dependencies
        run: pip install --quiet boto3

      - name: Run gamma UAT suite
        run: |
          set -euo pipefail
          python3 tools/gamma_uat_suite.py \
            --environment gamma \
            --function-name "${{ inputs.function_name }}" \
            --output-json /tmp/gamma-uat-report.json
          echo "=== Gamma UAT Report ==="
          cat /tmp/gamma-uat-report.json | python3 -m json.tool

      - name: Upload UAT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gamma-uat-report-${{ inputs.function_name }}
          path: /tmp/gamma-uat-report.json
          retention-days: 30

  # ---- Enceladus approval gate (per-lambda, main only) ----
  # ENC-TSK-E57: Replaces GitHub environment approval with Enceladus DAT
  # token verification. Calls /api/v1/deploy/validate/approval/{prNumber}
  # to confirm the PR was approved via the Deployment Manager PWA.
  enceladus-approval-gate:
    needs: gamma-health-gate
    if: inputs.deploy_mode == 'per-lambda' && github.ref == 'refs/heads/main'
    name: Enceladus Approval Gate (${{ inputs.function_name }})
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Resolve PR from merge commit
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --search "$GITHUB_SHA" --state merged \
            --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::No merged PR found for commit $GITHUB_SHA. Cannot verify Enceladus approval."
            exit 1
          fi
          echo "Resolved PR #${PR_NUMBER} for commit ${GITHUB_SHA}"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Verify Enceladus approval token
        env:
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
          DEPLOY_API_BASE: https://8nkzqkmxqc.execute-api.us-west-2.amazonaws.com/api/v1/deploy
          COORDINATION_INTERNAL_API_KEY: ${{ secrets.COORDINATION_INTERNAL_API_KEY }}
        run: |
          set -euo pipefail
          VALIDATE_URL="${DEPLOY_API_BASE}/validate/approval/${PR_NUMBER}"
          echo "Validating: $VALIDATE_URL"

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "X-Coordination-Internal-Key: ${COORDINATION_INTERNAL_API_KEY}" \
            -H "Accept: application/json" \
            "$VALIDATE_URL" || echo -e "\n000")
          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)

          echo "Response (HTTP $HTTP_CODE): $HTTP_BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            VALID=$(echo "$HTTP_BODY" | python3 -c "import sys,json; print(str(json.load(sys.stdin).get('valid',False)))" 2>/dev/null || echo "False")
            if [ "$VALID" != "True" ]; then
              REASON=$(echo "$HTTP_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('reason','unknown'))" 2>/dev/null || echo "unknown")
              echo "::error::Production deploy blocked: $REASON"
              echo "::error::Approve this PR via the Enceladus Deployment Manager before deploying to production."
              exit 1
            fi
            DECIDED_BY=$(echo "$HTTP_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('decided_by_email','unknown'))" 2>/dev/null || echo "unknown")
            TOKEN=$(echo "$HTTP_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('approval_token',''))" 2>/dev/null || echo "")
            echo "✅ Enceladus approval verified for PR #${PR_NUMBER}"
            echo "   Approved by: ${DECIDED_BY}"
            echo "   Token: ${TOKEN}"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "::warning::Validation endpoint not yet deployed (HTTP 404). Falling through to GitHub environment approval (bootstrap transition)."
          else
            echo "::error::Enceladus approval API unreachable (HTTP $HTTP_CODE). Failing closed."
            exit 1
          fi

  # ---- Prod deploy (per-lambda, main only) ----
  prod-deploy:
    needs: [enceladus-approval-gate, build-artifacts]
    if: inputs.deploy_mode == 'per-lambda' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/lambda-deploy-reusable.yml
    with:
      function_name: ${{ inputs.function_name }}
      lambda_dir: ${{ inputs.lambda_dir }}
      deploy_script: ${{ inputs.deploy_script }}
      package_extra_files: ${{ inputs.package_extra_files }}
      environment_suffix: ""
      artifact_s3_bucket: jreese-net
      artifact_s3_key: ${{ needs.build-artifacts.outputs.artifact_prefix }}/x86_64-py311/${{ inputs.function_name }}.zip
    secrets: inherit

  # ---- Prod validation (per-lambda, main only) ----
  prod-validation:
    needs: prod-deploy
    if: inputs.deploy_mode == 'per-lambda' && github.ref == 'refs/heads/main'
    name: Production Validation (${{ inputs.function_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BACKEND_ROLE_TO_ASSUME }}
          aws-region: us-west-2

      - name: Install dependencies
        run: pip install --quiet boto3

      - name: Run production validation
        run: |
          set -euo pipefail
          python3 tools/gamma_uat_suite.py \
            --environment production \
            --function-name "${{ inputs.function_name }}" \
            --output-json /tmp/prod-validation-report.json
          echo "=== Production Validation Report ==="
          cat /tmp/prod-validation-report.json | python3 -m json.tool

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-validation-report-${{ inputs.function_name }}
          path: /tmp/prod-validation-report.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # FULL-STACK MODE
  # ---------------------------------------------------------------------------

  # ---- Setup matrix from manifest ----
  setup-matrix:
    if: inputs.deploy_mode == 'full-stack'
    name: Setup Lambda Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read manifest and build matrix
        id: set-matrix
        run: |
          set -euo pipefail
          matrix=$(jq -c '{
            include: [
              .functions[] | {
                function_name,
                lambda_dir,
                deploy_script: (.deploy_script // ""),
                package_extra_files: ((.package_extra_files // []) | join(","))
              }
            ]
          }' infrastructure/lambda_workflow_manifest.json)
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"
          echo "Matrix entries: $(echo "${matrix}" | jq '.include | length')"

  # ---- Gamma deploy (full-stack matrix) ----
  gamma-deploy-matrix:
    needs: [build-artifacts, setup-matrix]
    if: inputs.deploy_mode == 'full-stack'
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
      fail-fast: false
      max-parallel: 5
    uses: ./.github/workflows/lambda-deploy-reusable.yml
    with:
      function_name: ${{ matrix.function_name }}
      lambda_dir: ${{ matrix.lambda_dir }}
      deploy_script: ${{ matrix.deploy_script }}
      package_extra_files: ${{ matrix.package_extra_files }}
      environment_suffix: "-gamma"
      artifact_s3_bucket: jreese-net
      artifact_s3_key: ${{ needs.build-artifacts.outputs.artifact_prefix }}/arm64-py312/${{ matrix.function_name }}.zip
    secrets: inherit

  # ---- Gamma health gate (full-stack) ----
  gamma-health-gate-fullstack:
    needs: gamma-deploy-matrix
    if: inputs.deploy_mode == 'full-stack'
    name: Gamma Health Gate (full-stack)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BACKEND_ROLE_TO_ASSUME }}
          aws-region: us-west-2

      - name: Install dependencies
        run: pip install --quiet boto3

      - name: Run full-stack gamma UAT suite
        run: |
          set -euo pipefail
          python3 tools/gamma_uat_suite.py \
            --environment gamma \
            --full-stack \
            --output-json /tmp/gamma-fullstack-uat-report.json
          echo "=== Full-Stack Gamma UAT Report ==="
          cat /tmp/gamma-fullstack-uat-report.json | python3 -m json.tool

      - name: Upload UAT report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gamma-fullstack-uat-report
          path: /tmp/gamma-fullstack-uat-report.json
          retention-days: 30

  # ---- Enceladus approval gate (full-stack, main only) ----
  # ENC-TSK-E57: Same DAT verification as per-lambda gate.
  enceladus-approval-gate-fullstack:
    needs: gamma-health-gate-fullstack
    if: inputs.deploy_mode == 'full-stack' && github.ref == 'refs/heads/main'
    name: Enceladus Approval Gate (full-stack)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Resolve PR from merge commit
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          PR_NUMBER=$(gh pr list --repo "$GITHUB_REPOSITORY" \
            --search "$GITHUB_SHA" --state merged \
            --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -z "$PR_NUMBER" ]; then
            echo "::error::No merged PR found for commit $GITHUB_SHA. Cannot verify Enceladus approval."
            exit 1
          fi
          echo "Resolved PR #${PR_NUMBER} for commit ${GITHUB_SHA}"
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Verify Enceladus approval token
        env:
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
          DEPLOY_API_BASE: https://8nkzqkmxqc.execute-api.us-west-2.amazonaws.com/api/v1/deploy
          COORDINATION_INTERNAL_API_KEY: ${{ secrets.COORDINATION_INTERNAL_API_KEY }}
        run: |
          set -euo pipefail
          VALIDATE_URL="${DEPLOY_API_BASE}/validate/approval/${PR_NUMBER}"
          echo "Validating: $VALIDATE_URL"

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "X-Coordination-Internal-Key: ${COORDINATION_INTERNAL_API_KEY}" \
            -H "Accept: application/json" \
            "$VALIDATE_URL" || echo -e "\n000")
          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)

          if [ "$HTTP_CODE" = "200" ]; then
            VALID=$(echo "$HTTP_BODY" | python3 -c "import sys,json; print(str(json.load(sys.stdin).get('valid',False)))" 2>/dev/null || echo "False")
            if [ "$VALID" != "True" ]; then
              REASON=$(echo "$HTTP_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('reason','unknown'))" 2>/dev/null || echo "unknown")
              echo "::error::Full-stack production deploy blocked: $REASON"
              echo "::error::Approve this PR via the Enceladus Deployment Manager before deploying to production."
              exit 1
            fi
            DECIDED_BY=$(echo "$HTTP_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('decided_by_email','unknown'))" 2>/dev/null || echo "unknown")
            echo "✅ Full-stack Enceladus approval verified for PR #${PR_NUMBER} (approved by ${DECIDED_BY})"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "::warning::Validation endpoint not yet deployed (HTTP 404). Falling through to GitHub environment approval (bootstrap transition)."
          else
            echo "::error::Enceladus approval API unreachable (HTTP $HTTP_CODE). Failing closed."
            exit 1
          fi

  # ---- Prod deploy (full-stack matrix, main only) ----
  prod-deploy-matrix:
    needs: [enceladus-approval-gate-fullstack, setup-matrix, build-artifacts]
    if: inputs.deploy_mode == 'full-stack' && github.ref == 'refs/heads/main'
    strategy:
      matrix: ${{ fromJson(needs.setup-matrix.outputs.matrix) }}
      fail-fast: false
      max-parallel: 5
    uses: ./.github/workflows/lambda-deploy-reusable.yml
    with:
      function_name: ${{ matrix.function_name }}
      lambda_dir: ${{ matrix.lambda_dir }}
      deploy_script: ${{ matrix.deploy_script }}
      package_extra_files: ${{ matrix.package_extra_files }}
      environment_suffix: ""
      artifact_s3_bucket: jreese-net
      artifact_s3_key: ${{ needs.build-artifacts.outputs.artifact_prefix }}/x86_64-py311/${{ matrix.function_name }}.zip
    secrets: inherit

  # ---- Prod validation (full-stack, main only) ----
  prod-validation-fullstack:
    needs: prod-deploy-matrix
    if: inputs.deploy_mode == 'full-stack' && github.ref == 'refs/heads/main'
    name: Production Validation (full-stack)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BACKEND_ROLE_TO_ASSUME }}
          aws-region: us-west-2

      - name: Install dependencies
        run: pip install --quiet boto3

      - name: Run full-stack production validation
        run: |
          set -euo pipefail
          python3 tools/gamma_uat_suite.py \
            --environment production \
            --full-stack \
            --output-json /tmp/prod-fullstack-validation-report.json
          echo "=== Full-Stack Production Validation Report ==="
          cat /tmp/prod-fullstack-validation-report.json | python3 -m json.tool

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-fullstack-validation-report
          path: /tmp/prod-fullstack-validation-report.json
          retention-days: 30
