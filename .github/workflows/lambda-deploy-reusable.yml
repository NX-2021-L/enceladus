name: Lambda Deploy (Reusable)

on:
  workflow_call:
    inputs:
      function_name:
        description: Lambda function name in AWS
        required: true
        type: string
      lambda_dir:
        description: Relative path to lambda source directory
        required: true
        type: string
      deploy_script:
        description: Optional deploy script path; if omitted, generic code-only update is used
        required: false
        type: string
        default: ""
      package_extra_files:
        description: Optional comma-separated extra files to include for generic packaging
        required: false
        type: string
        default: ""
      environment_suffix:
        description: Function name suffix for environment (e.g. "-gamma")
        required: false
        type: string
        default: ""
      artifact_s3_bucket:
        description: S3 bucket containing pre-built Lambda zip (set by build-lambda-artifacts)
        required: false
        type: string
        default: ""
      artifact_s3_key:
        description: S3 key for the pre-built Lambda zip (set by build-lambda-artifacts)
        required: false
        type: string
        default: ""
      force_static_credentials:
        description: Force static-key credential setup instead of OIDC role assume.
        required: false
        type: boolean
        default: false
    secrets:
      AWS_BACKEND_ROLE_TO_ASSUME:
        required: true
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
      COORDINATION_INTERNAL_API_KEY:
        required: false
      COORDINATION_INTERNAL_API_KEY_PREVIOUS:
        required: false
      COORDINATION_INTERNAL_API_KEY_SCOPES:
        required: false
      ENCELADUS_OAUTH_CLIENT_ID:
        required: false
      ENCELADUS_OAUTH_CLIENT_SECRET:
        required: false
      GH_APP_ID:
        required: false
      GH_INSTALLATION_ID:
        required: false
      ENCELADUS_COGNITO_USER_POOL_ID:
        required: false
      ENCELADUS_COGNITO_CLIENT_ID:
        required: false
      ENCELADUS_COGNITO_CLIENT_SECRET:
        required: false
      ENCELADUS_COGNITO_DOMAIN:
        required: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy ${{ inputs.function_name }}${{ inputs.environment_suffix }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: lambda-deploy-${{ inputs.function_name }}${{ inputs.environment_suffix }}-${{ github.ref_name }}
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC backend deploy role)
        id: aws_oidc
        if: ${{ !inputs.force_static_credentials }}
        continue-on-error: true
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_BACKEND_ROLE_TO_ASSUME }}
          aws-region: us-west-2

      - name: Configure AWS credentials (static keys fallback)
        if: ${{ inputs.force_static_credentials || steps.aws_oidc.outcome != 'success' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      # ENC-TSK-E28: Arch-tag validation gate — reject cross-arch S3 artifacts
      - name: Validate artifact architecture tag
        if: ${{ inputs.artifact_s3_key != '' }}
        run: |
          set -euo pipefail
          key="${{ inputs.artifact_s3_key }}"
          suffix="${{ inputs.environment_suffix }}"

          if [[ -n "${suffix}" ]]; then
            # Gamma deploy: artifact key must contain arm64-py312
            if [[ "${key}" != *"arm64-py312"* ]]; then
              echo "::error::Arch-tag mismatch: gamma deploy (suffix='${suffix}') requires arm64-py312 in artifact key, got: ${key}"
              exit 1
            fi
          else
            # Prod deploy: artifact key must contain x86_64-py311
            if [[ "${key}" != *"x86_64-py311"* ]]; then
              echo "::error::Arch-tag mismatch: prod deploy (no suffix) requires x86_64-py311 in artifact key, got: ${key}"
              exit 1
            fi
          fi
          echo "Artifact arch-tag validated: ${key}"

      - name: Deploy via explicit script
        if: ${{ inputs.deploy_script != '' }}
        env:
          COORDINATION_INTERNAL_API_KEY: ${{ secrets.COORDINATION_INTERNAL_API_KEY }}
          COORDINATION_INTERNAL_API_KEY_PREVIOUS: ${{ secrets.COORDINATION_INTERNAL_API_KEY_PREVIOUS }}
          COORDINATION_INTERNAL_API_KEY_SCOPES: ${{ secrets.COORDINATION_INTERNAL_API_KEY_SCOPES }}
          ENCELADUS_OAUTH_CLIENT_ID: ${{ secrets.ENCELADUS_OAUTH_CLIENT_ID }}
          ENCELADUS_OAUTH_CLIENT_SECRET: ${{ secrets.ENCELADUS_OAUTH_CLIENT_SECRET }}
          GITHUB_APP_ID: ${{ secrets.GH_APP_ID }}
          GITHUB_INSTALLATION_ID: ${{ secrets.GH_INSTALLATION_ID }}
          ENCELADUS_COGNITO_USER_POOL_ID: ${{ secrets.ENCELADUS_COGNITO_USER_POOL_ID }}
          ENCELADUS_COGNITO_CLIENT_ID: ${{ secrets.ENCELADUS_COGNITO_CLIENT_ID }}
          ENCELADUS_COGNITO_CLIENT_SECRET: ${{ secrets.ENCELADUS_COGNITO_CLIENT_SECRET }}
          ENCELADUS_COGNITO_DOMAIN: ${{ secrets.ENCELADUS_COGNITO_DOMAIN }}
          ENVIRONMENT_SUFFIX: ${{ inputs.environment_suffix }}
          LAMBDA_ARTIFACT_S3_BUCKET: ${{ inputs.artifact_s3_bucket }}
          LAMBDA_ARTIFACT_S3_KEY: ${{ inputs.artifact_s3_key }}
        run: |
          set -euo pipefail
          chmod +x "${{ inputs.deploy_script }}"
          "${{ inputs.deploy_script }}"

      - name: Deploy via generic code-only package update
        if: ${{ inputs.deploy_script == '' }}
        env:
          LAMBDA_ARTIFACT_S3_BUCKET: ${{ inputs.artifact_s3_bucket }}
          LAMBDA_ARTIFACT_S3_KEY: ${{ inputs.artifact_s3_key }}
        run: |
          set -euo pipefail

          source "${GITHUB_WORKSPACE}/tools/lambda_artifact_helper.sh"

          function_name="${{ inputs.function_name }}${{ inputs.environment_suffix }}"
          lambda_dir="${{ inputs.lambda_dir }}"
          extra_files="${{ inputs.package_extra_files }}"
          zip_file="/tmp/${function_name}.zip"

          # ENC-TSK-E27: try S3 artifact first
          if resolved_zip="$(resolve_artifact "${function_name}" "${zip_file}")"; then
            zip_file="${resolved_zip}"
          else
            if [[ ! -f "${lambda_dir}/lambda_function.py" ]]; then
              echo "Expected ${lambda_dir}/lambda_function.py for generic package deployment" >&2
              exit 1
            fi

            build_dir="$(mktemp -d /tmp/${function_name}-build-XXXXXX)"

            cp "${lambda_dir}/lambda_function.py" "${build_dir}/"

            # Env-conditional build: gamma=arm64/py3.12, prod=x86_64/py3.11
            if [ -n "${{ inputs.environment_suffix }}" ]; then
              pip_platform="manylinux2014_aarch64"; pip_pyver="3.12"; pip_abi="cp312"
            else
              pip_platform="manylinux2014_x86_64"; pip_pyver="3.11"; pip_abi="cp311"
            fi

            if [[ -f "${lambda_dir}/requirements.txt" ]]; then
              python3 -m pip install \
                --quiet \
                --upgrade \
                --platform "${pip_platform}" \
                --implementation cp \
                --python-version "${pip_pyver}" \
                --abi "${pip_abi}" \
                --only-binary=:all: \
                -r "${lambda_dir}/requirements.txt" \
                -t "${build_dir}" >/dev/null
            fi

            if [[ -n "${extra_files}" ]]; then
              IFS=',' read -ra files <<< "${extra_files}"
              for rel in "${files[@]}"; do
                rel="$(echo "${rel}" | xargs)"
                [[ -n "${rel}" ]] || continue
                src="${lambda_dir}/${rel}"
                dst="${build_dir}/${rel}"
                if [[ ! -f "${src}" ]]; then
                  echo "Missing extra package file: ${src}" >&2
                  exit 1
                fi
                mkdir -p "$(dirname "${dst}")"
                cp "${src}" "${dst}"
              done
            fi

            (
              cd "${build_dir}"
              zip -qr "${zip_file}" .
            )
            rm -rf "${build_dir}"
          fi

          aws lambda update-function-code \
            --region "us-west-2" \
            --function-name "${function_name}" \
            --zip-file "fileb://${zip_file}" >/dev/null

          aws lambda wait function-updated-v2 \
            --region "us-west-2" \
            --function-name "${function_name}"

          # Env-conditional runtime: gamma=python3.12, prod=python3.11
          if [ -n "${{ inputs.environment_suffix }}" ]; then
            runtime="python3.12"
          else
            runtime="python3.11"
          fi

          aws lambda update-function-configuration \
            --region "us-west-2" \
            --function-name "${function_name}" \
            --runtime "${runtime}" >/dev/null

          aws lambda wait function-updated-v2 \
            --region "us-west-2" \
            --function-name "${function_name}"

          rm -f "${zip_file}"

      - name: Validate deployed Lambda state
        run: |
          set -euo pipefail
          aws lambda get-function-configuration \
            --region "us-west-2" \
            --function-name "${{ inputs.function_name }}${{ inputs.environment_suffix }}" \
            --query '{FunctionName:FunctionName,LastModified:LastModified,Runtime:Runtime,State:State,LastUpdateStatus:LastUpdateStatus}' \
            --output table
