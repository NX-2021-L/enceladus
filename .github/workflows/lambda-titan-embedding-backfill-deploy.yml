name: Lambda Deploy - devops-titan-embedding-backfill

on:
  push:
    branches:
      - main
      - 'v4/**'
    paths:
      - "backend/lambda/titan_embedding_backfill/**"
      - "backend/lambda/shared_layer/python/enceladus_shared/embedding.py"
      - ".github/workflows/lambda-titan-embedding-backfill-deploy.yml"
      - ".github/workflows/deploy-orchestration.yml"
      - ".github/workflows/lambda-deploy-reusable.yml"
  workflow_dispatch:
    inputs:
      reason:
        description: "Why this deploy is being triggered"
        type: string
        required: false
        default: "manual deploy"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    uses: ./.github/workflows/deploy-orchestration.yml
    with:
      function_name: "devops-titan-embedding-backfill"
      lambda_dir: "backend/lambda/titan_embedding_backfill"
      deploy_script: "backend/lambda/titan_embedding_backfill/deploy.sh"
      deploy_mode: "per-lambda"
    secrets: inherit
