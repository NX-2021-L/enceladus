name: PR Commit Gate

# ENC-FTR-037: Every PR targeting main must include a commit-complete-id (CCI-xxx)
# issued by the checkout service. This ensures that:
#   1. A tracker task exists and was checked out for the change
#   2. The task was advanced to "committed" status with a validated commit SHA
#   3. The agent received the CCI token from the checkout service
#
# To obtain a CCI, advance the task to committed status via:
#   - MCP: advance_task_status(target_status="committed", transition_evidence={commit_sha: "..."})
#   - API: POST /api/v1/checkout/{project}/task/{task_id}/advance
#
# The CCI must appear anywhere in the PR body in the format: CCI-<32 lowercase hex chars>

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - 'v[0-9]*/main'

jobs:
  commit-gate:
    name: PR Commit Gate
    runs-on: ubuntu-latest

    steps:
      # ENC-TSK-G71: sync-main-to-v4main.yml opens transient PRs base=v4/main
      # head=auto/sync-main-to-v4main-* to forward-sync v4/main without bypass
      # actors. These PRs are not task-bound and have no CCI. Recognize the
      # pattern + base and short-circuit the gate as a pass.
      - name: Detect auto sync PR (CCI-exempt)
        id: classify
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          if [[ "$HEAD_REF" == auto/sync-main-to-v4main-* && "$BASE_REF" == "v4/main" ]]; then
            echo "Auto-sync PR detected (head=$HEAD_REF base=$BASE_REF) — CCI requirement waived."
            echo "auto_sync=true" >> "$GITHUB_OUTPUT"
          else
            echo "auto_sync=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract commit-complete-id from PR body
        id: extract_cci
        if: steps.classify.outputs.auto_sync != 'true'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Extract CCI token: pattern CCI-{32 lowercase hex chars}
          CCI_ID=$(echo "$PR_BODY" | grep -oE 'CCI-[0-9a-f]{32}' | head -1 || true)

          if [ -z "$CCI_ID" ]; then
            echo "::error::PR requires a commit-complete-id (CCI-xxx) from the checkout service."
            echo "::error::To obtain one: advance the tracker task to 'committed' status with a commit SHA."
            echo "::error::MCP: advance_task_status(target_status='committed', transition_evidence={commit_sha: '<sha>'})"
            echo "::error::The CCI token will be returned in the response. Include it anywhere in this PR body."
            exit 1
          fi

          echo "Found commit-complete-id: $CCI_ID"
          echo "cci_id=$CCI_ID" >> "$GITHUB_OUTPUT"

      - name: Validate commit-complete-id with checkout service
        if: steps.classify.outputs.auto_sync != 'true'
        env:
          CCI_ID: ${{ steps.extract_cci.outputs.cci_id }}
          CHECKOUT_SERVICE_BASE: https://8nkzqkmxqc.execute-api.us-west-2.amazonaws.com/api/v1/checkout
          COORDINATION_INTERNAL_API_KEY: ${{ secrets.COORDINATION_INTERNAL_API_KEY }}
        run: |
          VALIDATE_URL="${CHECKOUT_SERVICE_BASE}/validate/commit-complete/${CCI_ID}"
          echo "Validating: $VALIDATE_URL"

          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "X-Coordination-Internal-Key: ${COORDINATION_INTERNAL_API_KEY}" \
            -H "Accept: application/json" \
            "$VALIDATE_URL")

          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)

          echo "Response (HTTP $HTTP_CODE): $HTTP_BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            VALID=$(echo "$HTTP_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d.get('valid',False)).lower())" 2>/dev/null || echo "false")
            if [ "$VALID" = "true" ]; then
              TASK_ID=$(echo "$HTTP_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('task_id','unknown'))" 2>/dev/null || echo "unknown")
              echo "✅ commit-complete-id is valid. Associated task: $TASK_ID"
              echo "task_id=$TASK_ID" >> "$GITHUB_OUTPUT"
              exit 0
            else
              REASON=$(echo "$HTTP_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('reason','unknown'))" 2>/dev/null || echo "unknown")
              echo "::error::commit-complete-id $CCI_ID is not valid: $REASON"
              exit 1
            fi
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "::error::commit-complete-id $CCI_ID not recognized by checkout service."
            echo "::error::Ensure you used the CCI token returned from advance_task_status(target_status='committed')."
            exit 1
          else
            echo "::error::Checkout service validation failed (HTTP $HTTP_CODE). Cannot verify commit-complete-id."
            echo "::error::Response: $HTTP_BODY"
            exit 1
          fi

      # ENC-TSK-E57 AC1: Reject PRs with undeclared deploy target
      - name: Validate deploy target declaration
        if: steps.classify.outputs.auto_sync != 'true'
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          DEPLOY_API_BASE: https://8nkzqkmxqc.execute-api.us-west-2.amazonaws.com/api/v1/deploy
          COORDINATION_INTERNAL_API_KEY: ${{ secrets.COORDINATION_INTERNAL_API_KEY }}
        run: |
          VALIDATE_URL="${DEPLOY_API_BASE}/validate/approval/${PR_NUMBER}"
          HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" \
            -H "X-Coordination-Internal-Key: ${COORDINATION_INTERNAL_API_KEY}" \
            -H "Accept: application/json" \
            "$VALIDATE_URL" || echo -e "\n000")
          HTTP_BODY=$(echo "$HTTP_RESPONSE" | head -n -1)
          HTTP_CODE=$(echo "$HTTP_RESPONSE" | tail -n 1)

          if [ "$HTTP_CODE" = "200" ]; then
            TARGET=$(echo "$HTTP_BODY" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('original_target',''))" 2>/dev/null || echo "")
            if [ "$TARGET" = "undeclared" ]; then
              echo "::error::Deploy target is 'undeclared'. Add a target:prod or target:gamma label to this PR before merge."
              exit 1
            fi
            echo "Deploy target: ${TARGET:-no DPL record}"
          fi
          # If DPL not found or API error, pass silently (non-deploy PRs have no DPL)

      # ENC-TSK-963: Agent provenance validation for Bedrock-authored PRs
      - name: Validate agent provenance (Bedrock PRs)
        if: startsWith(github.event.pull_request.head.ref, 'agent/')
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "Agent-authored PR detected: $HEAD_REF"

          # Check for Bedrock dispatch ID tag in PR body
          DISPATCH_ID=$(echo "$PR_BODY" | grep -oE 'Bedrock-Dispatch-ID:\s*\S+' | head -1 || true)

          if [ -z "$DISPATCH_ID" ]; then
            echo "::warning::Agent PR on branch $HEAD_REF does not contain Bedrock-Dispatch-ID tag."
            echo "::warning::For Bedrock-authored PRs, include 'Bedrock-Dispatch-ID: {dispatch_id}' in the PR body."
            echo "provenance=unverified" >> "$GITHUB_OUTPUT"
          else
            echo "✅ Agent provenance tag found: $DISPATCH_ID"
            echo "provenance=verified" >> "$GITHUB_OUTPUT"
          fi
